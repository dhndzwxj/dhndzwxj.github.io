        <p>拟线性函数是高级微观经济学中极为有意思的一个函数，在MWG教材中多次出现且发挥着重要的作用。但限于教材的编排，其特性散落于教材多处，这给集中学习带来较大困难。目前在已知的网站上也没看到比较好的对该内容进行总结的文章，笔者在此将其罗列于同一篇文章中，供大家参考、批评。</p>
<blockquote>
<p>本文中出现的式子：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    &&u(\textbf{x})=x_1+\phi(x_2,\cdots,x_L)    \notag\\
    &&u(\textbf{x}+\alpha \textbf{e}_1) = u(\textbf{x})+\alpha    \notag\\
    &&\textbf{h}(\textbf{p},u+\alpha)=\textbf{h}(\textbf{p},u)+\alpha \textbf{e}_1    \notag\\
    &&\textbf{x}(\textbf{p},w)=\textbf{x}(\textbf{p},0)+w_1\textbf{e}_1\notag\\
    &&e(\textbf{p},u)=\tilde e(\textbf{p})+u\notag
\end{eqnarray}</script></blockquote>
<h3 id="拟线性（quasilinear）的定义"><a href="#拟线性（quasilinear）的定义" class="headerlink" title="拟线性（quasilinear）的定义"></a>拟线性（quasilinear）的定义</h3><p>$(-\infty,+\infty)\times\mathbb{R}_+^{L-1}$上的偏好关系关于商品1（货币）是拟线性的，当</p>
<ul>
<li>所有的无差异集彼此之间可以通过沿着商品1的坐标轴平行位移而得到：<ul>
<li>$x\sim y\Rightarrow x+\alpha e_1\sim y+\alpha e_1,\forall\alpha,e=(1,0,\cdots,0)$</li>
</ul>
</li>
<li>商品1是合意的：$x+\alpha e_1\succ x,\forall x,\alpha&gt;0$</li>
</ul>
<p>这种情况下商品1被称为<span style='color:red'>计价物商品</span>。</p>
<div align='center'>
  <img src='/../../images/MWG%E7%AC%AC%E4%B8%89%E7%AB%A0%EF%BC%9A%E7%BB%8F%E5%85%B8%E9%9C%80%E6%B1%82%E7%90%86%E8%AE%BA/image-20210303155642324.png' width=400px>
  <center style='font-family:kai'>图3.B.6 拟线性偏好的无差异曲线</center>
</div>

<h3 id="拟线性偏好的效用函数和支出函数的形式"><a href="#拟线性偏好的效用函数和支出函数的形式" class="headerlink" title="拟线性偏好的效用函数和支出函数的形式"></a>拟线性偏好的效用函数和支出函数的形式</h3><p><span style='font-family:hei;font-size:20px'>习题3.C.5</span><span style='font-family:fangsong'>证明如果$\succsim$关于商品1是拟线性的，当且仅当它能用$u(\textbf{x})=x_1+\phi(x_2,\cdots,x_L)$形式的效用函数$u(\textbf{x})$表示。</span></p>
<blockquote>
<p>证明：</p>
<p>$\succsim$如果能用$u(x)$这个形式的函数来表示，很容易证明它是拟线性的。</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \textbf{x}&\sim& \textbf{y}\Rightarrow u(\textbf{x})=u(\textbf{y})
\Rightarrow u(\textbf{x})+\alpha=u(\textbf{y})+\alpha    \notag\\
&\Rightarrow& (\alpha+x_1)+\phi(x_2\cdots,x_L)=(\alpha+y_1)+\phi(y_2\cdots,y_L)    \notag\\
&\Rightarrow& u(\textbf{x}+\alpha \textbf{e}_1)=u(\textbf{y}+\alpha \textbf{e}_1)    \notag\\
&\Rightarrow& \textbf{x}+\alpha \textbf{e}_1\sim\textbf{y}+\alpha \textbf{e}_1    \notag
\end{eqnarray}</script><p>反方向太复杂了，我不想写了。</p>
</blockquote>
<p><span style='font-family:hei;font-size:20px'>习题3.E.7</span><span style='font-family:fangsong'>证明如果$\succsim$关于商品1是拟线性的，那么商品$2,3,\cdots,L$的希克斯需求函数不取决于$u$。这种情况下，支出函数具有什么样的形式？</span></p>
<blockquote>
<p>证明：</p>
<p>$\succsim$关于商品1是拟线性的，那么根据习题3.E.5，它可以用形式为$u(\textbf{x})=x_1+\bar u(x_2,\cdots,x_L)$的效用函数来表示。令$\textbf{e}_1=(1,0,\cdots,0)’\in\mathbb{R}^L$，</p>
<p>我们将证明对于每个$\textbf{p}\gg \textbf{0}(p_1=1)$，$u\in\mathbb{R},\alpha\in\mathbb{R}$和$\textbf{x}\in(-\infty,+\infty)\times\mathbb{R}_+^{L-1}$，如果$\textbf{x}=h(\textbf{p},u)$，那么$\textbf{x}+\alpha\textbf{e}_1=h(\textbf{p},u+\alpha)$。</p>
<p>首先注意到，因为$\textbf{x}=h(\textbf{p},u)$，根据成本最小化问题的求解过程，$u(\textbf{x})\ge u\Rightarrow u(\textbf{x})+\alpha\ge u+\alpha$。注意到：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    u(\textbf{x})+\alpha &=& x_1+\bar u(x_2,\cdots,x_L)+\alpha    \notag\\
    &=& (x_1+\alpha)+\bar u(x_2,\cdots,x_L)    \notag\\
    &=&u(\textbf{x}+\alpha\textbf{e}_1)    \notag
\end{eqnarray}</script><p><span style='color:red'>很明显，这个性质(效用的增加等于计价物商品数量的增加)是拟线性偏好独有的。</span>因此有$u(\textbf{x}+\alpha\textbf{e}_1)\ge u+\alpha$，也就是说，$\textbf{x}+\alpha\textbf{e}_1$满足$(\textbf{p},u+\alpha)$的支出最小化问题的约束。<span style='color:blue'>任取</span>$\textbf{y}\in\mathbb{R}^L_+$和$u(\textbf{y})\ge u+\alpha$，于是$u(\textbf{y})-\alpha\ge u\Rightarrow u(\textbf{y}-\alpha\textbf{e}_1)\ge u$    (理由如前面红字)。而由于$\textbf{x}=h(\textbf{p},u)$，即$\textbf{x}$是$(\textbf{p},u)$的支出最小化问题的最优解，所以$\textbf{p}\cdot(\textbf{y}-\alpha\textbf{e}_1)\ge\textbf{p}\cdot\textbf{x}$。因此，$\textbf{p}\cdot\textbf{y}\ge \textbf{p}(\textbf{x}+\alpha \textbf{e}_1)$。由$\textbf{y}$的任意性，因此，$\textbf{x}+\alpha\textbf{e}_1=h(\textbf{p},u+\alpha)$。</p>
<p><span style='font-family:fangsong'>证明$\textbf{x}+\alpha\textbf{e}_1=h(\textbf{p},u+\alpha)$这类题的套路：</span></p>
<p><span style='font-family:fangsong'>首先证明$\textbf{x}+\alpha\textbf{e}_1$满足CMP问题的约束条件。然后再任取另一个满足条件的向量，证明$\textbf{x}+\alpha\textbf{e}_1$比其更优即可。</span></p>
<p>上面的结果表明，效用只会随着商品1消费量的增加而增加。因此对于每个$l\in\{2,\cdots,L\}$，$u\in\mathbb{R},u’\in\mathbb{R}$，都有$h_l(\textbf{p},u)=h_l(\textbf{p},u’)(l=2,\cdots,L)$。即商品$2,3,\cdots,L$的希克斯需求函数不取决于$u$。因此我们定义$\tilde h(\textbf{p})=h(\textbf{p},0)$，那么$h(\textbf{p},u)=\tilde{h}(\textbf{p})+u\textbf{e}_1$。</p>
<p>由于$h(\textbf{p},u+\alpha)=h(\textbf{p},u)+\alpha\textbf{e}_1$，我们有$e(\textbf{p},u+\alpha)=e(\textbf{p},u)+\alpha$。同理有支出函数改为如下形式：</p>
<script type="math/tex; mode=display">
e(\textbf{p},u)=\tilde{e}(\textbf{p})+u</script></blockquote>
<h3 id="拟线性偏好下，等价性变化和补偿性变化是一样的！"><a href="#拟线性偏好下，等价性变化和补偿性变化是一样的！" class="headerlink" title="拟线性偏好下，等价性变化和补偿性变化是一样的！"></a>拟线性偏好下，等价性变化和补偿性变化是一样的！</h3><p><span style='font-family:hei;font-size:20px'>特殊情形</span>如果偏好对商品1是<span style='color:red'>拟线性的</span>，那么财富效应对商品1不存在，此时有$EV=CV$。这是因为：</p>
<script type="math/tex; mode=display">
h_1(p_1,\bar{\textbf{p}}_{-1},u^0) 
= x_1(p_1,\bar{\textbf{p}}_{-1},w)
= h_1(p_1,\bar{\textbf{p}}_{-1},u^1)</script><blockquote>
<p>证明：</p>
<p>已有证明，对于拟线性的商品，可以将支出函数写为如下形式：</p>
<script type="math/tex; mode=display">
e(\textbf{p},u)=\tilde{e}(p_2,\cdots,p_L)+u\quad(p_1=1)</script><p>因此，</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    EV(\textbf{p}^0,\textbf{p}^1,w)&=& e(\textbf{p}^0,u^1)-e(\textbf{p}^0,u^0)    \notag\\
&=& \left(\tilde{e}(p_2^0,\cdots,p_L^0)+u^1 \right) 
  - \left( \tilde{e}(p_2^0,\cdots,p_L^0)+u^0 \right)    \notag\\
  &=& u^1-u^0    \notag\\
    CV(\textbf{p}^0,\textbf{p}^1,w)&=& e(\textbf{p}^1,u^1)-e(\textbf{p}^1,u^0)\notag\\
    &=&    \left(\tilde{e}(p_2^1,\cdots,p_L^1)+u^1 \right) 
  - \left( \tilde{e}(p_2^1,\cdots,p_L^0)+u^1 \right)    \notag\\
  &=& u^1-u^0    \notag
\end{eqnarray}</script><p>所以$CV=EV$对于任意$(\textbf{p}^0,\textbf{p}^1,w)$都成立。</p>
</blockquote>
<h3 id="局部均衡分析中采用的拟线性偏好"><a href="#局部均衡分析中采用的拟线性偏好" class="headerlink" title="局部均衡分析中采用的拟线性偏好"></a>局部均衡分析中采用的拟线性偏好</h3><p><span style='color:red'>由于其他商品价格固定不变，我们自然可以将消费者对所有其他商品的支出视为一种<strong>复合商品</strong>，我们称这种复合商品为<strong>计价物</strong>。</span>于是下面研究一个简单的<strong>两商品拟线性模型</strong>。经济中有商品$l$和计价物，其消费量分别记为$x_i$和$m_i$。每个消费者的效用函数都是拟线性的：</p>
<script type="math/tex; mode=display">
u_i(m_i,x_i)=m_i+\phi_i(x_i)</script><p>令每名消费者的消费集为$\mathbb{R}\times\mathbb{R}_+$，这里为方便起见，我们假定计价物$m$的消费量可能是负数。函数$\phi{(\cdot)}$满足以下性质：</p>
<ul>
<li>有上界的</li>
<li>二次可微的</li>
<li>$\phi’(x_i)&gt;0,\phi’’(x_i)&lt;0,\forall x_i$</li>
<li>$\phi_i(0)=0$</li>
</ul>
<p>我们关注的是商品$l$的市场，所有其他商品商品形成的复合商品视为等价物（$m$代表花费在所有其他商品上的总钱数）。我们已经知道，<span style='color:red'>在拟线性效用函数中，非计价物的财富效应为0。</span></p>
<blockquote>
<p>习题3.D.4</p>
<p><span style='font-family:fangsong'>令$(-\infty,+\infty)\times\mathbb{R}_+^{L-1}$表示消费集，假设偏好是严格凸且为拟线性的。标准化$p_1=1$。(商品1是计价物)</span></p>
<p><span style='font-family:fangsong'>(a)证明商品$2,\cdots,L$的瓦尔拉斯需求函数与财富无关。对于商品1需求的财富效应，这意味着什么？</span></p>
<p><span style='font-family:fangsong'>(b)证明间接效用函数可以写为下列形式：$v(\textbf{p},w)=w+\phi(\textbf{p})$对于某个函数$\phi(\cdot)$。</span></p>
<p><span style='font-family:fangsong'>(c)为简单起见，假设$L=2$并将消费者的效用函数写为$u(x_1,x_2)=x_1+\eta(x_2)$。然而，现在令消费集为$\mathbb{R}_+^2$，从而对计价物$x_1$的消费存在着非负约束。固定价格$p$，考察当财富$w$变化时，消费者的瓦尔拉斯需求如何变化。对计价物消费的非负约束何时是无关紧要的？</span></p>
<p><strong>解答：</strong></p>
<p>(a)</p>
<p>令$\textbf{e}_1=(1,0,\cdots,0)\in\mathbb{R}^L$。我们将证明对每个$\textbf{p}\in\mathbb{R}_{++}^L,w\in\mathbb{R},\alpha\in\mathbb{R}$$\textbf{x}\in(-\infty,+\infty)\times\mathbb{R}_+^{L-1}$，如果$\textbf{x}=\textbf{x}(\textbf{p},w)$，那么$\textbf{x}+\alpha \textbf{e}_1=\textbf{x}(\textbf{p},w+\alpha)$。</p>
<p>首先注意到，由于$p_1=1,\textbf{p}\cdot(\textbf{x}+\alpha\textbf{e}_1)\le w+\alpha$，也就是说，$\textbf{x}+\alpha\textbf{e}_1$在价格和财富为$(\textbf{p},w+\alpha)$时是能买得起的。任取$\textbf{y}\in\mathbb{R}_+^L$和$\textbf{p}\cdot\textbf{y}\le w+\alpha$，于是$\textbf{p}\cdot(\textbf{y}-\alpha\textbf{e}_1)\le w$。由于$\textbf{x}=\textbf{x}(\textbf{p},w)$是条件$(\textbf{p},w)$下的最优解，因此</p>
<script type="math/tex; mode=display">
\color{red}{\textbf{x}\succsim\textbf{y}-\alpha\textbf{e}_1\xrightarrow{根据偏好是拟线性的}\textbf{x}+\alpha\textbf{e}_1\succsim\textbf{y},\textbf{x}+\alpha\textbf{e}=\textbf{x}(\textbf{p},w+\alpha)}</script><p>上面的结果说明，随着财富增加，只会消费更多的商品1。因此，对于每个$l\in\{2,\cdots,L\}$，$w\in\mathbb{R},w’\in\mathbb{R}$，$x_l(\textbf{p},w)=x_l(\textbf{p},w’)(l=2,\cdots,L)$。也就是说，商品$2,\cdots,L$的需求和财富无关。</p>
<p>对于商品1，有$\frac{\partial x_1(\textbf{x},w)}{\partial w}=1$，即任何多余的钱都被用于购买商品1。</p>
<p>(b)</p>
<p>由于$\textbf{x}(\textbf{p},w)=\textbf{x}(\textbf{p},0)+w\textbf{e}_1$(前面文章已经说过，这是拟线性函数专有的性质)。偏好关系可采取拟线性形式的效用函数：$u(\textbf{x})=x_1+\tilde u(x_2,\cdots,x_L)$。于是有：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    v(\textbf{p},w)&=&u(\textbf{x}(\textbf{p},w))=u(\textbf{x}(\textbf{p},0)+w\textbf{e}_1)    \notag\\
    &=&    u(\textbf{x}(\textbf{p},0))+w    \text{(拟线性函数的独特性质)}\notag\\
    &=&    w+\phi(p)    \notag
\end{eqnarray}</script><hr>
<p>(c)问答案暂时没有看懂。。。</p>
</blockquote>

        <h3 id="10-A-引言"><a href="#10-A-引言" class="headerlink" title="10.A 引言"></a>10.A 引言</h3><p>马歇尔（1920）将市场简化为仅有一种商品(或一组相关商品)，每个消费者对该种商品的花费仅占其总预算的一小部分。这样，<span style='font-family:fangsong'>这种商品市场的变化几乎不会影响所有其他商品的价格</span>。</p>
<p>消费者效用函数设为拟线性形式：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}

    &&\text{为什么支出函数是这个形式呢？后面有证明！}    \notag

<blockquote>

<h3 id="10-B-帕累托最优和竞争均衡"><a href="#10-B-帕累托最优和竞争均衡" class="headerlink" title="10.B 帕累托最优和竞争均衡"></a>10.B 帕累托最优和竞争均衡</h3><p>如下假定：</p>
<ol>
<li>一般均衡的背景下。</li>
<li>$I$个消费者，消费偏好是外生给定的，可用函数$u(\cdot)$来表示，不会随着产品价格的变化而改变。消费集设为$X_i$。</li>
<li>$J$个厂商，对厂商而言，技术是外生给定的，初始禀赋也是外生给定的。<span style='color:blue'>每个企业的</span>生产可能集用生产集$Y_j\subset\mathbb{R}^L$来表示，其元素为生产向量$\textbf{y}_j=(y_{1j},\cdots,y_{Lj})’\in\mathbb{R}^L$。</li>
<li>$L$种商品。每种商品的初始总量(称为商品$l$的<strong>总禀赋</strong>)可用$w_l\ge0$来表示，</li>
<li>如果$(\textbf{y}_1,\cdots,\textbf{y}_J)\in\mathbb{R}^{L\times J}$是$J$个企业的生产向量，那么经济中商品$l$的（净）数量为$w_l+\sum_j \textbf{y}_{lj}$。</li>
</ol>
<p><span style='font-family:hei;font-size:20px'>定义10.B.1</span>：$(\textbf{x}_1,\cdots,\textbf{x}_I,\textbf{y}_1,\cdots,\textbf{y}_J)$被称为一种<span style='color:red'>经济配置</span>。前一半是$I$个消费者各自的消费向量，后一半是$J$个厂商各自的生产向量。一种经济配置被称为<span style='color:red'>可行的</span>，当</p>
<script type="math/tex; mode=display">
\sum_{i=1}^I x_{li}\le w_l+\sum_{j=1}^J y_{lj},l=1,2,\cdots,L</script><p>即对每种商品的消费量，不能超过这种商品的禀赋和当期生产量（生产消耗量）之和（差）。</p>
<p><span style='font-family:hei;font-size:20px'>定义10.B.2</span><span style='color:red'>帕累托最优</span>。对于可行配置$(\textbf{x}_1,\cdots,\textbf{x}_I,\textbf{y}_1,\cdots,\textbf{y}_J)$来说，如果不存在其他的可行配置$(\textbf{x}_1’,\cdots,\textbf{x}_I’,\textbf{y}_1’,\cdots,\textbf{y}_J’)$使得：对所有的$i=1,2,\cdots,I$都有$u_i(\textbf{x}_i’)\ge u_i(\textbf{x}_i)$且存在某个$i_0$有$u_{i_0}(\textbf{x}_{i_0}’)&gt; u_{i_0}(\textbf{x}_{i_0})$。那么该配置被称为<strong>帕累托最优的</strong>或者<strong>帕累托有效率的</strong>。</p>
<p><span style='font-family:hei;font-size:20px'>效用可能集</span></p>
<p>在两消费者组成的经济中，效用可能集被定义为：</p>
<script type="math/tex; mode=display">
U=\{ (u_1,u_2) \lvert \text{存在可行配置}(\textbf{x}_1,\textbf{x}_2,\textbf{y}_1,\cdots,\textbf{y}_J)\text{使得}u_i\le u(\textbf{x}_i)\}</script><p><span style='font-family:hei;font-size:20px'>效用可能边界</span></p>
<p>如果将商品$l$的消费和产出水平固定为：$(\bar{\textbf{x}}_1,\cdots,\bar{\textbf{x}}_I,\bar{\textbf{y}}_1,\cdots,\bar{\textbf{y}}_J)$。效用可能边界可以表达为如下的集合：</p>
<script type="math/tex; mode=display">
\left\{ (u_1,\cdots,u_l) \left\lvert \sum_i u_i\le \sum_i\phi_i(\bar{\textbf{x}}_i)+w_m-\sum_j c_j(\bar{\textbf{q}}_j)\right. \right\}</script><p><span style='font-family:hei;font-size:24px'>竞争均衡</span></p>
<p>本章分析的是完全竞争市场经济，社会的<span style='font-family:fangsong'>初始禀赋和技术可能性都由消费者所有</span>。设消费者$i$的初始禀赋向量为：$\textbf{w}_i=(w_{1i},\cdots,w_{Li})$。因此商品$l$的初始禀赋应为：$\sum_{i=1}^I w_{li}=w_l$。我们还假设消费者$i$在企业$j$中所占的股份为$\theta_{ij},\sum_{i=1}^n\theta_{ij}=1$。因此该消费者有权向企业$j$索要的利润份额为$\theta_{ij}$。</p>
<p>消费者和厂商在完全竞争市场上都是价格接受者，商品向量的市场价格向量记为$\textbf{p}=(p_1,\cdots,p_L)’$。于是<span style='color:red'>竞争均衡（瓦尔拉斯均衡）</span>的概念为：</p>
<p><span style='font-family:hei;font-size:20px'>定义10.B.3</span>配置和价格向量构成了一个竞争均衡（瓦尔拉斯均衡），如果它能满足以下条件：</p>
<ol>
<li><p>利润最大化。$\textbf{y}_j^\star=\arg\min_{\textbf{y}_j\in Y_j} \textbf{p}^\star\cdot\textbf{y}_j$</p>
</li>
<li><p>效用最大化。</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \max_{\textbf{x}_i\in X} &&u_i(\textbf{x}_i)    \notag\\
\text{s.t.} && \textbf{p}^\star\cdot \textbf{x}_i\le\textbf{p}^\star\cdot \textbf{w}_i+\sum_{j=1}^n \theta_{ij}\times(\textbf{p}^\star\cdot\textbf{y}_j^\star)    \notag
\end{eqnarray}</script><p>约束条件的含义是，消费者$i$的消费总额，不能超过他自身初始禀赋和得到的利润之和。</p>
</li>
<li><p>市场出清。$\sum_{i=1}^I \textbf{x}_{li}^\star=w_l+\sum_{j=1}^J \textbf{y}_{lj}^\star$</p>
</li>
</ol>
<h3 id="10-C-局部均衡竞争分析"><a href="#10-C-局部均衡竞争分析" class="headerlink" title="10.C 局部均衡竞争分析"></a>10.C 局部均衡竞争分析</h3><p>局部均衡分析就是将市场看成是一种商品的市场，这种商品仅占整体经济的极小部分。（<span style='font-family:kai'>因此，任何额外一单位的财富中，只有很小一部分用于这种商品的购买，因而它的财富效应很小</span>）预期该商品的财富效应非常小，该市场的变化几乎不会影响其他商品的价格。（<span style='font-family:kai'>这种商品的市场规模很小，该商品市场发生变化的替代效应也很小，因而不会影响其他商品的价格。</span>）</p>
<p><span style='color:red'>由于其他商品价格固定不变，我们自然可以将消费者对所有其他商品的支出视为一种<strong>复合商品</strong>，我们称这种复合商品为<strong>计价物</strong>。</span>于是下面研究一个简单的<strong>两商品拟线性模型</strong>。经济中有商品$l$和计价物，其消费量分别记为$x_i$和$m_i$。每个消费者的效用函数都是拟线性的：</p>
<script type="math/tex; mode=display">
u_i(m_i,x_i)=m_i+\phi_i(x_i)</script><p>令每名消费者的消费集为$\mathbb{R}\times\mathbb{R}_+$，这里为方便起见，我们假定计价物$m$的消费量可能是负数。函数$\phi{(\cdot)}$满足以下性质：</p>
<ul>
<li>有上界的</li>
<li>二次可微的</li>
<li>$\phi’(x_i)&gt;0,\phi’’(x_i)&lt;0,\forall x_i$</li>
<li>$\phi_i(0)=0$</li>
</ul>
<p>我们关注的是商品$l$的市场，所有其他商品商品形成的复合商品视为等价物（$m$代表花费在所有其他商品上的总钱数）。我们已经知道，<span style='color:red'>在拟线性效用函数中，非计价物的财富效用为0。</span></p>
<blockquote>
<p>习题3.D.4</p>
<p><span style='font-family:fangsong'>令$(-\infty,+\infty)\times\mathbb{R}_+^{L-1}$表示消费集，假设偏好是严格凸且为拟线性的。标准化$p_1=1$。(商品1是计价物)</span></p>
<p><span style='font-family:fangsong'>(a)证明商品$2,\cdots,L$的瓦尔拉斯需求函数与财富无关。对于商品1需求的财富效应，这意味着什么？</span></p>
<p><span style='font-family:fangsong'>(b)证明间接效用函数可以写为下列形式：$v(\textbf{p},w)=w+\phi(\textbf{p})$对于某个函数$\phi(\cdot)$。</span></p>
<p><span style='font-family:fangsong'>(c)为简单起见，假设$L=2$并将消费者的效用函数写为$u(x_1,x_2)=x_1+\eta(x_2)$。然而，现在令消费集为$\mathbb{R}_+^2$，从而对计价物$x_1$的消费存在着非负约束。固定价格$p$，考察当财富$w$变化时，消费者的瓦尔拉斯需求如何变化。对计价物消费的非负约束何时是无关紧要的？</span></p>
<p><strong>解答：</strong></p>
<p>(a)</p>
<p>令$\textbf{e}_1=(1,0,\cdots,0)\in\mathbb{R}^L$。我们将证明对每个$\textbf{p}\in\mathbb{R}_{++}^L,w\in\mathbb{R},\alpha\in\mathbb{R}$$\textbf{x}\in(-\infty,+\infty)\times\mathbb{R}_+^{L-1}$，如果$\textbf{x}=\textbf{x}(\textbf{p},w)$，那么$\textbf{x}+\alpha \textbf{e}_1=\textbf{x}(\textbf{p},w+\alpha)$。</p>
<p>首先注意到，由于$p_1=1,\textbf{p}\cdot(\textbf{x}+\alpha\textbf{e}_1)\le w+\alpha$，也就是说，$\textbf{x}+\alpha\textbf{e}_1$在价格和财富为$(\textbf{p},w+\alpha)$时是能买得起的。任取$\textbf{y}\in\mathbb{R}_+^L$和$\textbf{p}\cdot\textbf{y}\le w+\alpha$，于是$\textbf{p}\cdot(\textbf{y}-\alpha\textbf{e}_1)\le w$。由于$\textbf{x}=\textbf{x}(\textbf{p},w)$是条件$(\textbf{p},w)$下的最优解，因此</p>
<script type="math/tex; mode=display">
\color{red}{\textbf{x}\succsim\textbf{y}-\alpha\textbf{e}_1\xrightarrow{根据偏好是拟线性的}\textbf{x}+\alpha\textbf{e}_1\succsim\textbf{y},\textbf{x}+\alpha\textbf{e}=\textbf{x}(\textbf{p},w+\alpha)}</script><p>上面的结果说明，随着财富增加，只会消费更多的商品1。因此，对于每个$l\in\{2,\cdots,L\}$，$w\in\mathbb{R},w’\in\mathbb{R}$，$x_l(\textbf{p},w)=x_l(\textbf{p},w’)$。也就是说，商品$2,\cdots,L$的需求和财富无关。</p>
<p>对于商品1，有$\frac{\partial x_1(\textbf{x},w)}{\partial w}=1$，即任何多余的钱都被用于购买商品1。</p>
<p>(b)</p>
<p>由于$\textbf{x}(\textbf{p},w)=\textbf{x}(\textbf{p},0)+w\textbf{e}_1$(前面文章已经说过，这是拟线性函数专有的性质)。偏好关系可采取拟线性形式的效用函数：$u(\textbf{x})=x_1+\tilde u(x_2,\cdots,x_L)$。于是有：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    v(\textbf{p},w)&=&u(\textbf{x}(\textbf{p},w))=u(\textbf{x}(\textbf{p},0)+w\textbf{e}_1)    \notag\\
    &=&    u(\textbf{x}(\textbf{p},0))+w    \text{(拟线性函数的独特性质)}\notag\\
    &=&    w+\phi(p)    \notag
\end{eqnarray}</script><hr>
<p>(c)问答案暂时没有看懂。。。</p>
<p>(c)非负约束以等号形式成立，当且仅当$p_2x_2(\textbf{p},0)&gt;w$。注意到，$x_2(\textbf{p},0)=(\eta’)^{-1}p_2$</p>
</blockquote>
<p>在下面的讨论中，我们将计价物的价格标准化为1，令$p$表示商品$l$的价格。假定：</p>
<ul>
<li><p>所有企业用计价物$m$，生产商品$l$。</p>
</li>
<li><p>企业$j$生产$q_j$单位商品l所需要的$m$的数量，可以用成本函数$c_j(q_j)$给出。</p>
</li>
<li><p>用$z_j$表示企业$j$使用计价物$m$作为投入的数量，构造企业$j$的生产集：</p>
<ul>
<li><script type="math/tex; mode=display">
Y_j=\{ (-z_j,q_j)\lvert q_j\ge 0,z_j\ge c_j(q_j) \}</script></li>
</ul>
</li>
<li><p>假设是二次可微的，并且对所有$q_j\ge 0$，都有$c_j’(q_j)&gt;0$以及$c_j’’(q_j)\ge 0$。</p>
</li>
</ul>
<p><span style='font-family:hei;font-size:20px'>利润最大化</span></p>
<p>给定商品$l$的价格为$p^\star$。</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    &&\max_{q_j\ge 0} p^\star q_j-c_j(q_j)    \notag\\
    \text{FOC: } &&p^\star\le c_j'(q_j^\star)    (\text{等式成立条件为}q_j^\star>0)    \notag
\end{eqnarray}</script><p><span style='font-family:hei;font-size:20px'>消费者效用最大化</span></p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    &&\max_{m_i\in\mathbb{R},x_i\in\mathbb{R}_+} m_i+\phi_i(x_i)    \notag\\
    \text{s.t. } && m_i+p^\star x_i\le w_{mi}
    +\sum_{j=1}^n\theta_{ij}\left[p^\star q_j^\star-c_j(q_j^\star)\right]    \notag
\end{eqnarray}</script><p>在这个问题的任何解中，预算约束都以等号成立。从预算约束中解出$m_i$，然后代入目标函数。这样，$x_i^\star$必定是下列问题的解。</p>
<script type="math/tex; mode=display">
\max_{x_i\ge 0} \phi_i(x_i)-p^\star x_i+w_{mi}
    +\sum_{j=1}^n\theta_{ij}\left[p^\star q_j^\star-c_j(q_j^\star)\right]</script><p>一阶条件为：</p>
<script type="math/tex; mode=display">
\phi'(x_i)\le p^\star(\text{等式成立当且仅当}x_i^\star>0)</script><p><span style='font-family:hei;font-size:20px'>竞争均衡</span></p>
<p>配置和价格$(x_1^\star,\cdots,x_I^\star,q^\star_1,\cdots,q^\star_J)$构成一个竞争均衡，当且仅当</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    &&p^\star\le c_j'(q_j^\star)    (\text{等式成立条件为}q_j^\star>0)    \tag{10.C.1}\\
    &&\phi'(x_i)\le p^\star(\text{等式成立当且仅当}x_i^\star>0)    \tag{10.C.2}\\
    &&\sum_{i=1}^I x_i^\star = \sum_{j=1}^J q_j^\star    \tag{10.C.3}
\end{eqnarray}</script><p>10.C.1是说，企业额外多卖出一单位商品带来的边际收入，恰好等于生产这种单位产品的边际成本。10.C.2是说，消费者额外多消费一单位商品带来的边际效用，恰好等于他购买这单位产品所花费的边际成本。10.C.3是市场出清式。</p>
<p>商品$l$的总需求函数为：$x(p)=\sum_ix_i(p)$，是个人需求函数在水平方向上的加总。总供给函数为$q(p)=\sum_j q_j(p)$，是所有单个企业的供给函数沿着水平方向加总。均衡价格：</p>
<script type="math/tex; mode=display">
x(p^\star)=q(p^\star)</script><p><span style='font-family:hei;font-size:20px'>比较静态</span></p>
<p>我们通常想知道潜在市场条件发生变化时，竞争市场的结果将会发生什么样的变化。有时我们也想知道市场条件变化如何改变某个特定市场的结果。这类问题的分析被称为比较静态分析。 </p>
<p>假设消费者的<strong>偏好</strong>受外生参数$\alpha\in\mathbb{R}^M$的影响，效用函数$\phi(\cdot)$可以写成$\phi_i(x_i,\alpha)$。厂商的<strong>技术</strong>受外生参数$\beta\in\mathbb{R}^S$的影响，成本函数$c(\cdot)$可以写成$c_j(q_j,\beta)$。当消费者和厂商面临税收或津贴时，实际销售或购买商品的价格<strong>可能</strong>不同于市场价格$p$。</p>
<p>令$\hat p_i(\textbf{p},\textbf{t})$和$\hat p_j(\textbf{p},\textbf{t})$分别表示在税收或者补贴参数为$t\in\mathbb{R}^K$时，消费者$i$实际支付的价格和企业$j$实际得到的价格。例如，消费者每购买一单位商品必须缴纳税收$t_i$（从量税），那么$\hat p_i(\textbf{p},\textbf{t})=p+t_i$；如果消费者缴纳的税收是售价的$t_i$个百分点（从价税），那么$\hat p_i(\textbf{p},\textbf{t})=p(1+t_i)$。</p>
<p>对于给定的参数$(\alpha,\beta,\textbf{t})$,$I+J$个均衡量$(x_1^\star,\cdots,x_I^\star,q_1^\star,\cdots,q_J^\star)$和均衡价格$p^\star$是下列$I+J+1$个方程的解。</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    &&\phi_i'(x_i^\star,\alpha)=\hat p_i(p^\star,t),\quad i=1,\cdots,I    \tag{10.C.4} \\
    &&c_j'(q_j^\star,\beta)=\hat p_j(p^\star,t),\quad j=1,\cdots,J    \tag{10.C.5}\\
    &&\sum_{i=1}^I x_i^\star = \sum_{j=1}^J q_j^\star \tag{10.C.6}
\end{eqnarray}</script><p>如果这些函数都是可微的，可以用隐函数定理来求这些参数值的微小变化带来的均衡配置和价格的边际变化。</p>
<p><span style='font-family:hei;font-size:20px'>例10.C.1 销售税的比较静态分析</span></p>
<p>有一种新的销售税，消费者每消费一单位商品就必须付$t&gt;0$的税（从量税）。分析税收对市场价格的影响，分别用$x(p)$和$q(p)$表示税收前商品的总需求和总供给函数。</p>
<p>设消费者效用函数为$\phi_i(\cdot)$，厂商成本函数为$c_j(\cdot)$。消费者实际支付的价格为$\hat p_i(\textbf{p},t)=p+t$，厂商得到的价格为$\hat p_j(\textbf{p},t)=p$。此时的总需求恰好为$x(\textbf{p}+\textbf{t})$，因此当税收为$t$时的均衡市场价格$(p^\star(t))$必定满足</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    x(p^\star(t)+t)=q(p^\star(t))    \tag{10.C.7}
\end{eqnarray}</script><p>假设总需求函数和总供给函数在均衡点附近是可微的，那么对（10.C.7）微分可以得到：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    &&p^{\star'}(t)=-\frac{x'(p^\star(t)+t)}{x'(p^\star(t)+t)-q'(p^\star(t))}    = -\frac{-x'(p^\star(t)+t)}{-x'(p^\star(t)+t)+q'(p^\star(t))}\tag{10.C.8}\\
    &&(p^{\star}(t)+t)' = \frac{q'(p^\star(t))}{-x'(p^\star(t)+t)+q'(p^\star(t))}    \notag
\end{eqnarray}</script><p>结合关于$x’(\cdot)&lt;0$和$q’(\cdot)\ge 0$得假设可知，对任何$t$都有$-1\le p^{\star’}(t)&lt;0$。因此随着税收上升，企业得到的价格$p^\star(t)$下降，消费者支付的价格$p^\star(t)+t$弱增(rise weakly)。总产量和总消费量下降。</p>
<p>注意到，$q’(p^\star)$当很大时，有$p^{\star’}\approx 0$，即厂商的售价几乎不受影响，所有的税收负担均由消费者承担。相反当$q’(p^\star)=0$，有$p^{\star’}=-1$，厂商承担全部税收。</p>
<h3 id="10-D-局部均衡框架下的基本福利定理"><a href="#10-D-局部均衡框架下的基本福利定理" class="headerlink" title="10.D 局部均衡框架下的基本福利定理"></a>10.D 局部均衡框架下的基本福利定理</h3><p>在拟线性的情况下，帕累托最优配置的识别问题变得非常简单。具体地说，<strong>若消费者的偏好是拟线性的， 则整体经济的效用可能集</strong>（这个集合的定义可参考 10.B 节）<strong>的边界是线性的， 而且这个边界上的所有点与下面这样的消费配置联系在一起， 这些消费配置的区别仅在于计价物数量上的区别。</strong></p>
<p>假设我们将商品$l$的消费水平和产量水平固定在$(\bar x_1,\cdots,\bar x_l,\bar q_1,\cdots,\bar q_J)$。于是能用于在消费之间分配的计价物的总量为$w_m-\sum_{j=1}^Jc_j(\bar q_j)$（初始禀赋减去$J$家企业生产商品$l$消耗的计价物）。<span style='color:blue'>在消费者的效用函数为拟线性的情形下</span>，通过消费者之间的计价物的转移即可实现消费者之间效用的转移，更为重要的是这种转移是“一对一的”，也就是说从消费者甲身上转移一单位计价物给消费者乙，则前者的效用减少一单位后者的效用增加一单位。因此，通过合理分配计价物，$I$个消费者可达到的效用集为:(<span style='color:red'>效用可能边界</span>)</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \left\{    (u_1,\cdots,u_I)\left\lvert  \sum_{i=1}^I u_i\le\sum_{i=1}^I\phi_i(\bar x_i)+w_m-\sum_{j=1}^J c_j(\bar q_j)  \right.    \right\}    \tag{10.D.1}
\end{eqnarray}</script><p>根据效用可能边界，商品$l$的最优消费和产出水平可以通过下列问题而得到：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \max_{\textbf{x}\geqq\textbf{0},\textbf{q}\geqq\textbf{0}}
    &&{\color{red}{\sum_{i=1}^I\phi_i(x_i)-\sum_{j=1}^Jc_j(q_j)}}+w_m    \notag\\
    \text{s.t. }&& \sum_{i=1}^I x_i-\sum_{j=1}^J q_j=0    \notag
\end{eqnarray}\tag{10.D.2}</script><p>(10.D.2)中红色部分的值被称为<span style='color:red'>马歇尔总剩余</span>。或简称为<span style='color:red'>总剩余</span>。可以用KT条件求解该问题的一阶条件，设$\mu$为约束条件的乘子，那么$I+J$个最优值$(x_1^\star,\cdots,x_I^\star,q_1^\star,\cdots,q_J^\star)$和乘子$\mu$满足下列$I+J+1$个方程：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    &&\mu\le c_j'(q^\star_j) (\text{等式成立当且仅当}q_j^\star>0)    \tag{10.D.3}\\
    &&\phi'_i(x_i^\star)\le\mu (\text{等式成立当且仅当}x_j^\star>0)    \tag{10.D.4}\\
    && \sum_{i=1}^I x_i^\star =\sum_{j=1}^J q_j^\star    \tag{10.D.5}
\end{eqnarray}</script><p>我们由此立即可知，这个模型的任何竞争均衡是帕累托最优的，因为如果我们令$\mu=p^\star$，那么在任何竞争均衡配置中，商品$l$的消费和产量水平$(x_1^\star,\cdots,x_I^\star,q_1^\star,\cdots,q_J^\star)$满足（10.D.3）到（10.D.5）。由此我们建立了<span style='color:red'>两商品拟线性经济</span>的<strong>福利经济学第一基本定理</strong>。</p>
<p><span style='font-family:hei;font-size:20px'>命题10.D.1</span>（福利经济学第一基本定理）如果价格$p^\star$和配置$(x_1^\star,\cdots,x_I^\star,q_1^\star,\cdots,q_J^\star)$构成了一个<span style='color:blue'>竞争均衡</span>，那么这个配置$(x_1^\star,\cdots,x_I^\star,q_1^\star,\cdots,q_J^\star)$是<strong>帕累托最优</strong>的。</p>
<p>我们已经知道商品$l$的均衡价格$p^\star$、商品$l$的均衡消费水平和产量水平$(x_1^\star,\cdots,x_I^\star,q_1^\star,\cdots,q_J^\star)$和企业的利润都不受消费者的财富水平$w_m$变动的影响。<span style='font-family:fangsong'>因此，若从一个消费者身上转移一单位计价物给另外一个消费者，则将会使前者的计价物均衡消费量减少一单位，后者的增加一单位。除此之外，这种转移不会造成任何其它变化。</span>因此，如果适当地在消费者之间转移计价物商品，由此导致的竞争均衡配置就可以产生效用可能集的边界上的任何效用向量。</p>
<p><span style='font-family:hei;font-size:20px'>命题10.D.2</span>（福利经济学第二基本定理）对于任何帕累托最优效用水平$(u_1^\star,\cdots,u_I^\star)$，存在计价物商品在消费者之间的转移$T_1,\cdots,T_I$。(其中$\sum_iT_i=0$)使得禀赋$(w_{m1}+T_1,\cdots,w_{mI}+T_I)$实现的竞争均衡，恰好能产生效用$(u_1^\star,\cdots,u_I^\star)$。</p>
<blockquote>
<p>这个第二定理要是成立，收入分配调整就没有任何意义了。</p>
</blockquote>
<h3 id="10-E-局部均衡模型中的福利分析"><a href="#10-E-局部均衡模型中的福利分析" class="headerlink" title="10.E 局部均衡模型中的福利分析"></a>10.E 局部均衡模型中的福利分析</h3><p>我们经常想衡量市场条件变化带来的社会福利水平的变化，这样的市场条件变化有技术进步、政府实施新的税法、或市场某个缺陷的消除等。</p>
<p>在下面的讨论中，我们假设社会对福利的评价蕴涵在社会福利函数$W(u_1,\cdots,u_I)$中，这个函数对每个效用向量制定了一个社会福利值。而且我们假设某个中央集权者想通过转移计价物商品的方法来实现社会福利的最大化。<span style='color:red'>在<strong>个人效用函数为拟线性的情形下</strong>，福利分析被大大简化了，在这种情形下，如果某个中央集权者在消费者之间进行财富再分配，那么社会福利的变动可用马歇尔总剩余（$S=\sum_i\phi_i(x_i)-\sum_jc_j(q_j)$）的变动进行衡量，<strong>无论社会有什么样的福利函数</strong>。</span></p>
<p><span style='font-family:hei;font-size:20px'>假设：</span></p>
<ul>
<li>对于任何总消费水平$x$，商品$l$的个人消费都已达到最优。也就是说，对于每个消费者$i$都有$\phi_i’(x_i)=P(x)(x=\sum_i x_i)$。例如，如果消费者都是价格接受者，而且所有消费者面对相同的价格，那么这个假设条件就能得到满足。</li>
<li>对于任何总产量水平$q$ ，每个企业的生产行为都是最优的。也就是说，对于每个企业$j$都有$c_j’(q_j)=C’(q)(q=\sum_j q_j)$。例如，如果企业都是价格接受者，而且所有企业面对着相同的价格，那么这个假设条件就能得到满足。</li>
<li>需要强调，我们没有要求消费者面对的价格和企业面对的价格是相同的。</li>
</ul>
<p>现在考虑商品$l$的消费和产量水平的微分变化$(\text{d}x_1,\cdots,\text{d}x_I,\text{d}q_1,\cdots,\text{d}q_J)$。这个变化满足$\sum_i\text{d}x_i=\sum_j\text{d}q_j$。记$\text{d}x=\sum_i\text{d}x_i$。于是，马歇尔总剩余的变化为：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \text{d}S=\sum_{i=1}^I\phi_i'(x_i)\text{d}x_i-\sum_{j=1}^J c_j'(q_j)\text{d}q_j    \tag{10.E.2}
\end{eqnarray}</script><p>根据上面的两条假设，可得</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \text{d}S = P(x)\sum_{i=1}^I \text{d}x_i-C'(q)\sum_{j=1}^J \text{d}q_j    \tag{10.E.3}
\end{eqnarray}</script><p>最后根据市场可行性推知$x=q$。以及$\sum_i\text{d}x_i=\sum_j\text{d}q_j=\text{d}x$，上式可以写成：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \text{d}S=[P(x)-C'(x)]\text{d}x    \tag{10.E.4}
\end{eqnarray}</script><div align='center'>
  <img src='/../../images/MWG%E7%AC%AC%E5%8D%81%E7%AB%A0%E7%AB%9E%E4%BA%89%E5%B8%82%E5%9C%BA/image-20210306165139790.png' width=400px>
  <center style='font-family:kai'>图10.E.2(a)</center>
</div>



<p><span style='font-family:hei;font-size:20px'>例10.E.1扭曲税的福利效应</span></p>
<p>分析例10.C.1中的商品税问题。假设有一个保持平衡预算的从事福利事业的权威机构，将所得的税收收益以一次性总付的形式返还给消费者。这一税收和转移计划对福利的影响是什么？</p>
<p>当税率为$t$时，我们令$(x_1^\star(t),\cdots,x_I^\star(t),q_1^\star(t),\cdots,q_J^\star(t))$表示商品$l$的均衡消费和产量水平，令$p^\star(t)$表示商品$l$的均衡价格。注意到，对于所有消费者，都有$\phi_i’(x_i^\star(t))=p^\star(t)+t$，对于所有厂商都有$c_j’(q_j^\star(t))=p^\star(t)$。于是马歇尔总剩余的变动可以表示为：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    S^\star(t)-S^\star(0)=\int_{x^\star(0)}^{x^\star(t)}[P(s)-C'(s)]\text{d}s    \tag{10.E.6}
\end{eqnarray}</script><p>上面结果是负的，这是因为$x^\star(t)<x^\star(0)$，以及对于所有$x= x^\star(0)$，有$P(x)> C’(x)$，$x&lt;x^\star(0)$时，有$P(x)=C’(x)$。因此社会福利在$t=0$时达到最大。社会福利因$t&gt;0$导致的损失被称为<span style='color:red'>扭曲税的净损失</span>，下面图片中的阴影部分面积被称为<span style='color:red'>净损失三角形</span>。</p>
<div align='center'>
  <img src='/../../images/MWG%E7%AC%AC%E5%8D%81%E7%AB%A0%E7%AB%9E%E4%BA%89%E5%B8%82%E5%9C%BA/image-20210306175708593.png' width=400px>
  <center style='font-family:kai'>图10.E.3 扭曲税造成的净福利损失</center>
</div>

<p>当消费者实际支付的价格为$\hat p$从而总消费为$x(\hat p)$时，此时的<strong>总消费者剩余</strong>是指消费者因消费商品$l$而得到的总消费者收益减去他们在商品$l$上的总支出。</p>
<script type="math/tex; mode=display">
CS(\hat p)=\sum_{i=1}^I \phi_i(x_i(\hat p))-\hat px(\hat p)</script><p>注意到消费是最优分配的事实，我们有</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    CS(\hat p)=\int_0^{x(\hat p)} P(s)\text{d}s-\hat px(\hat p) 
=\int_0^{x(\hat p)} [P(s)-p]\text{d}s    \tag{10.E.7}
\end{eqnarray}</script><p>注意到：(这里实际上是更换了积分的坐标轴)</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    CS(\hat p)=\int_{\hat p}^{+\infty} x(s)\text{d}s    \tag{10.E.8}
\end{eqnarray}</script><p>因此由征税引起的<span style='color:red'>消费者剩余的变动</span>为：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    CS(p^\star(t)+t)-CS(p^\star(0))=-\int_{p^\star(0)}^{p^\star(t)+t} x(s)\text{d}s    \tag{10.E.9}
\end{eqnarray}</script><p>这一结果对应于图10.E.3中的dbcf的面积。</p>
<p>当厂商面对的实际价格为$\hat p$时，总利润或<strong>总生产者剩余</strong>为：</p>
<script type="math/tex; mode=display">
\Pi(\hat p)=\hat pq(\hat p)-\sum_{j=1}^J c_j(q_j(\hat p))</script><p>注意到产量时最优分配的事实，我们有</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \Pi(\hat p) &=& \Pi_0+\int_0^{q(\hat p)} [\hat p-C'(s)]\text{d}s    \tag{10.E.10}\\
    &=& \Pi_0+\int_0^{\hat p}q(s)\text{d}s    \tag{10.E.11}
\end{eqnarray}</script><p>由于在本例子中，生产者不交税，因此当税率为$t$时它面对的价格为$p^\star(t)$。因此生产者剩余的变动为：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \Pi(\hat p(t))-\Pi(\hat p(0))=-\int_{\hat p(t)}^{\hat p(0)} q(s)\text{d}s    \tag{10.E.12}
\end{eqnarray}</script><p>最后，税收收入为$tx^\star(t)$。于是扭曲税的净损失就可以很容易计算出来了。</p>
<h3 id="10-F-自由进入与长期竞争均衡"><a href="#10-F-自由进入与长期竞争均衡" class="headerlink" title="10.F 自由进入与长期竞争均衡"></a>10.F 自由进入与长期竞争均衡</h3><p><span style='font-family:hei;font-size:20px'>假设</span></p>
<ul>
<li>市场有无数潜在的厂商，每一个厂商都有可能获得最有效的生产技术。厂商可根据利润机会自由进出市场。</li>
<li>假设有$J$家厂商，每一厂商生产商品$l$的成本函数为$c(q)$，总需求函数为$x(\cdot)$，其反函数为$P(\cdot)$。</li>
</ul>
<p><span style='font-family:hei;font-size:20px'>定义10.F.1</span> 对每一个有$c(0)=0$的潜在的从事生产的厂商，在给定总需求函数$x(p)$和成本函数$c(q)$时，一个三维变量$(p^\star,q^\star,J^\star)$构成长期竞争均衡，当</p>
<ul>
<li>$q^\star=\arg\min_{q\ge0}p^\star q-c(q)$（利润最大化）。</li>
<li>$x(p^\star)=J^\star q^\star$(需求=供给)。</li>
<li>$p^\star q^\star-c(q^\star)=0$（自由进入条件）。</li>
</ul>
<p>长期供给对应：</p>
<script type="math/tex; mode=display">
Q(p)=\left\{
\begin{aligned}
    &+\infty, \text{if } \pi(p)>0\\
    &\{ Q\ge0\lvert Q=Jq \},\text{if }\pi(p)=0
\end{aligned}
\right.</script><p>如果成本函数$c(q)$规模报酬不变，即$c(q)=cq$</p>
<script type="math/tex; mode=display">
Q(p)=\left\{
\begin{aligned}
    &+\infty, \text{if } p>c\\
    &[0,+\infty),\text{if }p=c\\
    &0,\text{if }p<c
\end{aligned}
\right.</script><p>如果成本函数递增和严格凸，规模报酬递减。那么不存在长期竞争均衡。</p>
<p>要使一定数目的厂商的均衡存在，长期成本函数必须具有一个严格为正的效率规模。成本函数唯一的效率规模：$\bar c=\frac{c(\bar q)}{\bar q}$。</p>
<script type="math/tex; mode=display">
Q(p)=\left\{
\begin{aligned}
    &+\infty, \text{if } p>\bar c\\
    &\{Q\ge0\lvert Q=J\bar q\},\text{if }p=\bar c\\
    &0,\text{if }p<\bar c
\end{aligned}
\right.</script><p>长期均衡，$J=\frac{x(\bar c)}{\bar q}$。</p>
<p><span style='font-family:hei;font-size:20px'>短期和长期的比较静态分析</span></p>
<p>市场冲击时，要区分长期效应和短期效应。在长期均衡中有$J^\star$个厂商，每个厂商有$q^\star$产出。假设存在某种需求冲击。长期成本函数写为：</p>
<script type="math/tex; mode=display">
c(q)=\left\{
\begin{aligned}
    &K+\varphi(q),\text{if }q>0\\
    &0,\text{if }q=0
\end{aligned}
\right.</script><p>短期中，厂商数目仍为$J^\star$，短期成本函数为：</p>
<script type="math/tex; mode=display">
c_s(q)=K+\varphi(q),q\ge0</script>

        <blockquote>
<p>感谢知乎用户<a href='https://zhuanlan.zhihu.com/p/335529007' target='_blank'>economics-lover</a>。</p>
</blockquote>
<p>本章最重要讨论利润最大化（PMP）和支出最小化（CMP）两大问题。对于单一产出的情况，总结起来有以下三套求解线性规划的问题：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    (PMP)&&\max_{\textbf{z}\gg0} pf(\textbf{z})-\textbf{w}\cdot\textbf{z}    \notag\\
    \text{FOC:}&&
    \left\{\begin{aligned}
  &p\nabla_{\textbf{z}}f(\textbf{z}^\star)\le \textbf{w}    \notag\\
    & [p\nabla_{\textbf{z}}f(\textbf{z}^\star)-\textbf{w}]\cdot\textbf{z}^\star=0    \text{(广义KT条件)}\notag
    \end{aligned}\right.    \notag\\
    (CMP)&&\min_{\textbf{z}\gg0} \textbf{w}\cdot \textbf{z}    \notag\\
    \text{s.t. } && f(\textbf{z})\ge q    \notag\\
    \text{FOC:}&& 
    \left\{\begin{aligned}
    &\phi_{\textbf{z}} = \textbf{w}-\textbf{u}\cdot\nabla_{\textbf{z}}f(\textbf{z}^\star)\geqq\textbf{0},\textbf{z}^\star\geqq \textbf{0}    \notag\\
    &\textbf{z}^\star\cdot\phi_{\textbf{z}}= \textbf{z}^\star\cdot[\textbf{w}-\textbf{u}\cdot\nabla_{\textbf{z}}f(\textbf{z}^\star)]    =0    \notag
    \end{aligned}\right.    \notag\\
    (PMP')&&\max_{q\ge0} pq-c(\textbf{w},q)    \notag\\
    \text{FOC:}&&p-\frac{\partial c(\textbf{w},q^\star)}{\partial q}\le0    \notag
\end{eqnarray}</script><p>本章讨论生产者理论，消费和生产差不多是经济学里面最重要的两个基础内容了，学完了这个就可以逐步进入一般均衡理论了！这一章看似命题和结论很多，但是用到的数学应该只有KKT和对偶定理。</p>
<p><span style='font-family:kai'>霍特林引理是利润函数对要素价格求导，得到要素需求；谢泼德引理是成本函数对价格求导，也有支出函数对产品求导得到希克斯需求函数。</span></p>
<ol>
<li><span style='color:red'>霍特林引理</span>，如果$\textbf{y}(\bar{\textbf{p}})$是单点集，那么$\pi(\cdot)$在$\bar{\textbf{p}}$处可微且$\nabla_\textbf{p}\pi(\bar{\textbf{p}})=\textbf{y}(\bar{\textbf{p}})$。</li>
<li><span style='color:red'>谢泼德引理</span>：如果$\textbf{z}(\bar{\textbf{w}},q)$是单点集，那么$c(\cdot)$关于$\bar{\textbf{w}}$可微，并且$\textbf{z}(\bar{\textbf{w}},q)=\nabla_{\textbf{w}}c(\bar{\textbf{w}},q)$。</li>
</ol>
<h3 id="生产集"><a href="#生产集" class="headerlink" title="生产集"></a>生产集</h3><p>考虑有$L$种商品的经济系统，$\textbf{y}\in\mathbb{R}^L$表示一个生产向量。也被称为投入产出向量。注意：$\textbf{y}=(y_1,\cdots,y_L)’$，如果<span style='color:red'>分量为正，则表示产出，如果为负，则表示投入</span>。</p>
<p>所有可行的生产向量组成了生产集$Y\subset\mathbb{R}^L,\textbf{y}\in Y$表示生产可行，反之表示不可行。可以用转换函数$F(\cdot)$来方便地刻画生产集，$F(\cdot)$具有如下性质：</p>
<ul>
<li>$Y=\{\textbf{y}\lvert F(\textbf{y})\le 0 \}$，当且仅当$\textbf{y}$是$Y$边界上的一个元素时，$F(\textbf{y})=0$。</li>
<li>$Y$的边界点的集合$\{ \textbf{y}\in\mathbb{R}^L\lvert F(\textbf{y})=0 \}$被称为<strong>转换边界</strong>。</li>
<li>技术有效的生产向量：如果对于生产向量$\textbf{y}\in Y$，不存在$\textbf{y}’\in Y$，使得$\textbf{y}’\geqq\textbf{y},\textbf{y}’\neq\textbf{y} $，则该生产向量是有效率的。</li>
</ul>
<p>如果$F(\cdot)$是可微的，并且生产向量$\textbf{y}^\star$满足$F(\textbf{y}^\star)=0$，那么对于任何$l$和$k$，有：</p>
<script type="math/tex; mode=display">
MRT_{lk}(\textbf{y}^\star) = \frac{\partial F(\textbf{y}^\star)/\partial y_l}{\partial F(\textbf{y}^\star)/\partial y_k}</script><p><span style='font-family:kai'>称为在$\textbf{y}^\star$点上物品$l$对物品$k$的<u>边际转换率</u>。衡量企业减少每单位的物品$l$的产出能增加物品$k$的产出的量。</span></p>
<p>对于单一产出的生产技术，上述符号体系可以转化为：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    &&q = f(z_1,z_2,\cdots,z_{L-1})    \notag\\
    && Y=\{ (-z_1,-z_2,\cdots,-z_{L-1},q)\lvert q-f(z_1,z_2,\cdots,z_{L-1})\le 0,(z_1,\cdots,z_{L-1})\ge0) \}    \notag
\end{eqnarray}</script><p>如果只有一种商品，那么称$MRT$为边际技术替代率(marginal rate of technical substitution)。</p>
<p><span style='font-family:hei;font-size:20px'>习题5.B.3</span>证明对于单一产品的生产技术来说，$Y$是凸的当且仅当生产函数$f(\textbf{z})$是凹的。</p>
<blockquote>
<p>首先假设$Y$是凸的，令$\textbf{z},\textbf{z}’\in\mathbb{R}_+^{L-1}$以及$\alpha\in[0,1]$，于是$(-\textbf{z},f(\textbf{z}))\in Y,(-\textbf{z}’,f(\textbf{z}’))\in Y$，根据生产集的凸性，有</p>
<script type="math/tex; mode=display">
\left(-[\alpha\textbf{z}+(1-\alpha)\textbf{z}'],\alpha f(\textbf{z})+(1-\alpha)f(\textbf{z}')\right)\in Y</script><p>根据生产集的定义，有</p>
<script type="math/tex; mode=display">
\alpha f(\textbf{z})+(1-\alpha)f(\textbf{z}')\le f(\alpha\textbf{z}+(1-\alpha)\textbf{z}')</script><p>因此$f(\textbf{z})$是凹的。</p>
<p>假设$f(\textbf{z})$是凹的。令$(q,-\textbf{z})\in Y,(q’,\textbf{z}’)\in Y$，以及$\alpha\in[0,1]$，于是</p>
<script type="math/tex; mode=display">
q\le f(\textbf{z}),q'\le f(\textbf{z}')</script><p>因此</p>
<script type="math/tex; mode=display">
\alpha q+(1-\alpha)q'\le \alpha f(\textbf{z})+(1-\alpha)f(\textbf{z}')</script><p>由于$f(\textbf{z})$是凹的，</p>
<script type="math/tex; mode=display">
f(\textbf{z})+(1-\alpha)f(\textbf{z}')\le f(\alpha\textbf{z}+(1-\alpha)\textbf{z}')</script><p>因此</p>
<script type="math/tex; mode=display">
\alpha q+(1-\alpha)q'\le f(\alpha\textbf{z}+(1-\alpha)\textbf{z}')</script><p>因此$(\alpha q+(1-\alpha)q’, -[\alpha\textbf{z}+(1-\alpha)\textbf{z}’])\in Y$。</p>
<p>因此$Y$是凸集。</p>
</blockquote>
<h3 id="生产集的性质"><a href="#生产集的性质" class="headerlink" title="生产集的性质"></a>生产集的性质</h3><p>为了便于分析，经常假设生产集满足一些合意的性质，然后根据模型需要选取特定性质。<span style='color:red'>以下条件并不需要全部成立，往往只需要满足其中一些即可。</span></p>
<ol>
<li><p>$Y$非空，闭集。不然就没有研究价值了，因为生产集里面什么东西都没有就没有研究的意义了。</p>
</li>
<li><p>没有免费的午餐：$Y\cap\mathbb{R}_+^L=\varnothing$。也就是说想产出，必须要有投入品。</p>
</li>
<li><p>允许不生产：$\textbf{0}\in Y$，它的意思是没有沉没成本，但是某些时候即使不生产，也会有一定的沉没成本——比如前期的厂房。</p>
</li>
<li><p>自由处置：如果$\textbf{y}\in Y$，且$\textbf{y}’\leqq\textbf{y}$，那么$\textbf{y}’\in Y$。它的意思是企业可以以零成本处理废弃物。</p>
</li>
<li><p>生产不可逆：如果$\textbf{y}\in Y$且$\textbf{y}\neq\textbf{0}$，那么$-\textbf{y}\notin Y$，它的意思是如果企业用投入品产出了产成品，那么无法还原回去。</p>
</li>
<li><p>规模报酬非增：如果$\textbf{y}\in Y$，那么$\forall\alpha\in[0,1],\alpha\textbf{y}\in Y$</p>
<div align='center'>
  <img src='/../../images/MWG%E7%AC%AC%E4%BA%94%E7%AB%A0%E7%94%9F%E4%BA%A7%E8%80%85%E7%90%86%E8%AE%BA/image-20210303201659495.png' width=400px>
  <center style='font-family:kai'>图5.B.5 规模报酬非增性质</center>
</div>
</li>
<li><p>规模报酬非减：如果$\textbf{y}\in Y$，那么$\forall\alpha\ge1,\alpha \textbf{y}\in Y$</p>
<div align='center'>
  <img src='/../../images/MWG%E7%AC%AC%E4%BA%94%E7%AB%A0%E7%94%9F%E4%BA%A7%E8%80%85%E7%90%86%E8%AE%BA/image-20210303201804608.png' width=400px>
  <center style='font-family:kai'>图5.B.6 规模报酬非减性质</center>
</div>
</li>
<li><p>规模报酬不变：如果$\textbf{y}\in Y$，那么$\forall\alpha\ge0,\alpha\textbf{y}\in Y$</p>
<div align='center'>
  <img src='/../../images/MWG%E7%AC%AC%E4%BA%94%E7%AB%A0%E7%94%9F%E4%BA%A7%E8%80%85%E7%90%86%E8%AE%BA/image-20210303201847896.png' width=250px>
  <center style='font-family:kai'>图5.B.7 满足规模报酬不变性质的技术Y</center>
</div>
</li>
<li><p>可加性：如果$\textbf{y}\in Y,\textbf{y}’\in Y$，那么$\textbf{y}+\textbf{y}’\in Y$，显然，这意味着对于整数$k$而言，$k\textbf{y}\in Y$。含义是如果生产满足可加性，那么可以使用两个工厂分别生产$\textbf{y}$和$\textbf{y}’$从而得到$\textbf{y}+\textbf{y}’$。</p>
</li>
<li>凸性：即要求生产集$Y$是凸集。</li>
<li>凸锥：这是凸性和规模报酬不变性质的结合。定义：$\forall \textbf{y},\textbf{y}’\in Y;\alpha,\beta&gt;0$，都有$\alpha\textbf{y}+\beta\textbf{y}’\in Y$。（凸锥的性质，在<a href='https://dhndzwxj-3ghxc51j1010c2ed-1302940033.tcloudbaseapp.com/2021/01/24/%E7%AC%AC4%E7%AB%A0%E5%87%B8%E9%9B%86%E3%80%81%E5%87%B8%E9%9B%86%E5%88%86%E7%A6%BB%E5%AE%9A%E7%90%86%E4%B8%8E%E6%8B%A9%E4%B8%80%E5%AE%9A%E7%90%86/' target='_blank'>高级数理-微观的基础部分</a>笔记有详细讲解。）</li>
</ol>
<p><span style='font-family:hei;font-size:20px'><strong>命题5.B.1:</strong></span>生产集是一个凸锥当且仅当其是可加的和规模报酬非增的</p>
<p>这为生产集的凸性假设提供了合理支撑。</p>
<h3 id="利润最大化与成本最小化"><a href="#利润最大化与成本最小化" class="headerlink" title="利润最大化与成本最小化"></a>利润最大化与成本最小化</h3><h4 id="利润最大化"><a href="#利润最大化" class="headerlink" title="利润最大化"></a>利润最大化</h4><p>这就类似于效用最大化与支出最小化，求解方法也是非常相似的。</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \max_{\textbf{y}}&& \textbf{p}\cdot \textbf{y}    \notag\\
    \text{s.t. } && \textbf{y}\in Y    \notag
\end{eqnarray}</script><p>此时就体现出转换函数的妙处了，因为可以转化为：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \max_{\textbf{y}}&& \textbf{p}\cdot \textbf{y}    \notag\\
    \text{s.t. } && F(\textbf{y})\le 0    \notag
\end{eqnarray}</script><p>从而使用KKT条件求解即可~ 当然KKT条件往往是必要条件，因此会存在不少陷阱，比如这个问题可能并不存在最大值（这些都是需要注意的细节）。比如，如果$Y$不是紧集，那么最大值没办法保证。书上有一个简单的例子可以看一下。下面的习题也可以提供一些借鉴：</p>
<p><span style='font-family:hei;font-size:20px'>习题5.C.1:</span>证明：一般来说，如果生产集是规模报酬非减的，那么要么$\pi(\textbf{p})\le0$，要么$\pi(\textbf{p})=+\infty$。</p>
<blockquote>
<p>证明：</p>
<p>如果存在一个满足$\textbf{p}\cdot\textbf{y}&gt;0$的方案，那么根据报酬非减的性质，$\alpha\textbf{y}\in Y,\alpha&gt;1$，我们可能实现任何足够大的利润水平，因此$\pi(\textbf{p})=+\infty$。</p>
<p>相反同理</p>
</blockquote>
<p>如果转换函数$F(\cdot)$是可微的，此时$\textbf{y}^\star$若是最优解，那么必须满足一阶条件：$\textbf{p}=\lambda\nabla_{\textbf{y}}F(\textbf{y}^\star)$</p>
<blockquote>
<p>构造拉格朗日乘子：</p>
<script type="math/tex; mode=display">
\mathscr{L}=\textbf{p}\cdot\textbf{y}-\lambda F(\textbf{y})</script><p>一阶条件：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    &&\nabla_{\textbf{y}}\mathscr{L}= \textbf{p}-\lambda\nabla_\textbf{y}F(\textbf{y})=0    \notag\\
    &&D_\lambda\mathscr{L} = -F(\textbf{y})=0    \notag
\end{eqnarray}</script></blockquote>
<p>单一产品时，转化为：</p>
<script type="math/tex; mode=display">
\max_{\textbf{z}\gg0} pf(\textbf{z})-\textbf{w}\cdot\textbf{z}</script><p>最优解处，必要条件为</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    && p\nabla_{\textbf{z}}f(\textbf{z}^\star)\le \textbf{w}    \notag\\
    && [p\nabla_{\textbf{z}}f(\textbf{z}^\star)-\textbf{w}]\cdot\textbf{z}^\star=0    \text{(广义KT条件)}\notag
\end{eqnarray}</script><p>广义KT条件的内容参见<a href='https://dhndzwxj-3ghxc51j1010c2ed-1302940033.tcloudbaseapp.com/2021/01/25/%E7%AC%AC7%E7%AB%A0%E5%8F%A4%E5%85%B8%E6%9E%81%E5%80%BC%E4%B8%AD%E7%9A%84%E6%8B%89%E6%A0%BC%E6%9C%97%E6%97%A5%E4%B9%98%E5%AD%90%E6%B3%95/' target='_blank'>高级数理微观部分第7章8.2.2</a>。</p>
<p>容易得到两个事实，内点最优解处：</p>
<ol>
<li>投入物的边际产品等于其实际价格$\frac{\partial f(\textbf{z}^\star)}{\partial z_l}=\frac{w_l}{p}$</li>
<li>任意两种投入品边际技术替代率等于其价格之比$MRTS_{lk}=\frac{w_l}{w_k}$这其实意味着，在最优解处，每分钱投入到任何一个产品上的产出应该是一样的，不然就会发生投入的转移。</li>
</ol>
<h4 id="利润函数与供给对应的性质"><a href="#利润函数与供给对应的性质" class="headerlink" title="利润函数与供给对应的性质"></a><strong>利润函数与供给对应的性质</strong></h4><p><span style='font-family:hei;font-size:20px'><strong>命题5.C.1</strong></span></p>
<ol>
<li><p>$\pi(\cdot)$是一次齐次的。</p>
</li>
<li><p>$\pi(\cdot)$是凸函数。</p>
<blockquote>
<script type="math/tex; mode=display">
\pi(\alpha\textbf{p}+(1-\alpha)\textbf{p}')=\alpha\textbf{p}\cdot \textbf{y}+(1-\alpha)\textbf{p}'\cdot\textbf{y}\le\alpha\pi(\textbf{p})+(1-\alpha)\pi(\textbf{p}')</script></blockquote>
</li>
<li><p>如果$Y$是凸的，那么$Y=\{ \textbf{y}\in\mathbb{R}^L\lvert\textbf{p}\cdot\textbf{y}\le\pi(\textbf{p}),\forall\textbf{p}\gg\textbf{0} \}$</p>
</li>
<li><p>$\textbf{y}(\textbf{p})$是零次齐次的。</p>
</li>
<li><p>如果$Y$是凸的，那么对于任何$p$，$\textbf{y}(\textbf{p})$都是一个凸集。如果$Y$是严格凸的，那么$\textbf{y}(\textbf{p})$是单值的。</p>
</li>
<li><p><span style='color:red'>霍特林引理</span>，如果$\textbf{y}(\bar{\textbf{p}})$是单点集，那么$\pi(\cdot)$在$\bar{\textbf{p}}$处可微且$\nabla_\textbf{p}\pi(\bar{\textbf{p}})=\textbf{y}(\bar{\textbf{p}})$。</p>
</li>
<li><p>如果$\textbf{y}(\textbf{p})$在$\bar{\textbf{p}}$处可微，那么$D_\textbf{p}\textbf{y}(\bar{\textbf{p}})=D^2_\textbf{p}\pi(\bar{\textbf{p}})$是一个对称的、半正定的矩阵，且$D_\textbf{p}\textbf{y}(\bar{\textbf{p}})\bar{\textbf{p}}=0$。半正定体现了<span style='font-family:fangsong'>供给法则</span>，即某种产品价格上升，厂商愿意提供的更多，此处不存在禀赋效应，只有替代效应。</p>
</li>
</ol>
<p>对于上面的性质3，只需要生产函数$f(\cdot)$为拟凹函数即可：（<span style='font-family:kai'>利用拟凹函数的性质很轻易知道，它的上限值是凸集</span>）</p>
<script type="math/tex; mode=display">
Y(q)=\{ \textbf{z}\in\mathbb{R}_+^{L-1}\lvert f(\textbf{z})\ge q,\forall q \}\text{ is convex}</script><h4 id="成本最小化"><a href="#成本最小化" class="headerlink" title="成本最小化"></a>成本最小化</h4><p>为了便于理解，考虑单一产出品的生产技术。设$\textbf{z}$为投入品，$f(\textbf{z})$为生产函数，$q$为产出量。类似于支出最小化问题，我们求解以下问题：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \min_{\textbf{z}\gg0}&& \textbf{w}\cdot \textbf{z}    \notag\\
    \text{s.t. } && f(\textbf{z})\ge q    \notag
\end{eqnarray}</script><p>构造库恩-塔克乘子：</p>
<script type="math/tex; mode=display">
\phi(\textbf{z},\textbf{u}) = \textbf{w}\cdot\textbf{z}-\textbf{u}\cdot(f(\textbf{z})-q)</script><p>一阶条件：(广义KT条件)</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    &&\phi_{\textbf{z}} = \textbf{w}-\textbf{u}\cdot\nabla_{\textbf{z}}f(\textbf{z}^\star)\geqq\textbf{0},\textbf{z}^\star\geqq \textbf{0}    \notag\\
    &&\textbf{z}^\star\cdot\phi_{\textbf{z}}= \textbf{z}^\star\cdot[\textbf{w}-\textbf{u}\cdot\nabla_{\textbf{z}}f(\textbf{z}^\star)]    =0    \notag
\end{eqnarray}</script><p>易得内点最优解处，有：</p>
<script type="math/tex; mode=display">
MRTS_{lk}=\frac{w_l}{w_k}</script><p><span style='font-family:hei;font-size:20px'><strong>命题5.C.2:</strong> </span>假设$c(\textbf{w},q)$是与单一产品生产技术$Y$的生产函数$f(\cdot)$对应的成本函数，$\textbf{z}(\textbf{w},q)$是相应的条件要素需求对应。假设$Y$是闭的且满足自由处置性质。那么：</p>
<ol>
<li><p>$c(\cdot)$关于$\textbf{w}$一次齐次，关于$q$非递减的。</p>
</li>
<li><p>$c(\cdot)$是$\textbf{w}$的凹函数。</p>
</li>
<li><p>如果集合$\{ \textbf{z}\geqq\textbf{0}\lvert f(\textbf{z})\ge q \}$关于每个$q$都是凸的，那么$Y=\{ (-\textbf{z},q)\lvert \textbf{w}\cdot \textbf{z}\ge c(\textbf{w},q),\forall \textbf{w}\gg\textbf{0} \}$</p>
<blockquote>
<p>证明：</p>
</blockquote>
</li>
<li><p>$\textbf{z}(\cdot)$关于$\textbf{w}$是零次齐次的。</p>
</li>
<li><p>如果集合$\{\textbf{z}\geqq\textbf{0} \lvert f(\textbf{z})\ge q \}$是凸的，那么$\textbf{z}(\textbf{w},q)$是个凸集。而且如果$\{\textbf{z}\geqq\textbf{0} \lvert f(\textbf{z})\ge q \}$是一个严格凸集，那么$\textbf{z}(\textbf{w},q)$是单值的。</p>
</li>
<li><p><span style='color:red'>谢泼德引理</span>：如果$\textbf{z}(\bar{\textbf{w}},q)$是单点集，那么$c(\cdot)$关于$\bar{\textbf{w}}$可微，并且$\textbf{z}(\bar{\textbf{w}},q)=\nabla_{\textbf{w}}c(\bar{\textbf{w}},q)$。</p>
</li>
<li><p>如果$\textbf{z}(\cdot)$在点$\bar{\textbf{w}}$处可微，那么$D_\textbf{w}\textbf{z}(\bar{\textbf{w}},q)=D^2_\textbf{w}c(\bar{\textbf{w}},q)$是一个对称的半负定矩阵，且$D_\textbf{w}\textbf{z}(\bar{\textbf{w}},q)\cdot\bar{\textbf{w}}=0$。</p>
</li>
<li><p>如果$f(\cdot)$是一次齐次的，那么$c(\cdot)$和$\textbf{z}(\cdot)$关于$q$都是一次齐次的。</p>
</li>
<li><p>如果$f(\cdot)$是凹的，那么$c(\cdot)$是$q$的凸函数（边际成本关于$q$非递减）。</p>
</li>
</ol>
<p>有了成本函数，可将之前的利润最大化产量决策问题，重新表述为：</p>
<script type="math/tex; mode=display">
\max_{q\ge0} pq-c(\textbf{w},q)</script><p>易得最优解处的一阶条件为：</p>
<script type="math/tex; mode=display">
p-\frac{\partial c(\textbf{w},q^\star)}{\partial q}\le0</script><p><span style='color:red'>等号当$q^\star&gt;0$时成立</span>。(这其实也是一个广义KT条件)可知，如果最优解是内点解，那么价格等于边际成本。如果$c(\textbf{w},q)$关于$q$是凸的，那么一阶条件既是必要条件，又是充分条件。</p>
<p>两道例题仅供参考：</p>

<p>根据我所学课程的授课顺序，先整理第三章的笔记，这一章主要是在讲需求函数如何得出的，以及在什么样的情况下效用函数是连续的。这一章是全部内容中最难啃的一块骨头！</p>
<div align='center'>
  <img src='/../../images/MWG%E7%AC%AC%E4%B8%89%E7%AB%A0%EF%BC%9A%E7%BB%8F%E5%85%B8%E9%9C%80%E6%B1%82%E7%90%86%E8%AE%BA/%E6%B6%88%E8%B4%B9%E8%80%85%E9%80%89%E6%8B%A9.jpeg' width=600px>

<h2 id="第三章-经典需求理论"><a href="#第三章-经典需求理论" class="headerlink" title="第三章 经典需求理论"></a>第三章 经典需求理论</h2><p>首先，我们在理性的基础上，引入偏好的另外两个重要性质：</p>
<h3 id="1、合意性：（satiation）"><a href="#1、合意性：（satiation）" class="headerlink" title="1、合意性：（satiation）"></a>1、合意性：（satiation）</h3><p>也就是说商品越多越好，这个概念比较模糊，下面是用数学的方式来刻画合意性：</p>
<ul>
<li>单调性：定义在$X\subseteq\mathbb{R}^n$上的偏好关系$\succsim$是单调的，如果$\forall x,y\in X,x\gg y\Rightarrow x\succ y$ ，也就是说<span style='color:red'>如果$x$的每个分量都比$y$大，那么$x$比$y$更好</span>；<ul>
<li>偏好是强单调的如果：$\forall x,y\in X,x\succsim y,x\neq y\Rightarrow x\succ y$就是说只要有一个分量更好，其他分量不差，那么 $x$比$y$更好；</li>
<li>对于单调性我的理解是，为如何比较两个商品提供了依据，因为之前我们的偏好关系定义的比较抽象，此处因为这个备选集定义在了$\mathbb{R}^n$上，对其理解就容易很多。</li>
</ul>
</li>
<li>局部非饱和性：对于任何$x\in X$和任何$\varepsilon&gt;0$,都存在$y\in X$，使得$|y-x|&lt;\varepsilon$且$y\succ x$<ul>
<li>对于局部非饱和性我的理解是：它保证了无差异集不是厚的，这个厚的意思是就是不是无差异曲线了，而类似于一个无差异带.</li>
</ul>
</li>
<li>注意，单调性是比局部非饱和性更强的概念，这个我可以理解，也就是说说单调性一定有局部非饱和！</li>
</ul>
<h3 id="2、偏好的凸性："><a href="#2、偏好的凸性：" class="headerlink" title="2、偏好的凸性："></a>2、偏好的凸性：</h3><p>$X$上的偏好关系是凸的，若对于任何$x\in X$，上轮廓集$\{y\in X\lvert y\succsim x\}$是凸集，也就是说如果$y\succsim x,z\succsim x$ ，那么$\forall\alpha\in[0,1],\alpha y+(1-\alpha)z\succsim x$</p>
<p><span style='font-family:fangsong'>对于凸性我的理解是：凸性+单调性意味着边际替代率递减（注意只有凸性不行，参考评论区指出的许多同心圆，越往中间越好），也意味着个体偏好多样性。MRS递减进一步可以得到效用函数拟凹。</span></p>
<p>分析偏好往往是比较麻烦的，如果可以使用效用函数来表示偏好，就会使得分析方便许多(可以方便地进行求导），<span style='color:red'>但不是所有的理性偏好都可以用效用函数来表示，比如一个理性的字典式偏好就没办法用效用函数表示，偏好的连续性保证了其可以用连续的效用函数表示。</span>首先，给出偏好连续性的定义：</p>
<h3 id="3、偏好的连续性"><a href="#3、偏好的连续性" class="headerlink" title="3、偏好的连续性"></a>3、偏好的连续性</h3><p>$X\subseteq \mathbb{R}^n$上的偏好关系$\succsim$是连续的，如果：对于任何两个偏好序列$\{ x_n,y_n\}_{n=1}^\infty$，如果 $x_n\succ y_n$对于任何$n$都成立，并且</p>
<script type="math/tex; mode=display">
\lim_{n\rightarrow\infty} x_n=x,\lim_{n\rightarrow\infty} y_n=y</script><p>那么$x\succ y$</p>
<blockquote>
<p>偏好的连续性核心就是：偏好关系在极限运算下也成立</p>
</blockquote>
<p><span style='font-family:hei;font-size:20px'><strong>命题3.C.1:</strong></span>若$X$上的偏好关系$\succsim$是连续的，则存在能代表$\succsim$的<span style='color:red'>连续的</span>效用函数</p>
<p>因此，一般情况下，我们都假设偏好关系$\succsim$是理性的、单调的和局部非饱和的，用连续的效用函数$u(x)$来表示偏好关系，有了效用函数之后，许多问题的研究都会简单许多。</p>
<h3 id="4、-效用函数凹和拟凹"><a href="#4、-效用函数凹和拟凹" class="headerlink" title="4、 效用函数凹和拟凹"></a>4、 效用函数凹和拟凹</h3><p>凹：$u(\alpha+(1-\alpha)y)\ge \alpha u(x)+(1-\alpha)u(y)$</p>
<p>拟凹：$u(\alpha+(1-\alpha)y)\ge \min\{ u(x),u(y) \} $</p>
<ul>
<li>拟凹一个等价条件为：$\{x:u(x)&gt;t\}$是凸集。</li>
</ul>
<p>给定偏好关系和消费束，有三个相关的集合：</p>
<ul>
<li>$x$的无差异集：$\{y\in X\lvert y\sim x\}$</li>
<li>$x$的上等值集：$\{y\in X\lvert y\succsim x\}$</li>
<li>$x$的下等值集：$\{y\in X\lvert x\succsim y\}$</li>
</ul>
<h3 id="位似偏好-homothetic"><a href="#位似偏好-homothetic" class="headerlink" title="位似偏好(homothetic)"></a>位似偏好(homothetic)</h3><p>$\succsim$是位似偏好当$x\sim y\Rightarrow \alpha x\sim\alpha y,\forall\alpha&gt;0$。</p>
<ul>
<li>如果偏好是位似得，那么可以选择这样的效用函数：$u(\alpha x)=\alpha u(x)$</li>
</ul>
<div align='center'>
  <img src='/../../images/MWG%E7%AC%AC%E4%B8%89%E7%AB%A0%EF%BC%9A%E7%BB%8F%E5%85%B8%E9%9C%80%E6%B1%82%E7%90%86%E8%AE%BA/image-20210302105700354.png' width=300px>
  <center style='font-family:kai'>图3.B.5 位似偏好的无差异曲线</center>
</div>


<h3 id="拟线性（quasilinear）"><a href="#拟线性（quasilinear）" class="headerlink" title="拟线性（quasilinear）"></a>拟线性（quasilinear）</h3><p>$(-\infty,+\infty)\times\mathbb{R}_+^{L-1}$上的偏好关系关于商品1（货币）是拟线性的，当</p>
<ul>
<li>所有的无差异集彼此之间可以通过沿着商品1的坐标轴平行位移而得到：<ul>
<li>$x\sim y\Rightarrow x+\alpha e_1\sim y+\alpha e_1,\forall\alpha,e=(1,0,\cdots,0)$</li>
</ul>
</li>
<li>商品1是合意的：$x+\alpha e_1\succ x,\forall x,\alpha&gt;0$</li>
</ul>
<p>这种情况下商品1被称为<span style='color:red'>计价物商品</span>。</p>
<div align='center'>
  <img src='/../../images/MWG%E7%AC%AC%E4%B8%89%E7%AB%A0%EF%BC%9A%E7%BB%8F%E5%85%B8%E9%9C%80%E6%B1%82%E7%90%86%E8%AE%BA/image-20210303155642324.png' width=400px>
  <center style='font-family:kai'>图3.B.6 拟线性偏好的无差异曲线</center>
</div>

<p><span style='font-family:hei;font-size:20px'>习题3.C.5</span>证明如果$\succsim$关于商品1是拟线性的，当且仅当它能用$u(\textbf{x})=x_1+\phi(x_2,\cdots,x_L)$形式的效用函数$u(\textbf{x})$表示。</p>
<blockquote>
<p>证明：</p>
<p>$\succsim$如果能用$u(x)$这个形式的函数来表示，很容易证明它是拟线性的。</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \textbf{x}&\sim& \textbf{y}\Rightarrow u(\textbf{x})=u(\textbf{y})
\Rightarrow u(\textbf{x})+\alpha=u(\textbf{y})+\alpha    \notag\\
&\Rightarrow& (\alpha+x_1)+\phi(x_2\cdots,x_L)=(\alpha+y_1)+\phi(y_2\cdots,y_L)    \notag\\
&\Rightarrow& u(\textbf{x}+\alpha \textbf{e}_1)=u(\textbf{y}+\alpha \textbf{e}_1)    \notag\\
&\Rightarrow& \textbf{x}+\alpha \textbf{e}_1\sim\textbf{y}+\alpha \textbf{e}_1    \notag
\end{eqnarray}</script><p>反方向太复杂了，我不想写了。</p>
</blockquote>
<p><span style='font-family:hei;font-size:20px'>习题3.E.7</span>证明如果$\succsim$关于商品1是拟线性的，那么商品$2,3,\cdots,L$的希克斯需求函数不取决于$u$。这种情况下，支出函数具有什么样的形式？</p>
<blockquote>
<p>证明：</p>
<p>$\succsim$关于商品1是拟线性的，那么根据习题3.E.5，它可以用形式为$u(\textbf{x})=x_1+\bar u(x_2,\cdots,x_L)$的效用函数来表示。令$\textbf{e}_1=(1,0,\cdots,0)’\in\mathbb{R}^L$，</p>
<p>我们将证明对于每个$\textbf{p}\gg \textbf{0}(p_1=1)$，$u\in\mathbb{R},\alpha\in\mathbb{R}$和$\textbf{x}\in(-\infty,+\infty)\times\mathbb{R}_+^{L-1}$，如果$\textbf{x}=h(\textbf{p},u)$，那么$\textbf{x}+\alpha\textbf{e}_1=h(\textbf{p},u+\alpha)$。</p>
<p>首先注意到，因为$\textbf{x}=h(\textbf{p},u)$，根据成本最小化问题的求解过程，$u(\textbf{x})\ge u\Rightarrow u(\textbf{x})+\alpha\ge u+\alpha$。注意到：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    u(\textbf{x})+\alpha &=& x_1+\bar u(x_2,\cdots,x_L)+\alpha    \notag\\
    &=& (x_1+\alpha)+\bar u(x_2,\cdots,x_L)    \notag\\
    &=&u(\textbf{x}+\alpha\textbf{e}_1)    \notag
\end{eqnarray}</script><p><span style='color:red'>很明显，这个性质(效用的增加等于计价物商品数量的增加)是拟线性偏好独有的。</span>因此有$u(\textbf{x}+\alpha\textbf{e}_1)\ge u+\alpha$，也就是说，$\textbf{x}+\alpha\textbf{e}_1$满足$(\textbf{p},u+\alpha)$的支出最小化问题的约束。<span style='color:blue'>任取</span>$\textbf{y}\in\mathbb{R}^L_+$和$u(\textbf{y})\ge u+\alpha$，于是$u(\textbf{y})-\alpha\ge u\Rightarrow u(\textbf{y}-\alpha\textbf{e}_1)\ge u$    (理由如前面红字)。而由于$\textbf{x}=h(\textbf{p},u)$，即$\textbf{x}$是$(\textbf{p},u)$的支出最小化问题的最优解，所以$\textbf{p}\cdot(\textbf{y}-\alpha\textbf{e}_1)\ge\textbf{p}\cdot\textbf{x}$。因此，$\textbf{p}\cdot\textbf{y}\ge \textbf{p}(\textbf{x}+\alpha \textbf{e}_1)$。由$\textbf{y}$的任意性，因此，$\textbf{x}+\alpha\textbf{e}_1=h(\textbf{p},u+\alpha)$。</p>
<p><span style='font-family:fangsong'>证明$\textbf{x}+\alpha\textbf{e}_1=h(\textbf{p},u+\alpha)$这类题的套路：</span></p>
<p><span style='font-family:fangsong'>首先证明$\textbf{x}+\alpha\textbf{e}_1$满足CMP问题的约束条件。然后再任取另一个满足条件的向量，证明$\textbf{x}+\alpha\textbf{e}_1$比其更优即可。</span></p>
<p>上面的结果表明，效用只会随着商品1消费量的增加而增加。因此对于每个$l\in\{2,\cdots,L\}$，$u\in\mathbb{R},u’\in\mathbb{R}$，都有$h_l(\textbf{p},u)=h_l(\textbf{p},u’)$。即商品$2,3,\cdots,L$的希克斯需求函数不取决于$u$。因此我们定义$\tilde h(\textbf{p})=h(\textbf{p},0)$，那么$h(\textbf{p},u)=\tilde{h}(\textbf{p})+u\textbf{e}_1$。</p>
<p>由于$h(\textbf{p},u+\alpha)=h(\textbf{p},u)+\alpha\textbf{e}_1$，我们有$e(\textbf{p},u+\alpha)=e(\textbf{p},u)+\alpha$。同理有支出函数改为如下形式：</p>
<script type="math/tex; mode=display">
e(\textbf{p},u)=\tilde{e}(\textbf{p})+u</script></blockquote>
<h3 id="习题3-G-5-希克斯复合商品"><a href="#习题3-G-5-希克斯复合商品" class="headerlink" title="习题3.G.5 希克斯复合商品"></a>习题3.G.5 希克斯复合商品</h3><p>假设有两组合意商品$\textbf{x}$和$\textbf{y}$，对应的价格分别为$\textbf{p}$和$\textbf{q}$。消费者的效用函数为$u(\textbf{x},\textbf{y})$，他的财富为$w&gt;0$。假设商品组$\textbf{y}$的价格总是同时同比例变化的，因此我们可以写为$\textbf{q}=\alpha\textbf{q}_0$。对于任意实数$z\ge0$，定义函数：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \tilde u(\textbf{x},z)&=&\max_{\textbf{y}} u(\textbf{x},\textbf{y})    \notag\\
    \text{s.t. }&& \textbf{q}_0\cdot \textbf{y}\le z    \notag
\end{eqnarray}</script><p>（a）假设经济中的商品为商品组$\textbf{x}$和某种复合商品$z$（可以将$z$看作其他商品支出之和），消费者的效用函数为$\tilde u(\textbf{x},z)$，$\alpha$是复合商品$z$的价格，证明</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \max_{\textbf{x},z} &&\tilde u(\textbf{x},z)    \notag\\
    \text{s.t. }&& \textbf{p}\cdot \textbf{x} + \alpha z\le w    \notag
\end{eqnarray}</script><p>的解给出了消费者的$\textbf{x}$和$z=\textbf{q}_0\cdot\textbf{y}$的实际水平。(will give the consumer’s actual levels of $\textbf{x}$ and $z=\textbf{q}_0\cdot \textbf{y}$)</p>
<blockquote>
<p>要证明以下两条断言：</p>
<p>1、如果$(\textbf{x}^\star,z^\star)$是</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \max_{\textbf{x},z} &&\tilde u(\textbf{x},z)    \notag\\
    \text{s.t. }&& \textbf{p}\cdot \textbf{x} + \alpha z\le w    \notag
\end{eqnarray}\tag{I}</script><p>的解，那么存在着$\textbf{y}^\star$使得$\textbf{q}\cdot\textbf{y}^\star\le z^\star$，而且$(\textbf{x}^\star,\textbf{y}^\star)$是</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \max_{\textbf{x},\textbf{y}} && u(\textbf{x},\textbf{y})    \notag\\
    \text{s.t. }&& \textbf{p}\cdot \textbf{x} + (\alpha\textbf{q}_0)\cdot\textbf{y}\le w    \notag
\end{eqnarray}\tag{II}</script><p>的解。</p>
<p>2、如果$(\textbf{x}^\star,\textbf{y}^\star)$是问题(II)的解，那么$(\textbf{x}^\star,\textbf{q}_0\cdot\textbf{y}^\star)$是问题(I)的解。</p>
<p><span style='font-family:hei;font-size:20px'>先证明1</span></p>
<p>假设$(\textbf{x}^\star,z^\star)$是问题（I）的解，于是根据$\tilde u(\cdot)$的定义，存在着$\textbf{y}^\star$使得$\textbf{q}_0\cdot\textbf{y}^\star\le z^\star$，而且$u(\textbf{x}^\star,\textbf{y}^\star)=\tilde u(\textbf{x}^\star,z^\star)$。令$(\textbf{x},\textbf{y})$满足$\textbf{p}\cdot\textbf{x}+(\alpha\textbf{q}_0)\cdot\textbf{y}\le w$。于是：</p>
<script type="math/tex; mode=display">
u(\textbf{x},\textbf{y})\le \tilde u(\textbf{x},\textbf{q}_0\cdot \textbf{y})\le \tilde u(\textbf{x}^\star,z^\star)=u(\textbf{x}^\star,\textbf{y}^\star)</script><p>其中，第一个不等式根据$\tilde u(\cdot)$的定义推知，第二不等式根据(I)的约束条件$\textbf{p}\cdot\textbf{x}+\alpha(\textbf{q}_0\textbf{y})=\textbf{p}\cdot\textbf{x}+(\alpha\textbf{q}_0)\textbf{y}\le w$和$(\textbf{x}^\star,z^\star)$的定义推知。这样的一个断言得到证明。</p>
<p><span style='font-family:hei;font-size:20px'>再证明2</span></p>
<p>假设$(\textbf{x}^\star,\textbf{y}^\star)$是问题（II）的解，对于每一个$\textbf{y}$，如果$\textbf{q}_0\cdot\textbf{y}\le \textbf{q}_0\cdot\textbf{y}^\star$，那么：</p>
<script type="math/tex; mode=display">
\textbf{p}\cdot\textbf{x}^\star+(\alpha\textbf{q}_0)\cdot\textbf{y}
=\textbf{p}\cdot\textbf{x}^\star+\alpha(\textbf{q}_0\cdot\textbf{y})
\le \textbf{p}\cdot\textbf{x}^\star+\alpha(\textbf{q}_0\cdot\textbf{y}^\star)\le w</script><p>所以，$u(\textbf{x}^\star,\textbf{y})\le u(\textbf{x}^\star,\textbf{y}^\star)$。因此，$u(\textbf{x}^\star,\textbf{y}^\star)=\tilde u(\textbf{x}^\star,\textbf{q}_0\cdot\textbf{y}^\star)$。</p>
<p>现在令$(\textbf{x},z)$满足$\textbf{p}\cdot \textbf{x}+\alpha z\le w$。于是存在着$\textbf{y}$使得$\textbf{q}_0\cdot\textbf{y}\le z$和$u(\textbf{x},\textbf{y})=\tilde u(\textbf{x},z)$。所以，$\textbf{p}\cdot\textbf{x}+(\alpha\textbf{q}_0)\cdot\textbf{y}=\textbf{p}\cdot\textbf{x}+\alpha(\textbf{q}_0\cdot\textbf{y})\le\textbf{p}\cdot\textbf{x}+\alpha z\le w$。因此：</p>
<script type="math/tex; mode=display">
\tilde u(\textbf{x},z)=u(\textbf{x},\textbf{y})\le u(\textbf{x}^\star,\textbf{y}^\star)=\tilde u(\textbf{x}^\star,\textbf{q}_0\cdot\textbf{y}^\star)</script><p>第二个断言得证。</p>
</blockquote>
<h3 id="字典序偏好"><a href="#字典序偏好" class="headerlink" title="字典序偏好"></a>字典序偏好</h3><p>一个例子，设$\textbf{x}=(x_1,x_2)’,\textbf{y}=(y_1,y_2)’$，字典序偏好是说：</p>
<ul>
<li>如果$x_1&gt;y_1$，则$\textbf{x}\succsim \textbf{y}$。</li>
<li>如果$x_1=y_1,x_2&gt;y_2$，则$\textbf{x}\succsim\textbf{y}$。</li>
<li>如果$x_1=y_1,x_2=y_2$，则$\textbf{x}\sim\textbf{y}$。</li>
</ul>
<p>这一偏好是理性的： 满足完备性、传递性的、强单调的和严格凸的，但是不连续，因此没有效用函数。</p>
<p><span style='font-family:hei;font-size:20px'>证明不存在能表示字典序偏好关系的效用函数</span></p>
<p>假设存在某个效用函数$u(\cdot)$。对于每个$x_1$，我们可以选择一个有理数$r(x_1)$使得$u(x_1,2)&gt;r(x_1)&gt;u(x_1,1)$（数学分析里，有一个<strong>有理数的致密性</strong>保证这个不等式存在）。</p>
<p>注意，消费者的偏好是字典序的，$x_1&gt;x_1’$意味着$r(x_1)&gt;u(x_1,1)&gt;u(x’_1,2)&gt;r(x_1’)$。因此$r(\cdot)$给出了从实数集到有理数集一对一的函数（数学上的“双射”）。利用一些实变函数的知识，这是不可能的。</p>
<p><span style='font-family:hei;font-size:20px'>证明字典序的偏好是不连续的</span></p>
<p>考虑消费束序列$\textbf{x}^n=(\frac1n,0)’$和$\textbf{y}^n=(0,1)’$。对于每个$n$，都有$x\succ y$。但</p>
<script type="math/tex; mode=display">
\lim_{n\rightarrow+\infty}\textbf{y}^n=(0,1)'\succ(0,0)'=\lim_{n\rightarrow+\infty}\textbf{x}^n</script><p>由于连续的偏好一定存在效用函数，字典序偏好不连续也说明了确实不存在效用函数来表示字典序偏好。</p>
<h3 id="消费者决策模型"><a href="#消费者决策模型" class="headerlink" title="消费者决策模型"></a>消费者决策模型</h3><p>消费集是商品空间$\mathbb{R}^L$上的一个子集，记作$X\subseteq \mathbb{R}^L$，其元素为个人在所处环境下物理约束给定情况下尽可能的<span style='color:red'>消费束</span>。最基本的：</p>
<script type="math/tex; mode=display">
X=\mathbb{R}_+^L = \{ \textbf{x}\in\mathbb{R}^L \lvert x_l\ge 0,l=1.\cdots,L\}</script><p>瓦尔拉斯或竞争性<span style='color:red'>预算集</span>：</p>
<script type="math/tex; mode=display">
B_{\textbf{p},w}=\{\left. \textbf{x}\in\mathbb{R}_+^L\right\lvert \textbf{p}\cdot \textbf{x}\le w \}</script><p>注意的是，消费者的效用偏好不会受到外生因素$\textbf{p},w$等的影响。</p>
<p>消费者关心两个问题：</p>
<ol>
<li>约束下的效用最大化问题——调整商品组合在预算约束下实现效用最大化</li>
<li>和支出最小化问题——调整商品组合在效用约束下（达到一定效用之后）实现支出最小化</li>
</ol>
<p>这两个问题在某种程度上是等价的，首先来看效用最大化问题：</p>
<h4 id="效用最大化问题UMP"><a href="#效用最大化问题UMP" class="headerlink" title="效用最大化问题UMP"></a>效用最大化问题UMP</h4><p>给定预算约束的时候，如何实现效用最大化：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \max_{\textbf{x}\ge 0}&& u(\textbf{x})    \notag\\
    \text{s.t.}&& \textbf{p}\cdot \textbf{x}\le w    \notag
\end{eqnarray}</script><p>有以下命题成立：</p>
<p><span style='font-family:hei;font-size:20px'>命题3.D.1: </span>若$p\gg \textbf{0}$且$u(\cdot)$是连续的，则效用最大化问题有解</p>
<p>给定上述最优化问题之后，实际上就转化成一个数学规划问题了，用拉格朗日乘子法、KKT定理等方法求解即可.</p>
<p>利用KKT条件可知，如果$\textbf{x}^\star(\textbf{p},w)$是一个内部最优解（这意味着$x\gg \textbf{0}$），并且满足约束规格（此处一定满足约束规格，因为价格向量不为0）那么有：</p>
<script type="math/tex; mode=display">
\nabla_\textbf{x}u(\textbf{x}^\star)=\lambda^\star \textbf{p}</script><p>如果$\nabla_\textbf{x}u(\textbf{x}^\star)\gg \textbf{0}$，那么$\lambda^\star$不为0，此时有</p>
<script type="math/tex; mode=display">
\frac{\partial u(\textbf{x}^\star)_i/\partial x_i}{\partial u(\textbf{x}^\star)_j/\partial x_j} = \frac{p_i}{p_j}</script><p>也就是说在最优点处边际效用之比等于价格之比。</p>
<p>让价格作为分母之后，可得：</p>
<script type="math/tex; mode=display">
\frac{\partial u(x^\star)/\partial x_i}{p_i} = \frac{\partial u(x^\star)/\partial x_j}{p_j}</script><p>也可以得到最优点处，每一块钱买任何产品带来的边际效用相同。注意，此结论在边角解处并不成立，所以也不要盲目使用KKT条件，先看看是否满足KKT条件的假设.</p>
<p>通过以上分析可知，给定一组$(\textbf{p},w)$我们可以得到最优解时的$\textbf{x}^\star(\textbf{p},w)$，将其称为<span style='color:red'>瓦尔拉斯需求（马歇尔需求）</span>。它具有<span style='font-family:fangsong'>零次齐次性、满足瓦尔拉斯定律并且满足凸性假设</span>。</p>
<ul>
<li>零次齐次：$\textbf{x}^\star(\alpha\textbf{p},\alpha w)=\textbf{x}^\star(\textbf{p},w)$</li>
<li>瓦尔拉斯定律：$\forall \textbf{x}^\star\in X^\star(\textbf{p},w),\textbf{p}\cdot \textbf{x}^\star=w$</li>
<li>凸性：$\succsim$是凸偏好，那么$X^\star$是凸集。如果$X^\star$严格凸，那么最优解是唯一的。</li>
</ul>
<p>求解出最优的$\textbf{x}^\star(\textbf{p},w)$之后，$u(\textbf{x}^\star(\textbf{p},w))$就是效应最大化时的效用，可以直接用$v(\textbf{p},w)=u(\textbf{x}^\star(\textbf{p},w))$来表示消费者的效用，这被称之为间接效用函数。它是零次齐次性函数。</p>
<p><span style='font-family:hei;font-size:18px'>财富的边际增加导致的效用变化为：</span></p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \frac{\partial u(\textbf{x}(\textbf{p},w))}{\partial w}
    &=& \nabla_\textbf{x}    u(\textbf{x}(\textbf{p},w)) D_w\textbf{x}(\textbf{p},w)    \notag\\
    &=& \lambda\textbf{p}\cdot D_w\textbf{x}(\textbf{p},w)    \notag
\end{eqnarray}\tag{*}</script><p>根据瓦尔拉斯定律：</p>
<script type="math/tex; mode=display">
\textbf{p}\cdot \textbf{x}^\star(\textbf{p},w)=w</script><p>两边关于$w$求导：</p>
<script type="math/tex; mode=display">
\textbf{p}\cdot D_w\textbf{x}^\star(\textbf{p},w)=1</script><p>代入$(\star)$，得到：</p>
<script type="math/tex; mode=display">
\frac{\partial u(\textbf{x}(\textbf{p},w))}{\partial w}=\lambda</script><p>由此可知，KT乘子$\lambda$的含义是最优点上消费者财富的边际效用价值。</p>
<h4 id="支出最小化问题"><a href="#支出最小化问题" class="headerlink" title="支出最小化问题"></a>支出最小化问题</h4><p>消费者面临的另一个问题是支出最小化问题：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \min_{\textbf{x}\ge 0}&& \textbf{p}\cdot \textbf{x}    \notag\\
    \text{s.t.}&& u(\textbf{x})\ge u_0    \notag
\end{eqnarray}</script><p>也就是达到一定效用之后，如何求解最小支出的问题，容易知道这个也是一个可以使用KKT条件求解的问题。这里得到的最优的$x^\star(\textbf{p},u_0)$被称为<span style='color:red'>希克斯需求</span>，通常写为$h(\textbf{p},u_0)$，最优解处对应的支出函数为$e(\textbf{p},u_0)$。</p>
<p>以下命题总结了效用最大化和支出最小化之间的关系：</p>
<p><span style='font-family:hei;font-size:20px'>命题3.E.1：</span>假设定义在消费集$X=\mathbb{R}_+^n$上的局部非饱和偏好关系$\succsim$可用连续效用函数$u(\cdot)$表示；而且价格向量$\textbf{p}\gg \textbf{0}$那么，我们有：</p>
<ul>
<li>如果财富$w&gt;0$时$\textbf{x}^\star$是UMP中最优的，则对于既定的目标效用水平$u(\textbf{x}^\star)$,$\textbf{x}^\star$在EMP问题中也是最优的，并且这个EMP的最小支出水平恰好为$w$.</li>
<li>如果目标效用水平$u&gt;u_0$时，$\textbf{x}^\star$是UMP中最优的，则当$w=\textbf{p}\cdot\textbf{x}^\star$时 ，$\textbf{x}^\star$ 在UMP问题中也是最优的，并且这个UMP的最大效用水平恰好为$u_0$.</li>
</ul>
<p>即</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    &&h(\textbf{p},u) = x(\textbf{p},e(\textbf{p},u))    \notag\\
    &&x(\textbf{p},w) = h(\textbf{p},v(\textbf{p},w))    \notag
\end{eqnarray}</script><p>这样，我们就建立起了希克斯需求对应和瓦尔拉斯需求对应的联系。</p>
<p><span style='font-family:hei;font-size:18px'>补偿需求法则</span></p>
<p>希克斯需求函数满足对所有的$\textbf{p}’,\textbf{p}’’$，有：</p>
<script type="math/tex; mode=display">
(\textbf{p}''-\textbf{p}')\cdot[h(\textbf{p}'',u)-h(\textbf{p}',u)]\le 0</script><h3 id="对偶问题"><a href="#对偶问题" class="headerlink" title="对偶问题"></a>对偶问题</h3><div align='center'>
  <img src='/../../images/MWG%E7%AC%AC%E4%B8%89%E7%AB%A0%EF%BC%9A%E7%BB%8F%E5%85%B8%E9%9C%80%E6%B1%82%E7%90%86%E8%AE%BA/image-20210302160809407.png' width=400px>
  <center style='font-family:kai'>对偶问题关系图</center>
</div>

<p><span style='font-family:hei;font-size:20px'>希克斯需求和支出函数：</span></p>
<script type="math/tex; mode=display">
e(\textbf{p},u)=\textbf{p}h(\textbf{p},u)\Rightarrow h(\textbf{p},u)=\nabla_{\textbf{p}}e(\textbf{p},u)</script><p><span style='font-family:hei;font-size:20px'>希克斯需求和瓦尔拉斯需求：</span></p>
<p>希克斯需求不是直接可以观测的，而瓦尔拉斯需求是可以直接观测到的，二者之间的关系通过<span style='color:red'>Slutsky方程</span>表达出来：</p>
<p>假设$u(\cdot)$是一个连续效用函数，代表一个定义咋消费集$X$上的<strong>局部非饱和的严格凸</strong>偏好关系。对于所有$(\textbf{p},w)$和$u=v(\textbf{p},w)$，有</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \frac{\partial h_l}{\partial p_k}&=&\frac{\partial x_l(\textbf{p},w)}{\partial p_k}+\frac{\partial x_l(\textbf{p},w)}{\partial w}x_k(\textbf{p},w)    \notag\\
    D_{\textbf{p}}h(\textbf{p},u)&=&D_{\textbf{p}}\textbf{x}(\textbf{p},w)+D_w\textbf{x}(\textbf{p},w)\textbf{x}(\textbf{p},w)    \notag
\end{eqnarray}</script><div align='center'>
  <img src='/../../images/MWG%E7%AC%AC%E4%B8%89%E7%AB%A0%EF%BC%9A%E7%BB%8F%E5%85%B8%E9%9C%80%E6%B1%82%E7%90%86%E8%AE%BA/image-20210302183501089.png' width=300px>
  <center style='font-family:kai'>马歇尔需求函数和希克斯需求函数</center>
</div>

<blockquote>
<p>如上图所示，根据对偶的性质，在达到均衡的时候两条曲线是相交的：</p>
<script type="math/tex; mode=display">
\textbf{h}(\textbf{p}^\star,u)=\textbf{x}(\textbf{p}^\star,w)=\textbf{x}(\textbf{p}^\star,e(\textbf{p}^\star,u))</script><p>因此：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    D_{\textbf{p}}\textbf{h}(\textbf{p}^\star,u)
&=&D_{\textbf{p}}\textbf{x}(\textbf{p}^\star,w)+D_w\textbf{x}(\textbf{p}^\star,w)\cdot D_{\textbf{p}}e(\textbf{p}^\star,w)    \notag\\
&=& D_{\textbf{p}}\textbf{x}(\textbf{p}^\star,w)+D_w\textbf{x}(\textbf{p}^\star,w)\cdot\textbf{x}(\textbf{p}^\star,w)    \notag
\end{eqnarray}</script></blockquote>
<p>如图所示，瓦尔拉斯需求曲线比希克斯需求曲线更加平缓，考察斯拉茨基方程，当$p_l$上升到大于$\bar p_l$的时候，如果我们想维持效用水平不变，必须要增加消费者的财富。因此，如果商品$l$是正常商品，在不进行补偿的情形下，消费者对它的需求会下降更多。</p>
<p><span style='font-family:hei;font-size:20px'>斯拉茨基替代矩阵</span></p>
<script type="math/tex; mode=display">
S(\textbf{p},w)=D_\textbf{p}h(\textbf{p},u)</script><p>它的性质是半负定、对称，满足$S(\textbf{p},w)\textbf{p}=0$</p>
<p><span style='font-family:hei;font-size:20px'>命题3.G.2</span>假设$u(\cdot)$是一个连续效用函数，代表一个定义在消费集$X$上的局部非饱和的和严格凸的偏好关系；$h(\textbf{p},u)$连续可微，则有</p>
<ol>
<li>$D_\textbf{p}h(\textbf{p},u)=D_\textbf{p}^2e(\textbf{p},u)$</li>
<li>$D_\textbf{p}h(\textbf{p},u)$是半负定矩阵</li>
<li>$D_\textbf{p}h(\textbf{p},u)$是对称矩阵</li>
<li>$D_\textbf{p}h(\textbf{p},u)\textbf{p}=0$</li>
</ol>
<p><span style='font-family:hei;font-size:20px'>罗伊恒等式</span></p>
<p>假设$u(\cdot)$是一个连续效用函数，代表一个定义在消费集$X$上的局部非饱和的和严格凸的偏好关系。假设间接效用函数$v(\textbf{p},w)$是可微的，则</p>
<script type="math/tex; mode=display">
\textbf{x}(\textbf{p},w)=-\frac{1}{\nabla_w v(\textbf{p},w)}\nabla_\textbf{p}v(\textbf{p},w)</script><blockquote>
<p>因为$v(\textbf{p},e(\textbf{p},\bar u))=\bar u,\forall \textbf{p}$，因此设$\bar u =v(\bar{\textbf{p}},\bar w)$。</p>
<p>关于$\textbf{p}$求导，得到：</p>
<script type="math/tex; mode=display">
\nabla_{\textbf{p}}v(\bar{\textbf{p}},\bar e(\bar{\textbf{p}},\bar u))+\nabla_wv(\bar{\textbf{p}},\bar e(\bar{\textbf{p}},\bar u))\nabla_{\textbf{p}}e(\bar{\textbf{p}},\bar u))=0</script><p>根据希克斯需求的定义：</p>
<script type="math/tex; mode=display">
\nabla_{\textbf{p}}e(\bar{\textbf{p}},\bar u)) 
= h(\bar{\textbf{p}},\bar u)
= \textbf{x}(\bar{\textbf{p}},\bar w)</script><p>代入上面，得到罗伊恒等式。</p>
</blockquote>
<h3 id="3-I-经济变化的福利评价"><a href="#3-I-经济变化的福利评价" class="headerlink" title="3.I 经济变化的福利评价"></a>3.I 经济变化的福利评价</h3><p>这一节关注的主要是<span style='color:red'>价格变动的福利效应</span>。</p>
<p>考虑理性、连续、局部非饱和的偏好关系。假设支出函数和间接效用函数是可微的。注意以下几点：</p>
<ul>
<li>$v(\textbf{p},w)&gt;v(\textbf{p}’,w’)$意味着消费者更加偏好$(\textbf{p},w)$。</li>
<li>$e(\textbf{p},u)&lt;e(\textbf{p}’,u)$说明消费者在价格为$\textbf{p}’$时，比在价格为$\textbf{p}$时情况更坏。</li>
<li>我们要讨论以下两个问题：<ul>
<li>为了补偿因外生变量发生改变带来的损失，要支付消费者多少？</li>
<li>这一改变带来的变化等价于多少的财富？</li>
</ul>
</li>
</ul>
<p>两种价格分别为$\textbf{p}^0$和$\textbf{p}^1$。有两种度量福利变化的指标：等价变化$EV$和补偿变化$CV$。令</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    &&u^0=v(\textbf{p}^0,w),u^1=v(\textbf{p}^1,w)    \notag\\
    &&e(\textbf{p}^0,u^0)=e(\textbf{p}^1,u^1)=w    \notag
\end{eqnarray}</script><p>第一行的是间接效用函数，第二行的是用<strong>货币度量的间接效用函数</strong>。后面的计算使用的主要是货币度量的间接效用函数。注意到，<span style='color:red'>上面两个式子中财富$w$是不变的。</span>用式子变量两种变化：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    EV(\textbf{p}^0,\textbf{p}^1,w) &=& e(\textbf{p}^0,u^1) - e(\textbf{p}^0,u^0)
    =e(\textbf{p}^0,u^1)-w    \notag\\
    &=& e(\textbf{p}^0,u^1)-e(\textbf{p}^1,u^1)
    =\int_{p_1^1}^{p_1^0} h_1(p_1,\bar{\textbf{p}}_{-1},u^1)\text{d}p_1    \notag
\end{eqnarray}</script><p>积分那里为了简单起见，只有商品1的价格发生了变化，因此有$p_1^0\neq p_1^1,\textbf{p}_{-1}^0=\textbf{p}_{-1}^1=\bar{\textbf{p}}_{-1}$。<span style='font-family:kai'>等价性变化可以想象成一笔财富，消费者在接受这笔财富还是接受价格变化之间无差异。也就是说，等价性变化的是消费者的财富的变化。</span>我们也可以用间接效用函数来表示等价变化：$v(\textbf{p}^0,w+EV)=u^1$。</p>
<blockquote>
<p>如果$u_1=v(\textbf{p}^0,w+EV)$，那么</p>
<script type="math/tex; mode=display">
e(\textbf{p}^0,u^1)=e(\textbf{p}^0,v(\textbf{p}^0,w+EV))=w+EV</script><p>正是EV的定义式。</p>
</blockquote>
<script type="math/tex; mode=display">
\begin{eqnarray}
    CV(\textbf{p}^0,\textbf{p}^1,w) &=& e(\textbf{p}^1,u^1) - e(\textbf{p}^1,u^0)
    =w-e(\textbf{p}^1,u^1)    \notag\\
    &=& e(\textbf{p}^0,u^0)-e(\textbf{p}^1,u^0)
    =\int_{p_1^1}^{p_1^0} h_1(p_1,\bar{\textbf{p}}_{-1},u^0)\text{d}p_1    \notag
\end{eqnarray}</script><p>积分那里为了简单起见，只有商品1的价格发生了变化，因此有$p_1^0\neq p_1^1,\textbf{p}_{-1}^0=\textbf{p}_{-1}^1=\bar{\textbf{p}}_{-1}$。<span style='font-family:kai'>补偿性变化衡量的是当商品价格变化时为了让消费者回到原来的效用水平$u^0$，我们必须补偿给他的净财富。[因此，如果我们必须补偿消费者正的净收入（此时因为价格改变消费者的状况变差了），那么补偿性变化是负的]可以将这笔财富看作为了让消费者接受价格变化，他恰好愿意接受的补偿财富。</span>用间接效用函数表示补偿性变化为：$v(\textbf{p}^1,w-CV)=u^0$。</p>
<p><span style='color:red'>注意到，两种变化都是假定价格不变的情况下，效用改变带来的财富变化。只不过等价变化采用的是变化前的价格，而补偿变化采用的是变化后的价格。</span>等价变化是说价格改变给消费者带来的财富变化，等价于在旧的价格水平下多少增加了多少效用；而补偿变化是说价格改变后我们要补偿多少财富才能保持效用水平和原来一样。</p>
<p>消费者在$\textbf{p}^1$时状况更好，当且仅当$EV,CV$都为正数。一般来讲二者并不相等。</p>
<div align='center'>
  <img src='/../../images/MWG%E7%AC%AC%E4%B8%89%E7%AB%A0%EF%BC%9A%E7%BB%8F%E5%85%B8%E9%9C%80%E6%B1%82%E7%90%86%E8%AE%BA/image-20210303110346679.png' width=500px>
  <center style='font-family:kai'>等价性变化和补偿性变化（图中阴影部分）</center>
  <p align='left' style='font-family:kai'>
    如上图所示，商品1的价格下降了。如果商品1是正常品，那么外生参数价格下降的结果必然是希克斯需求曲线的右移。
  </p>
</div>

<p>当商品1是正常品的情形，$EV&gt;CV$。当商品1时劣等品时，$EV&lt;CV$。</p>
<p><span style='font-family:hei;font-size:20px'>特殊情形</span>如果偏好对商品1是<span style='color:red'>拟线性的</span>，那么财富效应对商品1不存在，此时有$EV=CV$。这是因为：</p>
<script type="math/tex; mode=display">
h_1(p_1,\bar{\textbf{p}}_{-1},u^0) 
= x_1(p_1,\bar{\textbf{p}}_{-1},w)
= h_1(p_1,\bar{\textbf{p}}_{-1},u^1)</script><blockquote>
<p>证明：</p>
<p>已有证明，对于拟线性的商品，可以将支出函数写为如下形式：</p>
<script type="math/tex; mode=display">
e(\textbf{p},u)=\tilde{e}(p_2,\cdots,p_L)+u\quad(p_1=1)</script><p>因此，</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    EV(\textbf{p}^0,\textbf{p}^1,w)&=& e(\textbf{p}^0,u^1)-e(\textbf{p}^0,u^0)    \notag\\
  &=& \left(\tilde{e}(p_2^0,\cdots,p_L^0)+u^1 \right) 
  - \left( \tilde{e}(p_2^0,\cdots,p_L^0)+u^0 \right)    \notag\\
  &=& u^1-u^0    \notag\\
    CV(\textbf{p}^0,\textbf{p}^1,w)&=& e(\textbf{p}^1,u^1)-e(\textbf{p}^1,u^0)\notag\\
    &=&    \left(\tilde{e}(p_2^1,\cdots,p_L^1)+u^1 \right) 
  - \left( \tilde{e}(p_2^1,\cdots,p_L^0)+u^0 \right)    \notag\\
  &=& u^1-u^0    \notag
\end{eqnarray}</script><p>所以$CV=EV$对于任意$(\textbf{p}^0,\textbf{p}^1,w)$都成立。</p>
</blockquote>
<p><span style='font-family:hei;font-size:24px'>商品税导致的净损失</span></p>
<p>考虑因政府对某种商品征税从而使得价格向量从$\textbf{p}^0$上升到$\textbf{p}^1$的情形。为了更具体些，假设对商品1征税，消费者每购买一单位商品1需要缴纳$t$的税收。这种税使得商品1的实际价格变为$p_1^1=p_1^0+t$，所有其他商品的价格维持在原来的水平上。政府筹集的税收总收入为$T=tx_1(\textbf{p}^1,w)$。</p>
<p>政府也可以不收商品税，而是直接对消费者的财富征收定额税，这种税收不会改变商品价格。如果两种情况下的税收总额相同，消费者在哪种税制下的状况更差一些？</p>
<p>如果商品税的等价性变化EV小于他在定额税下的损失（$-T$），那么征收商品税会使消费者的状况变得更差。用支出函数表达就是：</p>
<script type="math/tex; mode=display">
w-T>e(\textbf{p}^0,u^1)</script><p>消费者在缴纳定额税后所剩的财富，大于在价格为$\textbf{p}^0$时为达到效用水平$u^1$所必须的财富水平，那么与征收定额税相比，征税商品税会使消费者的状况变得更差。其差额为</p>
<script type="math/tex; mode=display">
(-T)-EV(\textbf{p}^0,\textbf{p}^1,w)=w-T-e(p^0,u^1)</script><p>被称为<span style='color:red'>商品税造成的无谓损失</span>。</p>
<h2 id="第二章-消费者选择"><a href="#第二章-消费者选择" class="headerlink" title="第二章 消费者选择"></a>第二章 消费者选择</h2><p>首先，给定收入（禀赋）$w$（注意：$w$是一个标量）和商品价格$\textbf{p}$（注意：$\textbf{p}$是一个$L$维向量，表示$L$种商品的价格），消费者会有一个商品选择$\textbf{x}(\textbf{p},w)$，当然可能会同时有多个商品选择，这里先限制为1个，并且假设$\textbf{x}(\textbf{p},w)$是连续的，$\textbf{x}(\textbf{p},w)$被称为马歇尔需求函数。这个函数在上文已经提到。</p>
<p>有了需求函数后，就可以做比较静态分析了，比如分析财富$w$变动对需求的影响，只需保持价格$\textbf{p}$不变，对$w$求偏导即可：</p>
<script type="math/tex; mode=display">
D_w\textbf{x}(\textbf{p},w) = \left( \frac{\partial x_1(\textbf{p},w)}{\partial w},\cdots, \frac{\partial x_L(\textbf{p},w)}{\partial w} \right)'</script><p>同理，可以分析价格变化对需求的影响，也只需要求偏导即可，也就是雅克比矩阵。</p>
<h3 id="零次齐次性与欧拉公式"><a href="#零次齐次性与欧拉公式" class="headerlink" title="零次齐次性与欧拉公式"></a>零次齐次性与欧拉公式</h3><p>假定马歇尔需求函数满足零次齐次性，即</p>
<script type="math/tex; mode=display">
\textbf{x}(\alpha \textbf{p},\alpha w)=\textbf{x}(\textbf{p},w)</script><p>对$\alpha$进行求导：</p>
<script type="math/tex; mode=display">
\textbf{p}'\nabla_{\alpha\textbf{p} }\textbf{x}(\alpha\textbf{p},\alpha w)
+D_{\alpha w}\textbf{x}(\alpha\textbf{p},\alpha w)\cdot w=0</script><p>令$\alpha=1$，得到：</p>
<script type="math/tex; mode=display">
\textbf{p}'\nabla_{\textbf{p} }\textbf{x}(\textbf{p}, w)
+D_{w}\textbf{x}(\textbf{p},w)\cdot w=0</script><p>写成分量求和的形式：</p>
<script type="math/tex; mode=display">
\sum_{k=1}^L \frac{\partial x_l(\textbf{p},w)}{\partial p_k}p_k
+\frac{\partial x_l(\textbf{p},w)}{\partial w}w=0</script><p>这里利用的是欧拉公式。不妨变成弹性的形式：</p>
<script type="math/tex; mode=display">
\sum_{k=1}^L \frac{\partial x_l(\textbf{p},w)}{\partial p_k}\cdot\frac{p_k}{x_l(\textbf{p},w)}
+\frac{\partial x_l(\textbf{p},w)}{\partial w}\cdot\frac{w}{x_l(\textbf{p},w)}=0;\quad l=1,\cdots,L</script><p>即：</p>
<script type="math/tex; mode=display">
\sum_{k=1}^L \varepsilon_{lk} +\varepsilon_{lw}=0;\quad l=1,\cdots,L</script><p>对于固定的价格$\textbf{p}^0$，关于财富的函数$\textbf{x}(\textbf{p}^0,w)$称为消费者的恩格尔函数。其图像称为财富扩展路径。（恩格尔曲线）$\frac{\partial x_l(\textbf{p},w)}{\partial w}$上面的被称为财富效应（收入效应）。</p>
<hr>
<p>第二个性质是马歇尔定律，$\textbf{p}\cdot\textbf{x}(\textbf{p},w)=w$，两边对价格$\textbf{p}$求导，</p>
<script type="math/tex; mode=display">
\textbf{x}(\textbf{p},w)+\textbf{p}'\nabla_\textbf{p}\textbf{x}(\textbf{p},w)=0</script><p>这被称为<span style='color:red'>古诺加和</span>。上式表明：<strong>价格的变化不会引起总支出的变化，也就是说价格</strong>$p_k$<strong>的变化，对总支出</strong>$\textbf{p}\cdot\textbf{x}(\textbf{p},w)$<strong>的影响为0，也就是说可能多买这个，少买那个，但是总支出一定不会变！</strong></p>
<p>两边对$w$求导，可得：</p>
<script type="math/tex; mode=display">
\textbf{p}'D_w\textbf{x}(\textbf{p},w)=1</script><p>这被称为<span style='color:red'>恩格尔加和</span>。<strong>上式表明，财富变化一个单位引起的总支出的变化量一定等于总财富的变化量</strong>。</p>
<h3 id="价格效应"><a href="#价格效应" class="headerlink" title="价格效应"></a>价格效应</h3><p>导数$\frac{\partial x_l(\textbf{p},w)}{\partial p_k}$称为商品$k$的价格$p_k$对商品$l$需求的价格效应。</p>
<p>1、自身价格效应</p>
<ul>
<li>如果$\frac{\partial x_l(\textbf{p},w)}{\partial p_l}\le 0$，称为满足需求法则</li>
<li>如果$\frac{\partial x_l(\textbf{p},w)}{\partial p_l}&gt;0$，称商品是吉芬品。</li>
</ul>
<p>2、交叉价格效应</p>
<ul>
<li>$\frac{\partial x_l(\textbf{p},w)}{\partial p_k}&gt;0,k\neq l$，互为替代品</li>
<li>$\frac{\partial x_l(\textbf{p},w)}{\partial p_k}&lt;0,k\neq l$，互为互补品</li>
</ul>
<p>价格效应矩阵（对比一下上面的斯拉茨基矩阵）：$D_\textbf{p}\textbf{x}(\textbf{p},w)$</p>

  <article id="post-MWG第一章：偏好" class="h-entry article article-type-post" itemprop="blogPost" itemscope itemtype="https://schema.org/BlogPosting">

<blockquote>
<p>感谢知乎用户<a href='https://zhuanlan.zhihu.com/p/335529007' target='_blank'>economics-lover</a>。</p>
</blockquote>
<p>首先，我们有一些备选物品集合（或者说商品集合）$X$，本质上是想建立关于消费者选择行为的模型，也就是说刻画消费者如何选择商品。有两种办法：第一章是基于偏好的办法；第二种是基于直接观察消费者选择行为的办法。这两种办法各有优劣，但第一种方法更为常用。</p>
<h3 id="1-基于偏好的消费者选择模型"><a href="#1-基于偏好的消费者选择模型" class="headerlink" title="1. 基于偏好的消费者选择模型"></a>1. 基于偏好的消费者选择模型</h3><p>偏好$\succsim$本质上是建立在被选集上的二元关系，如果$x\succsim y$，那么我们说$x$至少和$y$一样好；$x\succ y$意味着$x$严格比$y$好；$x\sim y$意味着$x$和$y$无差异。</p>
<p>通常，我们假设偏好是<span style='color:red'>理性的</span>，也就是说偏好满足如下两个性质：</p>
<ul>
<li><strong>完备性</strong>：任何$x,y$两个均可比较，$\forall x,y\in X$，要么$x\succsim y$，要么$y\succsim x$。当然，二者可能同时成立——对应于无差异时的情形。</li>
<li><strong>传递性</strong>：$\forall x,y,z\in X$，如果$x\succsim y,y\succsim z$，那么$x\succsim z$。</li>
</ul>
<p>有以下命题成立（理性假设蕴含着严格偏好$\succ$和无差异$\sim$的性质）</p>
<p><span style='font-family:hei;font-size:20px'>命题1.B.1:</span>如果$\succsim$是理性的，则：</p>
<ul>
<li>$\succ$为非反身（irreflexive）【$x\succ x$不成立】的和传递的（若$x\succ y,y\succ z$，则$x\succ z$）。</li>
<li>$\sim$为反身的【$x\sim x$】和传递的（若$x\sim y,y\sim z$，则$x\sim z$）。</li>
</ul>
<p>研究偏好往往是比较困难的，如果可以把偏好转化为效用函数，经常会使得分析简单很多，下面给出效用函数的定义（<span style='color:red'>注意，效用函数是基于偏好的</span>）：</p>
<p>一个效用函数$u:X\rightarrow\mathbb{R}$表达了一个偏好$\succsim$，如果$\forall x,y\in X$：</p>
<script type="math/tex; mode=display">
x\succsim y\Leftrightarrow u(x)\ge u(y)</script><p>注意两点：</p>
<ol>
<li>能表示某个偏好的效用函数不是唯一的，对于任何严格递增函数 $f:\mathbb{R}\rightarrow\mathbb{R},v(x)=f(u(x))$都是一个新的效用函数（你需要去证明这件事情）</li>
<li>不是任何偏好都可以找到效用函数来表达（你也需要去证明这件事情，比如一个二元的字典式偏好，不过现在不用着急，第二章还会讲到）</li>
</ol>
<p>有以下命题成立：</p>
<p><span style='font-family:hei;font-size:20px'><strong>命题1.B.2：</strong></span>如果一个偏好关系可以用效用函数表示，那么其一定是理性的——满足完备性和传递性</p>
<blockquote>
<p>证明也比较简单，此处就略过。</p>
</blockquote>
<p>好，这部分就把基于偏好的个体选择行为刻画清楚了，下一部分是基于选择规则的个体选择行为。</p>
<h3 id="2-基于选择规则的个体选择行为"><a href="#2-基于选择规则的个体选择行为" class="headerlink" title="2. 基于选择规则的个体选择行为"></a>2. 基于选择规则的个体选择行为</h3><p>下面整理基于选择规则的个体选择行为，选择行为用选择结构刻画，选择结构：$(\mathbb{B},C(\cdot))$。</p>
<ol>
<li>其中$\mathbb{B}$是一个集簇，由$X$的非空子集构成，称$B\in\mathbb{B}$为预算集。</li>
<li>$C(\cdot)$是一个选择规则，满足$C(B)\subseteq B$，也就是说给定一个预算集，从预算集里面选择一个或多个元素。</li>
</ol>
<p><span style='font-family:hei;font-size:18px'>例1.C.1</span> 假设$X=\{ x,y,z \},\mathbb{B}=\{ \{ x,y \},\{ x,y,z \} \}$，一种可能的选择规则是$(\mathbb{B},C_1(\cdot))$：$C_1(\{ x,y \})=\{ x \}$，$C_1(\{ x,y,z \})=\{ x \}$。也就是说，不管消费者面对什么样的预算集，都会选择$x$。这里可以隐约的感觉出来，似乎也刻画了偏好的某些东西，至少这里意味着$x\succ y,x\succ z$，但是我们并不知道$y,z$之间如何比较。</p>
<p>接下来，引入选择结构的弱公理，选择结构弱公理刻画了选择结构应该具备的合理性质：</p>
<p><span style='font-family:hei;font-size:20px'>定义1.C.1(显示偏好弱公理): </span>若选择结构$(\mathbb{B},C(\cdot))$具有下列性质：</p>
<p>若对于满足$x,y\in B$的$B\in\mathbb{B}$，我们有$x\in C(B)$，那么对于任何$x,y\in B’$和$y\in C(B’)$的任何$y\in C(B’)$，我们必有$C(B’)$。</p>
<p>那么我们就说选择结构$(\mathbb{B},C(\cdot))$满足显示偏好弱公理。</p>
<blockquote>
<p>这里的意思实际上是说：如果在某个选择过程中，我们发现个体同时可以选$x,y$的时候，个体选择了$x$而没有选择$y$。那么我们希望个体的这种选择具有一致性，就是在之后遇到同时可以选择$x,y$的时候，如果个体选择了$y$，那么一定要选$x$。</p>
</blockquote>
<p>弱公理还有一种更简单的表示方法：</p>
<p><span style='font-family:hei;font-size:20px'>定义1.C.2：</span>给定一个选择结构$(\mathbb{B},C(\cdot))$，显示偏好关系$\succsim^\star$定义为：</p>
<script type="math/tex; mode=display">
x\succsim^\star y\Leftrightarrow \exists B\in\mathbb{B},\text{s.t. }x,y\in B,x\in C(B)</script><p>我们称$x\succsim^\star y$为：$x$被显示至少与$y$一样好。</p>
<p>如果上面的是：</p>
<script type="math/tex; mode=display">
x\succsim^\star y\Leftrightarrow \exists B\in\mathbb{B},\text{s.t. }x,y\in B,x\in C(B),y\notin B</script><p>那么称$x$被显示比$y$更受偏好。</p>
<h3 id="3-两种刻画个体选择行为方式之间的关系"><a href="#3-两种刻画个体选择行为方式之间的关系" class="headerlink" title="3. 两种刻画个体选择行为方式之间的关系"></a>3. 两种刻画个体选择行为方式之间的关系</h3><p>它们的关系可以用以下两个问题概括：</p>
<ul>
<li>给定某个理性的偏好关系，个体在预算集$\mathbb{B}$中做出的决策，必然能产生符合弱公理的选择结构吗？（理性偏好关系$\Rightarrow$选择结构）</li>
<li>如果个体在预算集$\mathbb{B}$中做出的决策符合弱公理，一定可以找到与这些选择相符的理性偏好关系吗？（选择结构$\Rightarrow$理性偏好关系）</li>
</ul>
<p><strong>第一个问题的答案是肯定的：</strong>假设个体在$X$上具有理性偏好，当面对某个子集$B\subseteq \mathbb{B}$时，消费者的偏好最大化行为是在其中选择一个最好的元素，即：</p>
<script type="math/tex; mode=display">
C^\star(B,\succsim)=\{ x\in B: x\succsim y,\forall y\in B \}</script><p>在一些微弱的条件下，$C^\star(B,\succsim)$一定是非空的，此时我们说理性偏好关系生成了选择结构： $(\mathbb{B},C^\star(\cdot,\succsim))$，为什么这么说呢？因为一个选择结构，最重要的就是选择规则，这里的选择规则是依赖于这个理性偏好的，因此我们说该理性偏好关系生成了选择规则。</p>
<p><span style='font-family:hei;font-size:20px'>命题1.D.1：</span>假设$\succsim$是一个理性偏好关系，则由$\succsim$生成的选择结构<script type="math/tex">(\mathbb{B},C(\cdot))</script>满足弱公理。</p>
<p>为了回答第二个问题，引入一个新的概念：</p>
<p><span style='font-family:hei;font-size:20px'>定义1.D.1:</span>给定一个选择结构$(\mathbb{B},C(\cdot))$，一个偏好关系理性化了该选择结构，如果$\forall B\in\mathbb{B}$：</p>
<script type="math/tex; mode=display">
C(B)=C^\star(B,\succsim)</script><p>也就是说理性偏好生成了选择结构$(\mathbb{B},C(\cdot))$。</p>
<p>上述命题告诉我们这么一件事情，一个选择结构，只有满足了弱公理，才能被理性化。因为，理性偏好生成的选择结构一定满足弱公理，那么如果一个选择结构不满足弱公理，那么一定不能被理性化，因为如果不满足弱公理，那么$(\mathbb{B},C(\cdot))$不可能由理性偏好生成，即$C(B)\neq C^\star(B,\succsim),\forall B\in\mathbb{B}$不可能成立。</p>
<p><span style='color:red'>尽管一个选择结构，只有满足了弱公理，才能被理性化，但反之则不成立。</span>下面是一个反例：</p>
<p><span style='font-family:hei;font-size:20px'>例1.D.1：</span></p>
<p>假设$X=\{ x,y,z \}$,$\mathbb{B}=\{ \{ x,y \},\{ y,z \},\{ z,x \}\}$,$C(\{ x,y \})=\{ x \},C(\{ y,z \})=\{ y \},C(\{ z,x \})=\{ z \}$。</p>
<p>容易验证，该选择结构满足弱公理，但是该选择结构不能被理性化。</p>
<blockquote>
<p>为什么选择结构可以表示比偏好更多的东西呢？因为我们看到偏好生成的选择结构$C^\star(B,\succsim)=\{x\in B:x\succsim y,\forall y\in B\}$存在局限性，它只能对的单个元素进行考虑，却没有办法深入考虑互补和替代，比如牛奶比可乐还有薯条都要好，但是薯条+可乐的组合比牛奶要好，偏好关系生成的选择结构没办法很好地刻画这个东西。</p>
</blockquote>
<p>不过，如果选择结构在满足弱公理的条件上再增加一些条件——预算集中包含足够多的子集，那么存在可以理性化选择结构$(\mathbb{B},C(\cdot))$的理性偏好关系。</p>
<p><span style='font-family:hei;font-size:20px'>定义1.D.1:</span>给定一个选择结构$(\mathbb{B},C(\cdot))$，如果满足</p>
<ul>
<li>满足弱公理</li>
<li>$\mathbb{B}$包含了三元及三元以下的所有子集</li>
</ul>
<p>则存在能理性化$(\mathbb{B},C(\cdot))$的理性偏好关系$\succsim$，也就是说， $\forall B\in\mathbb{B},C(B)=C^\star(B,\succsim)$，并且这样的理性偏好是惟一的。</p>
