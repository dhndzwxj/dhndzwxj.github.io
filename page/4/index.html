        <h2 id="一、消费模式的资本主义生产"><a href="#一、消费模式的资本主义生产" class="headerlink" title="一、消费模式的资本主义生产"></a>一、消费模式的资本主义生产</h2><p><span style='color:red'>本章的目的是研究社会劳动力的再生产。因此，它不涉及个人消费行为，而是涉及工人阶级存在条件的形成和转变</span>——换句话说，涉及资本积累的基础，工资关系概括的物质内容。因此，我们将通过识别那些相互作用导致名义参考工资固定的力量，从而深化我们的工资理论，这个问题我们在第一章的第一节给出了唯一的正式解决方案。我们还将讨论工资阶层的社会分层，以及资本主义是如何加剧这种分层的。最后，我们将分析由阶级斗争组织成产生集体谈判程序的制度的新型社会关系的产生，并评估这些程序对平均工资的长期演变的影响。</p>
<p>在社会活动的空间中，工资关系的再生产涉及到一个社会劳动力的维护周期，如图9所示。两种现象同时出现。一方面，社会劳动力的维持周期是一个价值的变形周期，它包括消费过程，而消费过程是由商品关系主导的。另一方面，循环通过我们在第一章中所研究的两个生产部门之间的联系，与扩大的资本再生产有横向关系。社会劳动力的维持周期与两个生产部门的积累周期之间的这种关系表明，资本主义条件下的商品流通是按照一般模式组织的。要使商品流通扩大为一个封闭的回路，包含两个生产部门之间必要的联系，这样一种一般模式的存在，由资本主义生产关系塑造的集体工人，也必须由决定消费行为的社会关系构成。工人与生产资料的分离，这是工资关系的起源，带来了各种传统的消费方式的破坏，导致了一种特定于资本主义的消费方式的创造。形成了工人阶级消费的社会规范，作为相对剩余价值的基本形态，成为工资关系延伸的基本决定因素。通过社会消费规范，将消费方式融入生产条件。在部门一产生的生产力突变，在部门二产生作用，其方式是减低劳动力价值，并相应增加剩余价值比率。对这种整合的分析是积累理论的一个重要方面。</p>
<p>图9所示。资本主义生产关系再生产的“双卷轴”:在两个生产部门中每个部门的总资本再生产，以及社会劳动力再生产。</p>

<h3 id="1-社会消费规范的形成与演变"><a href="#1-社会消费规范的形成与演变" class="headerlink" title="1. 社会消费规范的形成与演变"></a>1. 社会消费规范的形成与演变</h3><p>在社会劳动力的维持周期中，生产与消费之间存在多种联系。我们已经看到，资本主义的劳动过程是由劳动的机械化控制的。被剥夺任何手工艺品的工作，将失去任何可能影响工人阶级生活方式的质上不同的特征。因为劳动力成为一种商品，所以它被并入了一个生产系统，其阿尔法和欧米伽为剩余价值。任务的分散和将任务缩短为纯时间持续时间是其发展的内部原则。生产关系的转变创造了商品的大规模生产，这种趋势通过交换等价关系的逻辑趋向于破坏非资本主义生产形式，从而形成了单一的商品流通空间。如果首先通过资本主义劳动过程使工人变得同质，那么当他们脱离家庭的个人纽带，邻里亲密关系或补充性活动的束缚仍将他们与非资本主义环境联系起来时，这种同质性将得到决定性的加强。 。工人被归类为单一社会劳动能力的一部分，但同时又被工资合同孤立为相互竞争中的个体劳动能力，工人不可避免地由于大规模生产提供的商品的个人消费而与资本主义联系在一起。简化产品的这种统一的消费方式是大众消费。这是资本主义积累的必要条件，因为它抵消了第一部门发展不平衡的趋势。它锻造的两个生产部门之间的联系概括了劳动过程中的某些重大转变。一方面，它们提高了资本的有机构成；另一方面，它们通过减少生产资料的单位价值，抵消了恒定资本随时间推移而产生的这种增长，并通过降低生产资料的剩余价值来提高剩余价值率。劳动力的社会价值（在上面使用的符号中的tn）。这就是为什么先前的积累会立即引发大众消费的发展节奏，从而改变生产条件，并为将来的积累奠定基础。自凯恩斯以来，非马克思主义理论文献都以有效需求问题为幌子，认识到需要在两个生产部门之间建立全面的联系，并且缺乏任何自动的机制来平衡其发展。但是非马克思主义文学从来没有在资本主义生产关系的内在对抗中看到这个问题的根源。凯恩斯通过证明不存在诸如劳动力市场之类的东西，而就业水平则由企业分配的预期收入决定，从而为对新古典主义调整进行深远的批评开辟了道路。 1这些动态方法通常不被卡尔多（Kaldor），帕西内蒂（Pasinetti）2和斯威齐（Sweezy）等凯恩斯主义后作家所采用，他们在哈罗德（Harrod）看来将有效需求的问题减少到分配刚性的影响问题上均衡增长道路上的收入。在马克思主义传统中，有效需求问题是剩余价值生产的一个方面。它与阶级斗争成功地或不成功地改变生产和交换条件，并因此导致所生产商品的数量扩大的方式有关。例如，我们已经看到，半自动生产过程如何在第一次世界大战后遭受打击之后，进一步削弱了工人的运动，从而对其自身发展形成了内部障碍。如果在第一阶段，这种削弱导致收入分配的迅速分化，从而开辟了新的消费市场，那么这些市场的非常狭窄的社会基础就无法长期消除第一部门的不平衡发展，这大大加快了发展速度。通过新的生产力。福特主义，换句话说，是集权积累制度的整个社会条件，为了建立自己的阶级，必须通过阶级斗争方式的重大变化来进行。</p>
<h4 id="（a）福特主义的特征性消费方式"><a href="#（a）福特主义的特征性消费方式" class="headerlink" title="（a）福特主义的特征性消费方式"></a>（a）福特主义的特征性消费方式</h4><p>为了理解劳动过程中生产关系的变化如何产生在形成一种消费模式中起主要作用的冲动，有必要既不从经验上将消费视为支出函数的总和，也不用术语在一定资源和市场条件下，将个人消费者理论作为组织合理，稳定选择的公理集的来源。个体消费者理论的生态学概念构成了对经济科学客体的定义的一部分，该经济学作为个体选择的逻辑（最优化原则），受到稀缺性约束和普遍理性原则的约束。与我们以此为基础的概念完全不同——即一种社会法则科学，支配着男人和女人在有组织的集体中生产和分配生存手段。对支出函数的实证观察具有完全不同的状态。它是消费受商品关系影响的统计表达。掌握已经建立的消费模式是如何随时间演变的，这是必不可少的，因为它位于交换和适当消费之间的接触点。但是，我们在这里需要的是更基本的东西-一种使消费成为社会条件活动的实践的理论，受到相反的同质化和分化力的影响，从而以有利于工资劳动的普遍化的方式对其进行修改。我们不能在主要致力于资本主义积累的一般理论的书中发展这种方法。无论如何，在最近的一些研究和争议中都涉及到这一点。[3]我们以其中的某些研究为基础，将自己局限于涉及资本主义生产关系转变对生产方式的影响的概念之间。消费，要积累规律。</p>
<p>我们的出发点将是将消费定义为一种活动，或者更准确地说，是一种过程，即一系列有组织的活动，虽然这些活动主要是私人的，但受到一个一般逻辑的制约，即社会实践中所花费的能量的重组，以及其主体所支持的社会关系所隐含的能力和态度的保持。这个定义需要几点意见。首先，由于消费是一个物质过程，它位于空间中，它有特定的地理位置和对象网络。它也是一套时间操作，是字面意义上的时间运用。因此，消费过程的性质及其在社会劳动力维持周期中的地位受到劳动时间的重要性、作为人力消耗的强度以及与之直接相关的其他时间约束的强烈制约。此外，消费是一个主要是私人的过程；它的具体做法主要发生在家庭内部，这是一个个性受到保护的场所。他们不受生产关系的直接支配。这就是为什么他们可能会产生不同的意识形态，并容易受到分化的影响。这种区别不是偶然的，因为消费也是能力和态度的守恒。消费的这一方面不应该从主要的功能意义上来看待。它涉及相关个人在社会关系中的地位，以及这一地位在共享这一地位的个人群体中的表现，以及相对于他们与之保持关系的其他社会群体的地位。这种表现的基础显然是真正的能力的运用，这种能力不是个人固有的，而是在社会关系中所占据的位置，即社会所需要的角色中固有的。但这种表达是以认知的形式实现的，这涉及到对确定的文化态度的感知。这种认识维持着意识形态性质的社会关系，尽管这些社会关系和经济关系一样具有“物质”的存在。这种源于社会分层、需要特定再生产的关系，积极地分化着消费过程。它们可以被称为身份关系。地位的概念不仅是解释消费中的社会分化所必需的，也同样需要理解这些分化随着时间的推移而更新，以及它们的稳定或扭曲的条件，这些条件使我们能够科学地谈论一个社会的消费过程，甚至一种消费方式。地位对消费过程的影响表现在后天习惯上，这种习惯将劳动力的维持周期稳定在例行公事上。这些习惯代代相传。学习文化地位准则和遵循这些准则的行为准则是家庭的基本功能之一；它伴随着学习家庭在代际选择中渴望扮演的角色。因此，新的个人进入劳动力市场，寻找具有其意识形态特征已经内化的地位的职位。只有资本主义积累释放的力量才能通过概括就业的流动性和不安全感来消除这些习惯。</p>
<p>鉴于这些概括性的迹象，我们应该如何看待作为集约积累制度的一个重要方面的福特主义特定消费方式的形成和再生产？<span style='color:red'>历史上第一次，福尔德主义创造了工人阶级消费的规范，在这种规范中，个人对商品的所有权支配着具体的消费实践。这既涉及传统生活方式的逆转，也涉及工人阶级在极端贫困和完全不安全的时代的最初经历的逆转，这没有提供任何稳定消费习惯的基础。</span>在这种情况下，消费过程要么是完全分散的，要么是在大家庭的背景下组织起来的，家庭劳动分工严格，家庭劳动时间花费很大。相反，在福特主义中，商品关系的泛化延伸到它们对消费实践的支配。这是资本主义改造的一种消费方式，因为在消费的时间里，个人对商品的使用越来越密集，非商品的人际关系也明显贫乏。一旦使这种消费方式再生产的社会条件建立起来，它的消费规范就会动态地演变，因为它的商品内容直接记录在半自动控制的机械化劳动过程的泛化中。这些情况是多种多样的，暗示着社会习俗的巨大变化，因此，在第二次世界大战后福特主义的扩张之前，经历了长期的危机和激烈的阶级斗争，其结果是建立了社会控制，以保证工人阶级消费规范的形成和发展，这一点也就不足为奇了。</p>
<p>其中最直接的条件涉及劳动力过程转变对劳动力维持周期的影响。我们已经看到泰勒主义和后来的福特主义如何通过大幅增加劳动强度和系统地压缩浪费的时间来适应工作日的限制。其结果是，工作场所本身的任何休养时间都消失了。劳动过程中日益耗尽的劳动力必须在工作场所以外完全修复，同时尊重严格区分工作时间和非工作时间的新的时间限制。由于这一点被进一步的分离限制和工作场所与住所之间的距离增加所覆盖，交通时间大大延长，因此，尽管工作时间有限，但劳工施加的时间限制并没有下降。个人商品消费是一种消费形式，它允许在一天内在一个紧凑的时间空间内，在一个地方，即家里，最有效地从身体和神经疲劳中恢复过来。</p>
<p>因此，消费规范的结构与资本主义生产关系的制约是一致的。它受两种商品的支配：标准化住房是个人消费的特权场所；汽车作为家庭和工作场所分离的交通工具。虽然这些商品仍供私人使用，但这些耐用品的购买力远远超过当前工资的购买力。因此，工人阶级消费规范的形成是以财政的广泛社会化为前提的，并相应地对工人的资源和支出进行了非常严格的控制。重要的是，个人消费过程要有组织和稳定，同时保持与商品交换的明显的个人和自由关系相兼容。这是通过工人阶级社会结构的泛化实现的，这种社会结构是其文化融入国家的条件，即小家庭单位和家庭。在这里，工人阶级收到了一项法规，它通过形成支出习惯，起到了调节其消费规范的作用。但仍然必须限制资本主义不安全对就业和个人工资形成的影响，以免破坏消费过程的连续性，并使工人能够履行购买消费品时签订的财政承诺。这包括立法安排，工资同质化和社会化，以及建立社会保险基金，防止直接工资的暂时损失。所有这些都将在后面进行探索。</p>
<p>当工资关系转变为允许购买标准化住房和汽车交通的条件社会化时，这些复杂商品的生产本身就成为消费方式发展的中心过程。以郊区为主的标准化住房的生产产生了多重影响。新住房按照一定的基本标准建造，杜绝了不卫生和不安全的内部装修，并允许安装家用电器，从而节省了家政劳动力。标准化的住房也是地位的象征，一旦它可以买到而不是简单地租出去。它通过预制技术进行大规模生产，降低了成本，在整个支付期限内，它对20世纪50年代工人阶级工资的负担小于当时两次世界大战期间房东为不卫生的住房勒索的租金。就汽车而言，它的大规模生产与半自动装配线的建立是一致的，换句话说，这种工作组织模式的创建后来扩展到大规模消费手段的长期生产。装配线的总体介绍揭示了劳动过程和它所塑造的消费方式之间的密切关系。因为大众消费过程中的两种基本商品产生了互补性，在使用价值系统多样化的支持下，商品实现了巨大的扩张。这种多样化被铭刻在社会消费规范的逻辑中，这种消费规范的演变是由省时的设备取代了家庭中的直接活动。对符合这一规范的地位的追求也支持了这一点。但是，为了使这种消费逻辑与以相对剩余价值为导向的劳动过程相兼容，使用价值的总和必须适应资本主义的大规模生产。4这意味着创造一种功能性美学(“设计”)，这具有基本的社会重要性。5这种美学首先必须尊重工程的限制，并因此将使用价值设想为能够长期生产的标准化部件的集合。它还必须引入有计划的淘汰，并在使用价值之间建立功能联系，以创造其互补性的需要。这样，消费活动可以变得统一，并完全受到其设备项目的限制。最后，这种功能性审美以想象的关系复制了人与物之间的真实关系。它不满足于创造一个日常生活物品的空间，作为资本主义商品宇宙的支撑，它通过广告技术提供了这个空间的形象。这幅图像被呈现为消费状态的客观化，个人可以在自己之外感知到这一点。社会认同的过程被外化和拜物化。最初，个人并不是根据自己的社会地位被彼此问询为研究对象的：他们被外部力量问询，传播了一幅“消费者”的机器人肖像。因此，消费习惯已经在社会上被计算和控制了。然而，许多社会学家已将形象作为资本主义发展的一个基本解释原则，它在消费中的作用严格从属于我们所讨论的物质和社会条件，这一点再怎么强调也不为过。</p>
<p>就福特主义通过发展一套将劳动过程与社会消费规范紧密结合起来的整体社会关系来提高剩余价值率而言，生产资料的部门似乎被赋予了从消费本身产生的动力。由于两个部门之间的发展保持了一定的协调，积累得以保持相对规律的节奏，代价是有计划的淘汰和资本的永久去价格化，有效需求的问题并不太严重。“消费社会”似乎彻底解决了资本主义的矛盾，消除了资本主义的危机。这就是第二次世界大战后20年的模式，我们在第一章的总结中指出：由于反映剩余价值率上升的实际社会工资成本的持续下降，实际工资相对有规律地上升。</p>
<h4 id="b-福特主义的危机和新福特主义的观点"><a href="#b-福特主义的危机和新福特主义的观点" class="headerlink" title="(b)福特主义的危机和新福特主义的观点"></a>(b)福特主义的危机和新福特主义的观点</h4><p>消费社会的思想家们被20世纪60年代后半期开始加剧的深度危机深深地唤醒，意识到资本主义的现实。正如我们在第二章中所指出的，福特主义的危机首先是一种劳动组织方式的危机。这首先表现在生产环节的阶级斗争的激化上。这些斗争具有挑战性的工作条件，与任务的分散和劳动的加强有关，从而显示出这种劳动过程中组织的生产关系所固有的剩余值率增长的极限。这是危机的根源。这可以从实际社会工资成本的下降中看出，这种下降与零星冲突和地方性对抗的爆发同时发生，挑战福特主义已经建立的那种工作纪律。但很明显，这场危机延伸到生产关系和交换关系的总和，正在颠覆集约积累的体制。我们有可能在不暗示资本主义不可避免地消失的情况下，谈论一场资本主义的有机危机。让我们更仔细地研究一下这个问题。源于劳动过程的相对剩余价值僵局阻碍了两个生产部门之间交换关系的扩大。生产资料生产部门的发展遇到了限制，因为它不再引起技术突变，导致劳动力进一步机械化，能够在直接劳动时间上产生足够的节省，以弥补资本有机构成的增加。因此，用传送线系统取代半自动装配线，建立对批量生产的自动控制，到目前为止只得到了有限的应用，这就不足为奇了。当然，这种自动生产控制形式节省了直接的活劳动，但只有把福特主义特有的劳动组织形式和工人阶级消费规范推广到极致，才能做到这一点。因此，它不能解决日益加剧的生产阶级斗争问题。这一点已经从汽车行业引入的传送线中可见一斑。在此基础上建立的新工厂的特点是工人阶级对劳动纪律提出了最强烈的挑战。</p>
<p>第I部类积累遇到的困难导致失业人数激增，工作不安全感日益加剧。与此同时，机械化流水线作业提高生产率的可能性耗尽，迫使资本主义管理层正面攻击直接工资的购买力。这就影响了工人阶级消费规范发展的两个必要条件。其结果是，在年轻群体中，有能力买房的人比例下降，汽车生产停滞不前。因此，在福特主义条件下，作为大众消费基础的那些商品在结构上威胁着社会消费规范的浮动度。它受到的社会前提条件恶化的威胁更加严重。实际上，我们已经看到，只有存在融资的社会模式，即社会承担集体基础设施的风险和支出的程序，才能发展面向私人商品的消费规范。这种私人消费环境的生产进入了社会劳动力的再生产价值。其成本构成广义定义的名义参考工资的一部分，其中既包括直接组成部分，也包括间接组成部分。现在，福特主义在机械化劳动过程和严格的私人商品消费之间建立的联系具有排他性，随着消费规范的发展，所谓的集体消费的成本迅速增加。一旦福特主义的危机表现为对这种特殊形式的工作组织的挑战，这种现象就抵消了相对剩余价值的上升，以至于扭转了其发展趋势。这就是为什么自20世纪60年代中期以来，我们看到所谓的社会增长成本出现了如此字面上的爆炸性增长。</p>
<p>社会劳动力价值的这一组成部分的快速增长可以在图2中看到(上文第96页)。尽管自第二次世界大战以来，单位总增加值的直接工资成本涨幅最小，但间接工资的单位成本涨幅远远超过其他任何因素，自1965年以来，单位工资成本的增长出现了真正的爆炸性增长。图10证实了这一观察结果，该图显示了国民收入分配的长期趋势。这清楚地表明，工资加社会福利的总体总额是稳定的，只有农业、技术和商业人员的工资总额自第二次世界大战以来一直保持稳定，而工资加社会福利在总工资加社会福利总额中的份额只在1960年至1965年非常迅速的扩张期间才保持稳定，并在那之后开始非常迅速地增长。</p>

<p>我们现在已经达到了理解福特主义是一种密集积累的制度，以及它目前的危机的一个基本点。我们首先假设后者本质上是工资关系复制中的一场危机。如果事实的确如此，那么我们有理由将其视为一场资本主义的有机危机。我们已经通过展示这场危机如何根植于劳动过程的组织来探讨这一假设。现在，我们可以通过证明福特主义特有的社会消费规范只有通过加强工资关系的对抗性，并将其推广到保证劳动力维持周期连续性的条件：失业和生病的供应、家庭开支的覆盖和退休人员的生存手段，才能巩固这一论证。这一点可以通过以下方式来巩固：福特主义的社会消费规范只有通过加强工资关系的对抗性，并将其推广到保证劳动力维持周期的连续性的条件下才能调节私人工人阶级消费的演变。按照机械化原则，在劳动集体化的推动下实现工资关系的普惠化，意味着必须在整个社会层面上保证消费方式的一般条件。消费社会化成为阶级斗争的决定性领域和战场。因为这种社会化比以往任何时候都更有必要，因为前资本主义的日常生活形式以及这些形式可能发展的社会结构都被摧毁了。当工资关系扩大到整个社会时，社会消费手段也必须如此，要么作为商品购买，要么由公共当局提供。在任何一般法律中都不可能涵盖两者之间的分配，因为不同的资本主义国家之间的分配差别很大。在美国，资本主义生产确实很普遍。例如，它涵盖了卫生服务的主要部分，以及教育的很大一部分。这并不令人惊讶，因为没有本质上是商品的使用价值，也没有其他不是商品的使用价值。商品是一种交换的社会关系，它的使用价值只有在这种交换的支持下才能实现。因此，在资本主义发展的其他时期，某些在某些类型的劳动过程中不是商品的使用价值和某些消费方式的进化逻辑很可能成为商品。</p>
<p>另一方面，一般法则如下。在福特主义的背景下，集体消费下降，其成本迅速增加，直到最终消除了剩余价值率上升的普遍趋势。实际上，福特主义的劳动过程将工作集体化的机械原理推向了极限。仅在重复进行标准化商品的长期生产过程中才证明该原理有效。这完全不足以提供集体服务。这些服务都是由资本家以不发达的方法生产的，并且随着社会对它们的需求的增加，其成本也在天文上增长。卫生服务就是这种情况。因此，必须将其成本转化为间接工资的快速增长。或者，这些服务由公共机构提供。然后，他们从剩余价值的角度吸收非生产性的劳动力。从资本主义的角度来看，这种非生产性劳动并不能与能产生剩余价值的劳动相辅相成，相反，它吸收了比剩余价值总和增长得更快的社会劳动份额。这样，再生产劳动力的社会成本就会上升，并带来各种财务后果。这种筹资可以通过多种方式对资本主义积累施加负担。要么抬高直接工资，要么以所得税的形式收回涨幅。否则就以各种不同的形式对利润征税。无论哪种情况，相对剩余价值都受到限制，因此成为积累规律的障碍。只要占主导地位的是标准化商品生产的重大转变和相应的消费方式的高涨，工资劳动再生产的集体成本就可以保持稳定，而剩余价值率却可以被提高。但是，这些力量本身却使集体成本越来越快地增加，与此同时，它们耗尽了劳动力机械化所蕴含的潜力。因此，毫不奇怪，福特人工作组织的危机应该同时成为资本家阶级普遍减少社会支出的动力，并迎来了公共财政紧缩的时期。所有这些现象都是工资关系再生产中危机的整体表现。</p>
<p>现在，我们可以更清楚地定义资本主义解决美国福特主义危机的总体社会经济条件。<span style='color:red'>摆脱危机的唯一途径是按照积累法则，这是资本主义生产方式的核心。</span>为了使这一目标获得成功，该系统必须创造出能够实现剩余价值率的持久和大规模提高的新的生产和交换条件。只有以某种方式使劳动过程发生革命，使其能够从根本上改变集体消费手段的生产条件，才能做到这一点。为了追求它的发展，资本主义因此必须将其限制推向极限，以改变劳动者的生存条件。这是福特主义无法做到的。必须以某种方式修改生产条件，以便在促进集体消费发展的过程中降低社会劳动力的再生产价值。随着我们称为新福特主义的劳动过程的出现，这样的过程可能已经在准备之中。这涉及到劳动过程的重大革命，它倾向于用半自治团体组织的工作信息性原理代替受等级制约束的零散劳动的机械原理，受生产本身的直接约束来约束。显然，这一原则是建立在以生产力的综合为基础的，综合生产力是通过对信息进行测量和处理，对数据进行分析以及拟定使生产过程正规化的程序和传输的综合系统来对生产资料进行自动控制的这些程序中固有的指令。在医院，教育系统，污染控制，公共交通组织中进行的试点研究已经确认，这是一种工作组织的原则，能够在生产集体消费的手段中大大节省劳动力，同时也以深远的方式改变了他们的使用方式。</p>
<p>另一方面，新福特主义在商品生产中的发展总体上赋予了劳动过程新的，显着的灵活性，可以分为半自治单位。这种灵活性可能是彻底重塑城市环境的条件，它将采用新的集体服务生产方法。消费的日益社会化将为第一部门的积累和进一步生产力的发展提供重要支持。这场危机将产生一种新的集约积累制度，即新福特主义，阐明资本主义积累的进展是对赚取工资的阶级的生存条件的整体转变的；而福特主义则只是针对这种情况。在私人消费规范中，大众消费的社会成本继续在资本主义生产方式的边缘得到满足。密集积累制度基础的这种转变是危机的唯一持久解决方案，这一事实本身并不意味着在资本主义制度下是可能的。这意味着对阶级斗争的条件和方式进行了这样的修改，对由工资关系定义的两个极地阶级中的每个阶级的内部分层进行了这样的修改，以至于在这个问题上对这个问题做出任何判断都是极其冒昧的。目前的分析阶段。但是，积累理论的发展将使我们逐渐认识到这里正处于危险之中。</p>
<p>必须指出的是，积累法则的发展所导致的问题与所谓的“重新部署”没有共同之处。后者仍被包含在个人资本获利的理论领域中，并基于工业部门的概念。按照这种观点，资本就足以转移到新的和不断扩大的部门中去了——它们的存在是理所当然地存在于一个仅存在资本的问题中的，因此根本的问题仅仅是重新调整其增值空间。</p>
<p>我们对积累规律的研究使我们得出了不同的观点，因为我们认为资本不是内在的实体，而是工资关系的发展。每一次重大的积累危机都是这种关系再生产的当前危机。其结果要求打破改变这些条件的障碍。在美国，工薪阶层占经济活动人口的90％以上，而福特主义已被推到了最终结论，新的和持续的积累热潮的社会条件只能由工资阶层的内部重新分配，这将涉及将非生产性劳动大规模转变为具有剩余价值的劳动生产。不能从部门的概念开始分析这种转换，而只能从生产部门的概念进行分析。它在获利能力的抽象逻辑中不是可理解的，而只能在工作组织和工资阶级的存在条件之间出现新的相互作用时才可理解。</p>
<h3 id="2-区分工薪阶层的因素"><a href="#2-区分工薪阶层的因素" class="headerlink" title="2. 区分工薪阶层的因素"></a>2. 区分工薪阶层的因素</h3><p>工资级别不是根据单一或简单的划分原则进行分层的。不同性质的划分过程是相互叠加的，尽管它们都源于我们从劳动过程中资本主义生产关系的形成和转变的角度研究的基本趋势，或者从劳动者的演化的角度研究的基本趋势。社会消费规范。这是因为影响工人阶级发展的最普遍的法律是相对剩余价值的法律，主要是倾向于无产阶级的统一。然而，通过创造工资收入阶层中的差异化因素的做法来实现更高的剩余价值率。必须评估这些因素的重要性，稳定性和扭曲性的适当顺序。这里必须研究两个不同的问题：无产阶级的内部分层和管理人员的问题。</p>
<h4 id="（a）无产阶级的分层"><a href="#（a）无产阶级的分层" class="headerlink" title="（a）无产阶级的分层"></a>（a）无产阶级的分层</h4><p>这种分层的基础是劳动力的组织。在机械化原理的系统应用中，福特主义在很大程度上摧毁了所有熟练的手工艺品，并摧毁了以此为基础的地位。这样，它为工业基础上的工人阶级工会组织创造了条件。该组织见证了工人阶级的逐步统一。在机械化控制了非工业活动的范围内，从事这些活动的工人也经历了分散的任务，使他们成为集体劳力的可互换要素，即使他们无产阶级化。他们过去的就业状态的存在通常有助于在较长或更短的时期内保持一定的工资差异，但是越来越迫切的降低工资成本的需求产生了不可抗拒的压力，要求这些工人类别符合标准的工人阶级消费标准。当美国社会学家过去常常庆祝“中产阶级”的扩大时，他们真正观察到的是两种不同现象的叠加：一方面，无产阶级的扩张，换句话说，是零散的，可互换的和不熟练的工人;另一方面，所有这些工人都适应了消费规范的快速增长。这是福特主义的两个互补方面。</p>
<p>这种基本趋势通过某些二次分化得到了证明，我们在研究工资形式时已经碰到了它们的方式。这些差异趋于获得一定的稳定性，因为它们是阶级斗争中的折衷，然后通过集体谈判将其分类。在体现资历和某些有限的晋升机会原则时，这些区别起着双重作用。一方面，它们构成了管理人员使用的纪律方法的一部分，这些方法旨在通过发挥个人的“功绩”来扼杀无产阶级团结劳动的意识。另一方面，它们服务于官僚化工会的目的，而工会绝不准备对其集体谈判的常规方法和奋斗目标面临民主挑战。但是，如果资本主义管理者可以利用半自治的工作组作为反对工会组织的武器，那么新福特主义将威胁到这些分化。然后，后者将被迫更新其行动方法，否则将有可能成为经济阶级斗争中重大而持久的挫折的非自愿手段。</p>
<p>但是，存在着使无产阶级分层的因素，它们通过激发阶级内部的深刻而持久的分裂，比削弱工人运动的力量和作用要强得多。它们代表政治和意识形态关系对某些种类的劳动力的维持周期的影响。这些关系在某种意义上是地位下降，因为在受影响的工人的工资中没有承认社会消费的规范。它们采用几种不同的形式，其中最重要的是以下两种：</p>
<ul>
<li>某些类别的劳动力是被压迫的少数民族，在所有工作和生活条件下均受到系统的歧视；</li>
<li>家庭内部消费过程的组织分配了某些类别的劳动力（妇女和青年工人）工资降低。</li>
</ul>
<p>这些政治思想关系表明，阶级社会的再生产如何是一个单一的整体，其中上层建筑形式可以对资本积累规律产生相当大的影响。就我们目前正在研究的现象而言，这些关系对名义参考工资产生了普遍压力，并提高了剩余价值率。它们在资本主义竞争中也起着重要作用。我们将特别看到无产阶级的分层如何帮助将组织成分包网络的资本集中起来。</p>
<p>美国资本主义用来创造特殊剥削条件的最有力武器来自于奴隶制继承的意识形态关系的持久性，换句话说，是种族主义。就像社会形态中的癌症一样，种族主义从南方蔓延到整个美国，从黑人人口蔓延到严格意义上并非白人的所有人。资本主义通过将奴隶转变为工资工人而拒绝一切融入工人阶级消费方式的可能性，从而比奴隶生产形式更有效地利用了种族主义。一旦种族主义被深深植入社会意识中，并被政治思想机构的正常运作所再现，则甚至可以将劳动力市场的分割引入大型工业。在相同类型的零散活动中使用的同一简单劳动力，因种族而有不同的报酬，因为工人阶级的一个部分被社会割让的权利少于另一部分。要做到这一点，种族主义显然必须深入工人阶级本身，以至工会组织只考虑白人工人的利益。还必须将进步的潮流扼杀在萌芽中，通过向少数群体承认正式的政治权利，并大力宣传在自由职业（医学，娱乐，法律）中从事黑人资产阶级的活动。7</p>
<p>造成工资永久性差异的另一个强大力量是夫妻及其子女组成的家庭单元中消费过程的结构。正是在这个社会单位中劳动力的重构，形成了家务劳动的基本合作形式，从而固定了工人阶级的消费规范。核心家庭单元中的家务劳动为消费过程提供了所需的劳动支出。因此可以说是国内生产形式。这种生产形式在社会上为女性人口分配了特殊的位置。妇女提供的劳动力完全属于重建劳动力的过程，因此不能视为直接生产商品。简单的家务合作间接地为资本主义生产方式提供了无偿劳动。</p>
<p>这种社会组织与对工资的个人认识相结合，使资本主义生产方式可以使妇女为补充工资工作。只要核心家庭仍然占主导地位，即使是非熟练女工的工资，无论是已婚还是单身，都取决于妇女在家务劳动中的作用。通过抑制可以有效扩展家务劳动的社会结构，现代资本主义城市发展使消费规范变得更加僵化，并且越来越依赖于资本主义生产。资本主义的城市化趋向于使女性人口陷入工资劳动之中。妇女的工资然后由确保减少家务劳动的消费过程所需的那些商品的价格决定。资本主义生产方式得益于将低生产率的劳动力（间接从中得益的家政劳动）向高生产率的劳动力（从中直接得利的劳动）转移，同时仍以女性劳动能力作为代价节省的家务劳动的功能。这也是为什么女性根据经济气候而进出劳动力的原因。妇女必须根据经济条件是对彼此有利还是对彼此有利，在工资劳动和家政劳动之间进行选择。</p>
<p>种族主义和性别歧视的叠加确保了在整个福特主义时期美国要观察到永久的工资等级：白人男性工人/黑人男性工人/白人女性工人/黑人女性工人。这是同一简单劳动力中的等级制度。这是美国阶级社会整体结构的影响。</p>
<p>从新福特主义可能发展的角度来看，这种分层是否会得到维持？在这一点上做出任何明确的判断还为时过早。新福特主义所隐含的消费社会化，将使绝对规范的消费规范成为绝对必要和不可避免的新型社会控制方式，这种规范与第二次世界大战后盛行且目前处于危机之中的消费规范大相径庭。但是，如果新福特主义具有质的新生产力，它就只能成为集约化积累的未来原则。这种生产力意味着无产阶级的更大程度的统一。劳动力维护周期的物质条件可能必须体现在与贫民窟的维护不再兼容的城市发展中。在没有大量失业的情况下，只有通过在工作时间和休闲时间之间的边界发生重大变化，朝着减少工作时间的方向，通过集体消费手段的生产过程的革命来增加相对剩余价值似乎是可能的。集体消费的发展将消除对妇女工作的歧视的所有客观基础。显然，所有这些力量都指向对整个资本主义构成威胁的方向。这就是为什么工资关系（阶级统治的根本原则）可能只能通过越来越多的意识形态控制和压制的极权主义体系来维持。美国最近几年的事件以及西德令人不安的事态发展表明，这样的进程确实在起作用。他们是否会成功地融入一个单一的社会控制体系，这是一个问题，我们今天仍然无法回答。但是这里的重点是要清楚地看到，相当大的社会控制手段更新是资本主义解决危机的一部分，因为生产和交换条件的转变允许相对剩余价值出现新的持久的增长。朝着无产阶级统一的方向努力。</p>
<h4 id="（b）管理人员"><a href="#（b）管理人员" class="headerlink" title="（b）管理人员"></a>（b）管理人员</h4><p>管理人员在工薪阶层的地位一直是出了名的模棱两可。这种模棱两可，显然是因为他们在资本主义劳动组织中的地位与资产阶级和无产阶级的基本分裂的关系。经理人似乎是一个中间的社会类别。社会范畴这一术语只有在各种情况下处于同质优势的社会关系中才能被证明是合理的。现在，这种同质性肯定没有功能基础。社会分工确实给管理人员分配了熟练的——即多样的、复杂的和流动的——活动。这些措施包括管理、监督和控制的做法，这些做法对于评估一家公司所配置的资本是必要的。但这个职能组织是行政层级的支持。后者不能简化为前者，因为个体资本的计价是资本主义生产关系整体再生产的一部分，也就是说，是阶级社会的一部分，在每一个单独的企业中看起来是独立的。如果管理人员这样在技术结构内行事，后者仍然没有获得自己的生命。它的存在和运作一般是由资本积累决定的。因此，这种技术结构的本质是一个长期紧张的领域，为管理人员分配一个社会关系职位，使他们成为有时被称为受薪小资产阶级的社会类别。8管理人员属于赚取工资的阶层，因为他们是工资合同的当事人。但是，他们不属于无产阶级，也不倾向于作为一个类别而归入无产阶级，因为社会分工总是重新控制无产阶级，即使它的形式改变了。某些管理者的个人命运不应与社会范畴本身混为一谈。在大规模变革时期，当旧的等级职能消失时，他们可能会变得无产阶级。后者是资本主义在工资合同法律形式下的劳动组织的代理人。无产阶级的内部分层，是根据统一运动所受剥削的不同具体条件而定的，不能同无产阶级和社会管理人员的区别混为一谈，这是资本主义劳动组织的一个不变的特点。</p>
<blockquote>
<p>译者注：法语中的“干部”一词是“管理人员”，没有确切的对等词。因此，应将其视为包括技术人员和工程师。</p>
</blockquote>
<p>由于管理人员的社会类别是资本的代理人，但受制于工资合同，因此地位对其自主权变得非常重要。这种地位不仅涉及不同的消费规范，而且涉及构成社会类别本身的一系列关系–不仅是社会群体内部分化的次要因素，其凝聚力是由更根本的分裂决定的。尽管社会类别具有不同的功能，但它们仍使社会类别同质化，并且由于社会类别与资本主义生产关系中固有的基本对立关系的模棱两可关系，它们通过吸收内部爆发的多重张力来稳定社会类别。管理人员的地位取决于其资格和职业结构。这些与众不同的特点使竞争与其他内部群体区别开来，使竞争成为其内部关系的原则–由职称和薪资等级制引起的竞争，这是任何资本主义企业人事政策的一部分。如果地位使管理人员的社会群体同质化，那么决定地位的要素就由资本家阶级控制，并构成其对社会的全球力量的一部分。</p>
<p>因此，考虑由复杂劳动力的再生产价值决定的管理人员的薪水，或试图通过功能分析来确定这种复杂性的要素并为其推算具体费用是荒谬的。不幸的是，对“人力资本”的迷恋和工资等级的合理性已经感染了新古典主义学校之外的几位经济学家。9这些错误源于复杂的劳动力和劳动力之间的严重混淆。复杂劳动是指由集体工人有机地确定，并由交换的社会过程同质化的那些具体活动。复杂劳动现象是资本主义竞争法中商品价格分析的一部分。它与支付给管理人员类别的成员的薪水无关。但是，事实是后者通过工资合同与雇主捆绑在一起。因此，他们兑现其资格作为交换价值。在确定了行政等级形式的某种永久性的社会分工的相对稳定状态下，往往由于管理人员之间的竞争而为每种资格类别确定了价格。这些价格并非如此。从职业开始就支付给管理人员的薪水等级表示出来。另一方面，在劳动力组织迅速变化的时期，随着企业结构的相关变化，某些资格的交换价值可能受到严重威胁。等级结构可能会发生变化，某些专业资格变得一文不值，其他新资格则出现，因此只有最一般的管理技能和法律专业知识才可以保持其职位。</p>
<p>但是资格并不是调节工资等级的唯一方法。职业结构也起着重要作用。正是这种职业制度使管理人员受制于资本主义阶级，并加强了这一群体在社会上的分化以及内部的相互竞争。为了做到这一点，必须存在货币成功的机会。这些是由于企业结构的复杂性而引起的，其中包括大量的层次级别和多种功能。为确保职业竞争（不可避免的紧张源）不会危及公司的社会氛围，并使经理人员成为对老板不利的社会群体，必须严格执行人事政策的原则：严格定义个人责任，性能标准的高度客观性以及结构内部个人的强烈流动性。正是这些原则使美国巨型公司如此显着地适应了资本增值，同时又非常有效地成为了社会稳定的工具。美国的模式与法国典型的凝结结构截然不同，在法国，凝结的结构很大程度上未知，组织的职业因正式资格而受到石化，尤其是裙带关系和人际关系。</p>
<p>分配给管理人员在社会中的位置的关系的总和在该社会群体的特定意识形态中得到了强烈的内在化，通过使他们适应其在社会劳动分工中的作用来加强资本主义。它的两个互补的方面是对权威和个人主义的尊重。</p>
<p>对权威的尊重取决于对企业结构的严格限制，晋升所需的绩效，绝大多数管理人员零碎知识的薄弱程度以及在资本主义制度下承担的商品性质。因此，管理人员通常且不加批判地遵守晋升和制裁相结合的做法，这标志着他们的职业生涯。十分重要的文化态度也增强了对权威的尊重-上级和下级之间的协议关系，功能背后的人格消失，性格外向表达中最绝对的顺应性以及对任何独立见解的压制。</p>
<p>管理人员的个人主义完全符合资产阶级的意识形态。它只有一个维度，即金钱收益，它是职业系统的alpha和omega。它们之间几乎完全没有工会组织来表示。它刻画了这个社会群体中的所有人际关系，其中每个人的关系都是根据他在不断追求货币收益和由此产生的生活方式方面的成功来进行评估和评估的。这种生活方式使差异完全来自外部。人格的一维减少会导致商品所有权上的差异再次出现，这又进一步刺激了人们对金钱收益的日益追求。因此，个人之间的竞争会侵扰生活的方方面面。</p>
<p>但是，这种潜意识意识形态由支配日常生活的无意识规范组成，最近经历了某些逆转。这里可以指出三种不同的现象。</p>
<p>首先是与某些政治主题的出现有关，管理人员对此并不敏感，在社会不平等加剧，环境恶化和经济下滑引起的日益严重的问题中，对福特派式大型公司的目标提出了质疑。集体消费标准。对这些主题的政治思考不会深入到理解资本主义生产关系的本质。但是，消费，环境，社会不平等和歧视的问题正在唤醒管理人员对大公司的责任，并且使人们认为，集中其巨大的生产资源对他们和国家都负有一定的社会责任。</p>
<p>第二种现象是，由于引入自动控制系统而导致企业结构的变化，中层行政人员内部出现了不满情绪，这破坏了某些等级职能的职级。这些构成了新福特主义兴起引起的重组类别的一部分。</p>
<p>第三个现象是技术人员对研究方案的不满。与机械化原理相对应的日益分散的劳动过程迫使雇主将应用研究划分为不同的部门。由此产生的僵化以及详细的性能标准的紧身衣，损害了在一个总是很难预见结果的领域中不同研究领域之间的合作。由于通过自动生产控制来改变劳动过程，因此研究对于建立半自治团体特别有利。</p>
<p>福特主义陷入危机时，困扰管理人员的紧张关系似乎并没有严重威胁到他们的凝聚力，也没有一方面改变他们相对于资本家阶级，另一方面对无产阶级的状况。相反，它们似乎正在吸收和吸收社会变革，这些变革表征了密集积累制度的两种模式（福特主义和新福特主义）之间的过渡。</p>
<h2 id="二、消费社会化对工资形式变化的影响"><a href="#二、消费社会化对工资形式变化的影响" class="headerlink" title="二、消费社会化对工资形式变化的影响"></a>二、消费社会化对工资形式变化的影响</h2><p>正如我们已经论证的那样，社会劳动力的再生产不仅涉及其从一个生产周期到另一生产周期的有形重建。一代又一代的工人阶级也在不断更新。因此，复制的成本包括用于维持和教育将要替代现有劳动力的儿童的支出。它们还包括在短期内对前工人的维护，因为平均而言，这间隔了退休和死亡。最后，它们包括疾病保险费用，这使劳动力在其全部活动的较短或较长时间内无法使用。这些需求被整合到工人阶级的消费规范中，换句话说，是在大萧条时期通过资本主义生产方式进行管理的。自第二次世界大战结束以来，它们以惊人的速度不断发展。这些需求是由劳动收入阶级的生存条件的转变引起的。它们构成了一般生产条件社会化的一部分。在所有这些情况下，满足这些需求都进入了社会劳动力的价值。但是，从一种社会形态到另一种社会形态，收入的流动和满足这些需求的制度机制差异很大。根据税收和其他费用是否或多或少地社会化而产生差异，即是否将其纳入平衡集体支出的风险和成本的制度性机制之内。在不同国家中，支付给简单劳动力的直接工资之间的差异部分与满足这些需求的方式上的差异有关。</p>
<p>美国工资关系的结构形式是公共援助制度和保险制度。在福特主义时期，工资关系处于泛化阶段，目的是确保由于大众消费的增加而受到限制的支出的覆盖范围，这种工资关系的结构形式是公共援助制度和保险制度。每个机构都通过一系列机构运作。援助由公共当局的预算提供资金，并由一个特殊机构管理；从索赔人的角度来看，援助具有高度选择性和不确定性。由于援助制度直接掌握在资产阶级政治组织手中，获得援助的权利始终处于危险之中，无论在范围还是覆盖程度上都是如此。10民众运动只能对其施加外部压力。与援助相比，保险是一种更加系统化的制度，因为它将缴费与福利联系起来，并在或多或少的程度上使工资收入阶层内某些风险的融资社会化。保险进入集体谈判程序的议程，是阶级斗争妥协的一部分。在某些情况下，职工组织获得了对社会保险机构运行情况的审查权。但在任何情况下，保险都像援助一样，进入劳动力的社会价值，因此完全受制于累积律。就它们的实际购买力而言，这些系统产生的货币流动不会以任何规律的方式增长。更不用说直接工资由间接工资来补偿。当剩余价值比率被阻止上升时，社会消费的标准也会被阻止，就像实际工资停滞不前以及应对风险的体系的金融均衡恶化一样，而此时所有的风险都因就业的日益不安全而增加。事实上，相对剩余价值的威胁会减缓整体积累速度，并鼓励节约劳动力的生产方式，从而提高失业率水平。现在，社会保障体系只有在实际运行的劳动力能够支付不起的劳动力的情况下才能吸收这些风险。这是这些制度保障社会消费过程连续性不可缺少的条件，没有这种条件，集约积累制度将彻底瓦解。只有在有工作的工人的名义直接工资保持不变的情况下，才能实现这一点，因为整个供款和福利制度都是按照这个工资水平编制指数的。名义工资的稳定使由大量生产物品主导的消费过程得以继续。这种连续性通过抵消积累率的下降来限制失业。失业限制通过维持足以防止保险基金耗尽的缴费流动，给失业者提供相对的保障。这些基金带来的好处创造了支出流，巩固了就业水平。因此，名义参考工资的稳定(在整个福特主义时期都可以从历史上观察到)是消费社会化的基石，当剩余价值生产条件恶化时，这种社会化可以防止有效需求的累积短缺。这是凯恩斯反对劳动力供求之间自动平衡的概念的基本教训，据称劳动力供求之间的定义是相互独立的，而这种平衡是通过劳动力市场的灵活性来实现的。“劳动力均衡价格”。</p>
<p>在美国，个人主义的意识形态特别强烈，并且对工作和报酬之间的联系的信念始终存在，在美国，建立私人保险基金总体上胜过了社会团结原则来应对风险。因此，在研究美国保险制度时，最好说的是递延工资，而不是间接工资。这些采取的形式是工人私下设立的保险基金，主要用于医疗和外科手术，退休金则用于退休。私人保险计划远远超过社会保障的公共系统。这些资金使社会需求的满足服从于资本化的迫切需要。它们是合同储蓄快速发展的主要形式。这种发展是巨大的金融集中化的源泉。</p>
<p>金融集中化的最快方式是养老基金的扩张。这些私人养老基金的设立从20世纪初开始发展缓慢，因为某些特殊类别的技术工人（尤其是建筑技术人员）由于其形式上的地位而免受任务分散和随之而来的简单劳动力的减少相对落后的劳动过程。此外，这些工人组织在强大的工会中，可以与雇主就建立养老基金的计划进行讨价还价。但是，只有在大萧条时期，问题的社会规模才显现出来，数百万在职工人的失业使他们在难以形容的贫困状况下离开了退休岗位。罗斯福政府在国会上获胜，通过了一项由联邦预算资助的社会保障计划，该计划的一半由工资中扣除，另一半由雇主提供。这个非常适度的计划仅提供了绝对的最低限度的利益，但确实将个人保险与适度的收入再分配结合在一起。在联邦政府的管理下，该计划逐渐扩大到更多受益人，但收益仍然很小。仅在1973年，在通货膨胀加剧的情况下，并在获得广泛共识的社会力量的压力下，国会才大幅提高了最低福利，增加了将这些福利与生活成本挂钩的条款，并显着增加了缴费。因此，在此之前，社会保障体系一直只是为退休人员建立最低标准，而让每个人从他或她自己的私人保险计划中对其进行补充，现在最终开始被定性转变为国家养老金计划。计划包括所有私人安排，并将它们融合为一个单一的系统，在该系统中，风险的社会分配和养老金领取者的准备将取代个人保险。</p>
<p>由于私人养老基金形成了非常重要的资本储备，因此这里牵涉到非常重要的社会冲突。他们受到工业家和金融家的严厉捍卫。然而，这些方案在操作上的缺陷是如此之大，以致对它们的不满一直在增加。这些私人养老基金是社会需求与积累需求之间对抗的怪诞例子。普通的美国工人在将全部毕生精力投入私人养老金后，获得的退休金不到其最终工资的25％。在欧洲，百分比在50％到70％之间，由国家保证付款。</p>
<p>让我们简略地看看这些计划的具体运作情况。20世纪30年代末，随着集体谈判制度的建立，私人养老基金发展迅速。从1950年起，他们的资产平均增长率为15%。通过这种方式积累的金融资产总额，1940年为25亿美元，1950年为120亿美元，1960年为520亿美元，1970年为1360亿美元。这种增长是在不同但又汇聚的力量的压力下加速的：名义收入的快速增长，退休年龄的降低，需要缩小养老金领取者的收入与从事经济活动的人的收入之间的差距。但推动这些基金加速增长的力量，也是那些迫切要求废除私人资本化制度的力量。事实上，在社会保险制度中，支付的福利来自当期和累积的收入，这些收入要么来自对全体人口的收入征税，要么直接来自商品的社会贡献的总交换价值。在私人养老基金中，所有个人在生命末期获得的福利都是合同储蓄时间表的函数。但这些好处并不能得到保证。事实上，资产的所有权不在“打工仔”，而在资产阶级。这些基金是在公司的框架内通过集体谈判制定的计划设立的。其中包括工资供款和雇主供款，雇主的供款被视为“打工仔女”分享利润的一种方式，而利润则留待将来。事实上，雇主的供款实际上是没有支付的，或只是在很小程度上支付。公司将资金转移到由实力更强的商业银行集中投资的信托账户。因此，两间公司只从雇员供款所得的投资回报，预期基金的面值会如计划所预见般增长。由于这种回报来自工人阶级作为一个整体所产生的剩余价值，所以剥削和积累的循环过程就会自动发生。持有者支付的越多，资本家积累的越多，基金增值越多，资本家实际为养老金融资贡献的资金就越少。值得注意的结果是，未来将支付给一生做出贡献的工薪阶层的退休养老金总额取决于银行家投资于其贡献的股票的名义股票市值的增加。</p>
<p>因此，这些资金对资本积累的动态影响是很容易理解的。它源于以下事实：它们既不受保证也不受监管，导致公司将其视为构成工资不可或缺的经常性支出，同时还具有长期金融投资的理想属性（免税总额，新注入，流动性需要提前计划）。但是，我们也可以理解，这种金融投资的矛盾现在变得越来越尖锐。为了在通货膨胀时期支付体面的退休金，必须通过增加投资来获得更高的回报。这就不可能了，因为大银行无法将所有投资都投向那些高增长率的行业，而股本回报率最终不会人为地出现在实际获利能力上。直到1965年左右，由于建立了新的基金以及这些养老金计划的相对较新的特征，使得收益与基金价值的比率一直处于较低水平，这尤其如此，因为股票市场上股票的名义价值稳步增长并且比1950年以来的价格上涨要快得多。所有这些情况都从1966年开始逆转。年均支付额与累积资产的平均比率从1950年的3.3％上升到1960年的3.5％，到1970年上升到4.8％。此后，由于价格的快速上涨和持续的停滞，这种趋势得到了极大的加速。在华尔街，因为相对剩余价值的生产达到了极限。但是，这一比率的上升并没有揭示出未缴养老金的情况急剧增加，无论是总额还是低于工人缴纳的数额。正如我们已经看到的那样，在私人养老基金系统的危机爆发之时，迫切要求养老金体系普遍化和所支付的养恤金增加的力量比以前更加强大。这个问题因此成为一个政治问题。唯一可行的办法是将养恤金计划整合到一个单一的国家计划中，该计划必须按照联邦政府负责的供款和利益之间的平衡原则进行管理，规范资金的使用并保证其支付的稳定性。从长远来看解决方案。</p>
<p>在几个资本主义国家中，作为福特危机的一个方面的消费社会化不足已经在保险系统的财务状况恶化中得到了体现。这种恶化给利益带来压力，使危机更加恶化。在美国，私人计划的杂乱无章的组合（其中雇主的承诺仅是有条件的）带来了特别严重的危机。在大众消费上升的时期，大公司的管理者们自己赞成退休金计划的谈判，以换取工会放弃对工作组织变革的抵制，以加强劳动纪律。工人阶级行动手段的削弱在标志着1960年代上半年积累的加速步伐中发挥了重要作用。工人阶级通过其合同储蓄的资本化，对资本家阶级给予了长期的信誉。由于工会领导人相信无限的经济增长，它不仅因通货膨胀而在很大程度上被抢劫了其资产的实际价值，而且由于其退休金计划并未提供其名义价值，甚至常常被抢劫了其名义价值。保证通常会授予任何债权人。工资关系不是交换关系，甚至在工资合同的时候，也再没有明显的表达。这两个对立的阶级不是自满的社会伙伴。他们不是受相同规则约束的玩家，一个规则强于另一个规则。工资关系决定了不同的阶级地位。这两个“玩家”玩的不是同一个游戏，他们没有相同的目标，也没有遵循相同的规则。11</p>
<h2 id="三、消费社会化对工资长期运动的影响"><a href="#三、消费社会化对工资长期运动的影响" class="headerlink" title="三、消费社会化对工资长期运动的影响"></a>三、消费社会化对工资长期运动的影响</h2><p>我们对工资关系的分析得出的结论表明，在历史分析和概念阐述之间的相互转换中，有必要进一步向前迈进一步。我们现在必须深化和应用形式的概念，充分发挥工资理论的作用。我们已经在交换理论中遇到了这个形式概念。这一概念之所以在经济科学中占有一席之地，是因为它在同质价值场与使用价值的生产、分配和消费的具体的、异质的空间之间起着中介作用。同质价值场的认同建立了科学本身，而使用价值的生产、分配和消费空间又是具体的、异质的。这个具体的空间不能概念化。它表示经济行为的内容，是对人类个体根据特定项目转化资源并创造进入社会互动的人工制品的具体过程的描述。因此，具体的活动空间指的是劳动的一般决定。但是，这个具体的空间根本不足以描述一个社会的特征。赋予人类群体凝聚力，使我们能够谈论一个社会的，是一种任务的分配模式，这种模式不是源于他们的内容，而是强加在这个内容上。一种特定的任务分配模式与特定的、完全由社会决定的劳动相联系。我们知道，商品经济是一种任务分配方式，其特点是存在独立的私人劳动过程。社会凝聚力是通过对这些私人劳动进行社会确认的特定程序获得的，这些私人劳动在劳动产品成为商品后生效。在这种情况下，任务的分配方式可以概念化为一个同质的抽象空间，即价值空间。这个空间的构成关系是交换的社会关系，劳动的具体决定是抽象劳动。</p>
<p>根本的认识论问题是，不可能立即设想抽象的社会空间和具体的活动空间、具体的劳动决定论和一般的劳动决定论的统一。要将这两个空间联系起来，需要构建一个中介理论空间，即社会形态的中介理论空间。这个空间具有拓扑结构，而不是度量结构。它的要素是关系、社会互动，被赋予了再生产的规律。我们知道，在商品经济中，形态的典型形式是商品$C-M-C’$的变形。发达的形态是商品流通的总称。再生产的规律是交换等价性。这个社会形态的空间发挥了一种非常真实的调停作用。具体的活动空间和使用价值空间是商品蜕变的支撑空间。最后，社会形态空间与同质价值空间有关，因为交换等价性原则将后者强加于社会形态空间，即转换后的价值度量，即货币表现形式。</p>
<p>因此，我们可以看到为什么经济科学有必要在观察活动的支撑空间和分析同质价值空间上可衡量的幅度之间进行双向运动，以构建社会形式的空间。在资本主义的研究中，这种双向过程非常重要，在这种研究中，工资关系受制于比等价原理复杂得多的再生产法则。我们知道是因为工资关系是挪用与没收的关系。它定义的划分遵循质的差异和不平等影响的原则。我们之所以要分析工作组织的转变和赚钱阶级的存在条件，是为了更具体地研究工资关系的性质，以及它与活动的支持空间之间的关系。现在我们知道，这不仅是一种简单的交换关系，即使它以自由合同的形式出现。即使它引起了均质价值领域的分裂，它也不是力量的抽象平衡。在主要决定生产关系的情况下，工资关系中包含这些不同的模式，换句话说，社会的一部分分配了为整个社会创造生存条件所需的资源。这就是为什么对工资关系的再生产的研究首先需要对作为资本主义挪用基础的物质转化进行分析的原因。这种分析使我们能够确定由工资关系的发展所创造的基本社会形式。</p>
<p>现在有必要进一步研究工资关系的整体形态。由于工资关系是复杂的，并且其呈现的多种形式在质上是不同的和动态的，因此在社会形式空间中工资关系的再生产规律是所有这些基本形式的有机统一性原则。我们将这种统一称为结构形式。因此，结构形式是一种基本社会形式的凝聚方式，这种形式是由一个相同的基本社会关系的发展引起的。</p>
<p>按照上述理论阐述，我们现在将从以下方向着手研究工资关系：</p>
<p>(1)结构形式随着生产方式的实质性转变而演变。正是这种进化能力确保了在对立生产关系支配下的社会凝聚力。作为资本主义的一个新阶段，为了追求相对剩余价值，必须以集约积累制度为主导。福特主义统一了工资关系的不同局部存在形式，构成了一种涉及重大法典化的结构性形式—集体谈判。</p>
<p>集体谈判在美国的大规模发展与福特主义的兴起密不可分。它仍然是监管当代资本主义最基本的结构形式之一。研究这种结构形式，就能了解阶级斗争的发展方式。</p>
<p>(2)结构形式的形成和运行是社会关系—经济关系、政治关系、法律关系和意识形态关系的理论起点。发展集体谈判理论作为一种结构形式，意味着将这种表述设想为复制工资关系所必需的社会实践的统一。因此，结构形式理论是为资本主义国家理论奠定基础的一种方式。</p>
<p>(3)社会形态的再生产规律引起同质价值领域的变革。工资关系再生产的结构形式影响着劳动力价值向工资的转化。调查集体谈判后，我们便可以完成名义参考工资的厘定工作。然后，我们将展示集体谈判权的建立如何导致工资的长期数量发展以及在积累周期的不同阶段对工资的调节发生变化。</p>
<h3 id="1-通过集体谈判来疏通经济阶级斗争"><a href="#1-通过集体谈判来疏通经济阶级斗争" class="headerlink" title="1. 通过集体谈判来疏通经济阶级斗争"></a>1. 通过集体谈判来疏通经济阶级斗争</h3><p>本书不可能详细描述美国集体谈判的过程，有关这方面的文献已经很丰富了。13我们的任务是从结构形式的概念出发，说明为什么以及如何将这一整个过程与集约积累制度联系起来，作为工作组织和社会消费规范之间相互作用的正规化，而社会消费规范是福特主义特有的一般积累条件的基础。</p>
<h4 id="a-第二次世界大战后工会运动的趋势"><a href="#a-第二次世界大战后工会运动的趋势" class="headerlink" title="(a)第二次世界大战后工会运动的趋势"></a>(a)第二次世界大战后工会运动的趋势</h4><p>紧接着的战后时期对工人运动后来的发展起着决定性的作用。战争期间积累起来的对工资和工作条件的不满引发了大规模罢工，给工人阶级带来了一系列的经济胜利。但这是很长一段时间以来最后一次这样的场合，因为在同一时刻，工人运动将在政治战线上输掉一场决定性的战斗。</p>
<p>《新政》见证了美国保守派集团的显着削弱，在大萧条（Great Depression）经济崩溃引发的混乱中，美国的权力集团被逐出了权力。但是这种情况是短暂的。战争经济使工业和金融界能够与联邦政府建立紧密联系，并在政府中获得强势地位。在同一时期，一场大规模的反工人阶级意识形态运动开始了，它征集了各种各样的交流手段。这项运动的最终目的是对1935年的《瓦格纳法》进行全面修订，以打破法律上公认的工会的新权力。 1946年罢工时，反劳工运动利用了重新改建时期的稀缺性，达到了一个新的高度。即使在战争期间，南部，西部和中西部的各个州也通过了禁止关闭商店的立法。然而，1946年的选举以保守派的多数票重新获得通过，这使这一意识形态运动成为了一支全国性的法治力量。 1947年，国会通过了《塔夫脱-哈特利法案》，该法案几乎满足了雇主的所有要求。该法律废除了《瓦格纳法》的渐进规定，成为解决社会矛盾的新宪章。</p>
<p>《塔夫脱-哈特利法案》在其序言中宣称，有必要限制工会行动，因为这会损害“交换自由”。该基本法的主要规定可以分析如下：</p>
<p>（1）确认了工人自由选择工会代表的权利。当在生产单位中选举产生多数工会组织时，仅该组织就有权以整个劳动力的名义集体谈判。工会成立的程序，工会职权的更新以及对他们的法律承认，均由国家劳动关系委员会控制。</p>
<p>（2）此控件授权N.L.R.B.禁止任何雇主妨碍工会的合法成立。 N.L.R.B.然后必须对工会行动自由施加以下限制：禁止关闭商店，禁止任何罢工以建立工会，以及任何迫使雇主承认未经NLRB认证的工会的压力，或拒绝集体谈判。</p>
<p>（3）该法案试图界定那些应该或不应该构成集体谈判内容的一部分的问题，以及这种谈判应采取的形式。工会可以因违反合同，拒绝执行合同或在协议到期之前进行针对协议条款的罢工而受到起诉。禁止针对雇主单方面改变工作条件的行为。这项规定是决定性的。面对不断调整的工作结构，强化的生产规范以及技术进步掩盖下的沉思，这使工人无法武装。</p>
<p>（4）该法案禁止工会在全国大选期间向任何组织提供财政支持。它剥夺了联邦政府雇员的罢工权。</p>
<p>（5）最后，该法案明确赋予联邦政府干预社会冲突的权力，“危及国民经济”。权力范围的定义反映了雇主职位的含糊不清。一方面，用人单位迫切希望拥有对联邦政府进行镇压的制度化力量，以打破大规模的罢工。另一方面，他们不愿意通过可能会取代自己的决定权的行政干预来损害自己的行动自由。这种态度的灵感来自于他们的认识，即工资和工作条件与公司在价格和投资方面的重大决策密切相关。 《塔夫脱－哈特利法案》赋予联邦政府全部武器库，没有实行强制仲裁。这些措施包括设立实况调查委员会以提出建议，这些建议随后成为谈判的起点，在总统授权下召集白宫会议，发布禁令以强制罢工中止80天的可能性，以及有权扣押受争端影响的生产单位，并在代替私人所有者的联邦工作人员的管理下进行生产。</p>
<p>工会运动试图废除《塔夫特哈特利法案》的企图很快就消失了。杜鲁门庄严地发起冷战学说后，政治气氛迅速恶化。反工人阶级的思想运动发生了反共主义的转折，其毒力升级了。在普遍的恐惧和决心的气氛中，朝鲜战争达到了高潮。 CIO所属工会大规模驱逐共产党激进分子，决定性地削弱了工人运动，并以狭in的团体主义态度使CIO与AFL紧密结合，但目标却非常有限。这种社团主义逐渐削弱了集体谈判的内容，并切断了工人阶级的工会主义与自由派小资产阶级的政治力量的联系。结果是，在1960年代的政治斗争进行时，从少数群体的民权运动到反对经济歧视的斗争，再到扩大社会保障体系的斗争，这种有组织的劳工运动就不存在或没有尾巴了。群众起义反对越南战争。</p>
<p>对于第二次世界大战后工会运动的停滞，冷战的政治气氛和《塔夫特-哈特利法案》施加的限制极为重要。 1950年后，会员资格没有取得实质性进展，工会会员的比例甚至从1945年活跃的非农业人口的36％下降到1970年的28％。此外，一旦集体谈判制度化，就牵涉到集体谈判的制约，为石化工人运动做了很多工作。程序规则对工会施加了新的僵化，在质量上降低了工会的目标，吸收了官员在管理问题上的精力，并限制了社会冲突的范围。 《塔夫脱-哈特利法案》通过建立政治法律关系，使之适应于福特主义社会转型所产生的大规模工会主义，从而将以前只由手工艺工人实行的法人工会联合起来。 AFL的旧法人工会联合中心与1930年代的阶级斗争CIO在1954-55年间合并而来的新合并中心，使这种适应得以巩固。</p>
<h4 id="（b）集体谈判程序的一般特征"><a href="#（b）集体谈判程序的一般特征" class="headerlink" title="（b）集体谈判程序的一般特征"></a>（b）集体谈判程序的一般特征</h4><p>在战争期间，热烈鼓励工会和工厂管理人员直接干预以解决工作组织的问题。在那些工会化程度很高的行业中，产生了一系列规则，这些规则塑造了关于工作条件的集体谈判。这些规则通常包括对雇主解雇权的限制。这些不再是歧视性的。分包和临时员工的雇用在公司长期员工的雇用面临危险时严格限制。在活动减少的时期，管理人员和工会共同运作正式雇员之间的工作共享系统；只有在减少的工作周内重新分配任务后才能解雇。工会官员经常强迫雇主提前通知裁员计划，裁员原因以及他们打算采取的程序，以便可以与工人进行磋商并提出反对意见。裁员不用于在管理人员为提高产出标准而单方面施加的工作之间大量转移工人。资历权在任何情况下均应受到保护。工会还通过在集体谈判中引入晋升程序，争取赢得分配工人的权利。他们试图在集体合同中获得准确的职位描述，其中的条款禁止管理层在合同生效期间单方面更改这些职位。最后，他们寻求建立一致的工作时间表和加班规则。</p>
<p>因此，集体谈判在将其应用于劳动过程的组织时，可以具有非常丰富的内容，可以促进积极的工会生活。这样，它便成为工人争取安全和改善工作条件的武器。但是自从战争以来，美国阶级斗争的整个过程都是将集体谈判变成了雇主的重击。正是1953-54年的衰退，其过剩的生产能力，新的艾森豪威尔政府放弃新政的廉价信贷政策而加剧的财务困难，以及利润率的下降，都向雇主表明了转型的巨大意义为了持续地重新启动资本积累，需要生产条件。他们的反应是发动全面进攻以减少直接工资成本，这是资本主义生产关系中生产率提高的唯一含义。这个目标要求迅速概括那些在1930年代和第二次世界大战中已经成熟的技术分工的转变；换句话说，装配线工作的安装，多操作机床的引入使劳动过程变得更加灵活，生产操作的模式和互连的修改以及它们的细分和本地化，以利用新的集体生产手段和新形式的能源（石油和电力）。资本家深知，这种技术分工的改变绝不是共同努力的产物，这种改变旨在提高剩余价值率。对他们而言，当务之急是消除集体谈判制定的管理工作组织的规定。为了实现这一目标，需要对公司的管理实践和行政组织进行深刻的变革，这意味着需要就集体谈判的内容与工会进行对抗。以下是雇主寻求获得这些转变的方向。</p>
<p>（1）制定长期的总体工资政策，以尽可能地与工会打交道或与资本的集中程度相适应。</p>
<p>（2）制定管理控制程序，确定责任级别并形成一个框架，在该框架中，可以在受影响的工业园区的所有单位中严格执行总体工资政策。</p>
<p>（3）从集体谈判中排除工作条件，并由雇主强行规定新的工作条件；根据《塔夫特-哈特利法案》，对工会权利进行最严格的限制，以检查那些对生产剩余价值至关重要的过程；拟订各种纪律处分程序，并增加负责其应用的监督人员。</p>
<p>（4）在集体谈判的激励和利益分享计划，针对解雇的直接财务后果的保险资金以及退休金方面的补偿性发展。</p>
<p>这些目标是在极度激烈的冲突之后由雇主强加的，但是它们可以利用1954–55年AFL和CIO融合后工会领袖的政治思想发展。集体谈判的内容由此从工作条件转变为资本主义生产带来的货币收益，而集体谈判的形式则从分散的决策模式转变为更加集中的模式。</p>
<p>如果没有这种发展，就无法理解专门针对福特主义的密集积累制度，这种发展是在一系列重大斗争中强加的，这些斗争最终在1958-61年间达到顶峰，其形式是试验冲突，最终以试点合同的签署而告终。迅速推广。</p>
<p>“政府仲裁”的作用对于这些测试冲突的结果具有决定性作用。 《塔夫脱-哈特利法案》为联邦政府提供了干预社会冲突的各种手段，同时也为它在行使仲裁权方面留有广阔的空间。自然，这仅是在所采用的文字程序的纯粹形式上进行仲裁。实际上，国家干预意味着对雇主的支持，这仅仅是因为它在谈判中最决定性的时刻打破了工会的主要行动武器。在福特主义兴起期间，不需要持续的国家干预。政府选择示例性冲突就足够了，这些冲突的结果不能不为主要经济部门树立榜样。14然而，在1960年代，当时执政的民主党政府开始在双重方向上使用《塔夫特-哈特利法案》 。一方面，他们在某些行业中实行强制性仲裁，实际上是对罢工权的压制。另一方面，他们试图通过确定平均工资增长的一般准则来建立国家工资政策（工资准则）。</p>
<h4 id="（c）集体谈判在工资发展中的作用"><a href="#（c）集体谈判在工资发展中的作用" class="headerlink" title="（c）集体谈判在工资发展中的作用"></a>（c）集体谈判在工资发展中的作用</h4><p>集体谈判仍然保持着权力下放的态势。根据联邦政府的数据，1961年签订了150,000份工资合同（每100名工会工人中有1份）。但是，实际上，这些合同取决于主题演讲谈判确定的模型，这些模型随后散布在相关行业中。仅1733个合同涵盖了830万工人，而9个最重要的合同则涵盖了190万。</p>
<p>无论建立模型合同的谈判水平如何，这都成为整个行业的准则；它可能或多或少地对资本家有利，但它们之间的竞争确保了资本主义的泛化。该模型及其所包含的规范仅涵盖基本工资以及集体奖金和养老基金的主要计划。</p>
<p>集体谈判在形式集中、内容变化的同时，也发生了进一步的变化，导致名义工资的僵化，正如我们所看到的，这是福特主义的一个特征。工资合同不仅变得越来越统一和包罗万象，而且延长到了足够长的时间，以符合大公司的计划范围。因此，集体谈判程序的总和往往使其成为规划工人阶级消费规范发展的工具，在某些固定日期自动调整基本工资。通过将工资调整与商业周期分开，延长数年的集体合同使资本的扩大再生产对生产条件变化导致的交换等价关系的不稳定性不那么敏感。现在，这些公司可以将未来的工资变动并入资本，这是一种极有可能发生的情况，因此它们系统地引入并推广了适用于长期标准化生产的半自动劳动程序。(工业和信息化部电子科学技术情报研究所陈皓)。因此，上世纪60年代上半叶，社会实际工资成本加速下降，并掀起了整个资本主义历史上最强大的投资浪潮。因此，资本形成对产出的短期波动的敏感度很低，在这些波动的傍晚，资本形成的相互作用也是如此。</p>
<p>在无产阶级看来，这些长期合同是非常强大的剥削工具。他们解放了这个领域，使资本主义劳动纪律在生产中得到了猛烈的强化。在固定名义基本工资方面，长期合同滞后于生活成本的指数化，因此通胀越加速，实际工资就会恶化。最后，旨在压缩直接加薪的更高延期工资计划的蔓延，意味着—正如我们已经看到的—工人在支付养老金时经常被掠夺。</p>
<p>因此，福特主义引发的集体谈判程序危机恰逢相对剩余价值受阻也就不足为奇了。集体谈判作为一种结构形式，现在把阶级斗争包含在一个框架内，在这个框架内，资本家可以利用以大规模生产标准化商品为中心的劳动过程的组织所固有的一切剥削的可能性。但在那里，它对资本积累的有用性就到此为止了。它没有能力弥补这类劳动过程的不足，也没有能力进一步增加生产中的直接剥削。相反，日益严重的工作组织危机实际上威胁到了集体谈判，并促使国家进一步干预工资固定。从1966年起，越来越多的工人拒绝接受谈判达成的合同。这种拒绝伴随着自发的行动，这种行动在本世纪末变得更加频繁，特别是在集体谈判程序似乎最和谐和最复杂的行业(汽车、钢铁和电气建筑)。这些零星的斗争与集体谈判忽视的问题有关。</p>
<p>新福特主义带来的深远的工作组织变革不可避免地带来了集体谈判的修正。劳动过程组织的新的灵活性可以使工作条件再次成为半自治团体分散谈判的对象，而不会因此阻碍更先进的工作组织的进一步发展。然而，资产阶级对福特主义危机的典型反应是国家干预对工资的直接压力。在美国，这种威权性的工资决定是由共和党政府强加的，上台时打算放弃民主党前任的指令，这只是证实了危机的深度。尼克松政府成立了一个全国性的办公室，负责确定名义参考标准的增长。</p>
<h3 id="2-美国名义参考工资的确定和工资的长期运动"><a href="#2-美国名义参考工资的确定和工资的长期运动" class="headerlink" title="2. 美国名义参考工资的确定和工资的长期运动"></a>2. 美国名义参考工资的确定和工资的长期运动</h3><p>我们在第一章中说明了名义参考工资是如何通过等式正式表示为剩余价值率的转换货币价值的。这种关系是工资关系不同方面的统一对交换关系领域的影响。剥削率的负面影响综合了当时的社会生产条件，这表明名义参考工资源自资本主义的占有关系。就功能而言，我们已经看到这是工作时间的货币表达的过去幅度的函数，该函数本身随时间而变化。因此，我们可以这样写：$\bar{m}_t=\mu(m_{t-t’}，m_{t-t’’})$，其中时间间隔$t’,t’’\cdots$构成了函数$\mu$的一部分。</p>
<p>这种表达的意义是什么？它表明，以交换关系为名义的名义参考工资是形成程序的对象，换句话说，它是从结构形式中得出的。让我们仔细看看情况。函数μ代表过程本身。其值显示工作时间的货币表达形式随时间变化的影响。当生产条件的变化从根本上改变了整个等价类的集合时，这些变化表示一般等价物的可变性。一系列时间间隔定义了工作时间的货币表达方式的可变性影响工资合同的方式。该系列取决于议价程序，因此取决于该结构形式的所有决定因素。</p>
<p>名义参考工资的形成规律表明，这一变量的演变可以合理地用计量关系来描述，但首先也是最重要的，它强调了这种关系的稳定性条件。只有根据确定的集体谈判程序、确定了一系列间隔的条款并充分迅速地传播示范合同，工资形成才是稳定的。描述名义参考工资演变的计量经济学关系只通过历史分析确定和描述的积累过程的各个阶段来指明方向。</p>
<p>计量经济学关系的实质可以变得更加精确。实际上，正如我们在第一章中所看到的，两个日期$t$和$t’$之间的工时的货币表达式的变化是以以下方式估计的：$m^t_{t’}=\pi^t_{t’}\cdot P^t_{t’}$。其中$\pi$和$P$是两个日期之间的劳动生产率和一般价格水平的平均变化的指数。此外，剩余价值率的变化是由实际社会工资成本变化的反转给出的，实际社会工资成本涉及名义工资、价格和生产率。然后，我们设想了一种关系，在这种关系中，名义参考工资的变化是价格总水平和平均生产率变化的交错延迟的函数。还可以设想一种自回归关系，将劳动平均生产率的延迟增长作为自变量。</p>

                  <p><h2 id="一、消费模式的资本主义生产"><a href="#一、消费模式的资本主义生产" class="headerlink" title="一、消费模式的资本主义生产"></a>一、消费模式的资本主义生产</h2><p><span style='color:red'>本章的目的是研究社会劳动力的再生产。因此，它不涉及个人消费行为，而是涉及工人阶级存在条件的形成和转变</span>——换句话说，涉及资本积累的基础，工资关系概括的物质内容。因此，我们将通过识别那些相互作用导致名义参考工资固定的力量，从而深化我们的工资理论，这个问题我们在第一章的第一节给出了唯一的正式解决方案。我们还将讨论工资阶层的社会分层，以及资本主义是如何加剧这种分层的。最后，我们将分析由阶级斗争组织成产生集体谈判程序的制度的新型社会关系的产生，并评估这些程序对平均工资的长期演变的影响。</p>
<p>在社会活动的空间中，工资关系的再生产涉及到一个社会劳动力的维护周期，如图9所示。两种现象同时出现。一方面，社会劳动力的维持周期是一个价值的变形周期，它包括消费过程，而消费过程是由商品关系主导的。另一方面，循环通过我们在第一章中所研究的两个生产部门之间的联系，与扩大的资本再生产有横向关系。社会劳动力的维持周期与两个生产部门的积累周期之间的这种关系表明，资本主义条件下的商品流通是按照一般模式组织的。要使商品流通扩大为一个封闭的回路，包含两个生产部门之间必要的联系，这样一种一般模式的存在，由资本主义生产关系塑造的集体工人，也必须由决定消费行为的社会关系构成。工人与生产资料的分离，这是工资关系的起源，带来了各种传统的消费方式的破坏，导致了一种特定于资本主义的消费方式的创造。形成了工人阶级消费的社会规范，作为相对剩余价值的基本形态，成为工资关系延伸的基本决定因素。通过社会消费规范，将消费方式融入生产条件。在部门一产生的生产力突变，在部门二产生作用，其方式是减低劳动力价值，并相应增加剩余价值比率。对这种整合的分析是积累理论的一个重要方面。</p>
<p>图9所示。资本主义生产关系再生产的“双卷轴”:在两个生产部门中每个部门的总资本再生产，以及社会劳动力再生产。</p>

<li>$F_K,F_L&gt;0;F_{KK},F_{LL}&lt;0$；</li>
<li>一次齐次函数：$F(\lambda K,\lambda L) = \lambda F(K,L)$</li>

<li>$\dot{k} = sf(k)-(\delta+n)k$</li>
</ul>
<h3 id="转移动态"><a href="#转移动态" class="headerlink" title="转移动态"></a>转移动态</h3><p>资本增长率为：</p>
<script type="math/tex; mode=display">
\gamma_k = \frac{\dot{k}}{k} = \frac{sf(k)}{k}-(\delta+n)</script><p>根据Inada假设，可以知道图形如下：</p>
<p><div align='center'>

</div><br>所谓稳态，指的是满足$\gamma_k=0$的$k$值，假设为$k^\star$。当人均资本偏离$k^\star$时，有回到这一点的趋势。</p>
<h3 id="条件收敛"><a href="#条件收敛" class="headerlink" title="条件收敛"></a>条件收敛</h3><p>注意到:</p>
<script type="math/tex; mode=display">
\frac{sf(k^\star)}{k^\star}-(\delta+n) = 0\Rightarrow \frac{sf(k^\star)}{k^\star}=(\delta+n)</script><p>于是</p>
<script type="math/tex; mode=display">
\gamma_k =\frac{sf(k)}{k}-(\delta+n) 
= (\delta+n)\left[ \frac{sf(k)/k}{sf(k^\star)/k^\star}-1 \right]</script><p>资本初始存量低，即$\frac{f(k)}{k}$比较大，此时$\gamma_k$比较大，资本增长率非常高。随着资本的积累，$\gamma_k$逐渐减少直至为负。资本积累的这个特点被称为“穷国增长的快、富国增长的慢”的“后发优势”，也就是这里说的条件收敛。</p>
<h2 id="拉姆齐模型（Ramsey）——将储蓄（消费）内生化的模型"><a href="#拉姆齐模型（Ramsey）——将储蓄（消费）内生化的模型" class="headerlink" title="拉姆齐模型（Ramsey）——将储蓄（消费）内生化的模型"></a>拉姆齐模型（Ramsey）——将储蓄（消费）内生化的模型</h2><p>拉姆齐模型讨论的是一个<span style='color:red'>封闭经济</span>。在这个经济中有大量<span style='color:red'>相同</span>的厂商和大量<span style='color:red'>相同</span>的家庭。每一个<strong>代表性</strong>厂商都是竞争性的，他们租用资本和雇佣劳动来进行生产，<span style='font-family:fangsong'>行为准则是通过最优地选择资本的租用数量和劳动的雇佣数量来最大化自己的利润</span>；而每一个<strong>代表性</strong>家庭则是经济资源（资本和劳动）的所有者，他们提供劳动、出租资本，同时也要决定消费和储蓄的数量，<span style='font-family:fangsong'>行为准则是通过最优地选择消费路径来最大化自己的效用</span>。</p>
<p>家庭和厂商这两类典型的经济个体通过市场的作用联系在一起。厂商通过产品市场来销售他们的产品，以满足家庭的消费；家庭通过资本市场来出租他们的资本，通过劳动力市场来出租自己的劳动，以满足厂商的生产需求。经过价格杠杆（包括产品价格、工资率以及资本报酬率）的调节，当这些市场中的需求等于供给的时候，我们就认为经济达到了一种均衡的状态。</p>
<h3 id="代表性家庭"><a href="#代表性家庭" class="headerlink" title="代表性家庭"></a>代表性家庭</h3><ul>
<li>家庭规模：$\frac{\dot{L}}{L}=n\Rightarrow L(t)=L(0)e^{nt}$</li>
<li>家庭资产变化：$\dot{A}=wL+rA-C$，各项分别为工资收入、利息收入和消费</li>
<li>人均形式的家庭资产变化：$\dot{a}=w+ra-c-na$</li>
</ul>
<p>家庭面临的是如下最优化问题：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}    
    \max_{c(t)}&&\int_0^\infty u(c(t))e^{-(\rho-n)t}\text{d}t    \notag\\
    \text{s.t.}&& \dot{a}=w+ra-c-na    \notag\\
    && a(0)=a_0    \notag
\end{eqnarray}</script><blockquote>
<p>对这个最优化问题的求解有些复杂：</p>
<p>设最优值$c^\star(t),a^\star(t)$必须满足：</p>
<script type="math/tex; mode=display">
\int_0^\infty u(c(t))e^{-(\rho-n)t}\text{d}t-\int_0^\infty u(c^\star(t))e^{-(\rho-n)t}\text{d}t    \le 0</script><p>将约束条件代入其中：</p>
<script type="math/tex; mode=display">
\int_0^\infty u(w+(r-n)a-\dot{a})e^{-(\rho-n)t}\text{d}t-\int_0^\infty u(w+(r-n)a^\star-\dot{a}^\star)e^{-(\rho-n)t}\text{d}t    \le 0</script><script type="math/tex; mode=display">
\int_0^\infty \left[ u(w+(r-n)a-\dot{a})- u(w+(r-n)a^\star-\dot{a}^\star)\right]e^{-(\rho-n)t} \text{d}t    \le 0</script><p>利用泰勒展开式：</p>
<script type="math/tex; mode=display">
f(x)-f(x_0) = f'(x_0)(x-x_0)+o(x-x_0)</script><p>可以将被积函数化为：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    u(c)-u(c^\star) &\approx& u'(c^\star)(c-c^\star)  \notag\\
    &=& u'(c^\star)\left[w+(r-n)a-\dot{a}-w-(r-n)a^\star+\dot{a}^\star\right]    \notag\\
    &=& u'(c^\star)\left[(r-n)(a-a^\star)-(\dot{a}-\dot{a}^\star)\right]    \notag
\end{eqnarray}</script><p>代入积分中，我们得到：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    &&\int_0^\infty u'(c^\star)\left[(r-n)(a-a^\star)-(\dot{a}-\dot{a}^\star)\right] e^{-(\rho-n)t} \text{d}t\le 0 \notag\\
    && \int_0^\infty u'(c^\star)(r-n)(a-a^\star)e^{-(\rho-n)t} \text{d}t
    - \int_0^\infty u'(c^\star)\color{blue}{(\dot{a}-\dot{a}^\star)}e^{-(\rho-n)t} \color{blue}{\text{d}t}\le0    \notag\\
    && \int_0^\infty u'(c^\star)(r-n)(a-a^\star)e^{-(\rho-n)t} \text{d}t
    - \int_0^\infty u'(c^\star)e^{-(\rho-n)t} \color{blue}{\text{d}(a-a^\star)}\le0    \notag\\
    && \int_0^\infty u'(c^\star)(r-n)(a-a^\star)e^{-(\rho-n)t} \text{d}t
    - \left.u'(c^\star)e^{-(\rho-n)t}(a-a^\star)\right\lvert_{t=0}^\infty 
    + \int_0^\infty (a-a^\star)\text{d}\left[ u'(c^\star)e^{-(\rho-n)t} \right]\le0    \notag\\

\end{eqnarray}</script><p>上式第二项化为：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \lim_{t\rightarrow\infty}u'(c^\star)e^{-(\rho-n)t}(a-a^\star)    \tag{1}
\end{eqnarray}</script><p>第三项化为：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    &&\int_0^\infty (a-a^\star)\text{d}\left[ u'(c^\star)e^{-(\rho-n)t} \right]    \notag\\
  &=&\int_0^\infty (a-a^\star)\left[u''(c^\star)c^{\star'}e^{-(\rho-n)t}+u'(c^\star)(n-\rho)e^{-(\rho-n)t}\right]\text{d}t    \notag\\
    &=& \int_0^\infty (a-a^\star) [u''(c^\star)c^{\star'}+u'(c^\star)(n-\rho)]e^{-(\rho-n)t}\text{d}t    \notag
\end{eqnarray}</script><p>将第三项与第一项合并得到：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \int_0^\infty (a-a^\star)e^{-(\rho-n)t}\left[ u''(c^\star)c^{\star'} + u'(c^\star)(r-\rho) \right]\text{d}t    \tag{2}
\end{eqnarray}</script><p>因此最优值应该满足：</p>
<script type="math/tex; mode=display">
\int_0^\infty (a-a^\star)e^{-(\rho-n)t}\left[ u''(c^\star)c^{\star'} + u'(c^\star)(r-\rho) \right]\text{d}t
    -\lim_{t\rightarrow\infty}u'(c^\star)e^{-(\rho-n)t}(a-a^\star) \le0</script><p>要使得上式<strong>恒成立</strong>，只需要满足以下两个条件即可：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    &&u''(c^\star)c^{\star'} + u'(c^\star)(r-\rho)=0    \notag\\
    &&\lim_{t\rightarrow\infty}u'(c^\star(t))e^{-(\rho-n)t}(a-a^\star)=0    \notag
\end{eqnarray}</script><p>其中第一个式子可以得到拉姆齐规则：</p>
<script type="math/tex; mode=display">
\frac{\dot{c}^\star}{c^\star} = -\frac{u'(c^\star)}{u''(c)c^\star}(r-\rho)</script><p>对于给定的利息率和工资率路径，代表性家庭选择（消费量）最优化的行为。</p>
<p>第二个式子被称为<span style='color:red;font-family:kai'>横截条件</span>。</p>
</blockquote>
<h3 id="代表性厂商"><a href="#代表性厂商" class="headerlink" title="代表性厂商"></a>代表性厂商</h3><p>假定代表性厂商有一次齐次生产函数，其最优化问题为：</p>
<script type="math/tex; mode=display">
\max_{K,L} \pi = F(K,L)-wL-(r+\delta)K = L[f(k)-w-(r+\delta)k]</script><p>一阶条件：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \frac{\partial \pi}{\partial k} = L[f'(k)-(r+\delta)] = 0\Rightarrow f'(k)=r+\delta    \notag
\end{eqnarray}</script><p>而劳动的边际产品为：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    F_L(K,L)&=&\frac{\partial F(K,L)}{\partial L} = \frac{\partial [Lf(k)]}{\partial L} 
=f(k)+L\frac{\partial f(k)}{\partial k}\cdot\frac{\partial k}{\partial L}  \notag\\
    &=&f(k)+Lf'(k)\left(-\frac{K}{L^2}\right) = f(k)-kf'(k) \notag
\end{eqnarray}</script><p>因此有效率的工资为：</p>
<script type="math/tex; mode=display">
w = f(k)-kf'(k)</script><p>如果工资水平$w$和利率水平$r$是外生给定的，那么可以利用上式求得稳态下的人均资本量$k^\star=k(r,w)$。</p>
<h3 id="竞争性市场的均衡特征"><a href="#竞争性市场的均衡特征" class="headerlink" title="竞争性市场的均衡特征"></a>竞争性市场的均衡特征</h3><p>将代表性家庭和代表性厂商的行为结合在一起，就能得到竞争性市场的均衡特征。在资本市场上，供求的均衡由利息率来调节；在劳动力市场上，供求的均衡则由工资率来调节。在基本的拉姆齐模型中，由于我们考虑的是<span style='color:red'>封闭</span>经济，即全部的国内资本存量都归家庭所有，从而人均资产必定等于人均资本$a=k$。</p>
<p>重新写代表性家庭的预算约束$\dot{a}=\color{purple}w+\color{blue}r\color{green}a-c-n\color{green}a$</p>
<script type="math/tex; mode=display">
\dot{k} = \color{purple}{f(k)-kf'(k)}+(\color{blue}{f'(k)-\delta})\color{green}k-c-n\color{green}k</script><p>一阶条件也得重写：</p>
<script type="math/tex; mode=display">
\frac{\dot{c}^\star}{c^\star} = -\frac{u'(c^\star)}{u''(c)c^\star}(f'(k)-\delta-\rho)</script><p>横截条件也可以重写：</p>
<script type="math/tex; mode=display">
\lim_{t\rightarrow\infty} e^{-(f'(k)-\delta-n)t}k(t)=0</script><p>以上也可以使用汉密尔顿函数求解，具体过程在高级数理-宏观部分。</p>
<h3 id="约束条件是怎么写的？"><a href="#约束条件是怎么写的？" class="headerlink" title="约束条件是怎么写的？"></a>约束条件是怎么写的？</h3><script type="math/tex; mode=display">
\begin{eqnarray}
    \dot K &=& Y-C-\delta K    \notag\\
    \dot k &=& \frac{\text{d}k}{\text{d}t} = \frac{\text{d}(K/L)}{\text{d}t} 
    = \frac{\frac{\text{d}K}{\text{d}t}\cdot L-\frac{\text{d}L}{\text{d}t}K}{L^2} 
    = \frac{\dot K}{L}-k\frac{\dot L}{L} \notag\\
    &=& \frac{Y-C-\delta K}{L}-nk=f(k)-c-(\delta+n)k    \notag
\end{eqnarray}</script><h2 id="中央计划者问题"><a href="#中央计划者问题" class="headerlink" title="中央计划者问题"></a>中央计划者问题</h2><p><span style='font-family:kai'>注意：中央计划者问题中，被积函数的贴现因子里没有人口增长率$n$。</span></p>
<p>拉姆齐模型满足福利经济学第一定理的条件，因此均衡必定是帕累托最优的。下面用中央计划者的规划问题来说明这一点。将会发现中央计划者的规划问题的最优解与分散的竞争性最优解，即拉姆齐模型的最优解，是相同的。</p>
<p>中央计划者的目标是最大化家庭的福利水平：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \max &&\left\{ B\int_0^{+\infty} e^{-\beta t}\frac{c(t)^{1-\theta}}{1-\theta}\text{d}t \right\}    \notag\\
    \text{s.t. } && \dot k(t)=f(k(t))-c(t)-(n+g)k(t)    \notag
\end{eqnarray}</script><p>将此连续时间规划问题离散化后，然后可以采用<span style='color:red'>拉格朗日方法</span>或者<span style='color:red'>以资本作为状态转改变量的贝尔曼方法</span>来进行求解。这里只介绍拉格朗日方法。</p>
<p>第一种：汉密尔顿函数法</p>
<p>构造现值汉密尔顿函数：</p>
<script type="math/tex; mode=display">
H_c = e^{\beta t}H =\frac{c(t)^{1-\theta}}{1-\theta}+\mu_t\left[ f(k(t))-c(t)-(n+g)k(t) \right]</script><p>一阶条件：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    &&\frac{\partial H_c}{\partial c_t} = c_t^{-\theta}-\mu_t    =0    \tag{1}\\
    &&\frac{\partial H_c}{\partial\mu_t} = \dot k_t =  f(k_t)-c_t-(n+g)k_t     \tag{2}\\
    &&\frac{\partial H_c}{\partial k_t} =-\dot\mu_t+\beta \mu_t =    \mu_t[f'(k_t)-(n+g)]    \tag{3}
\end{eqnarray}</script><p>根据（1）$\mu_t=c_t^{-\theta}$，两边关于$t$求导：</p>
<script type="math/tex; mode=display">
\dot\mu_t=-\theta c_t^{-\theta-1}\cdot\dot c_t = -\theta c_t^{-\theta}\cdot\frac{\dot c_t}{c_t}=-\theta \mu_t\cdot\frac{\dot c_t}{c_t}</script><p>因此得到欧拉方程：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \frac{\dot c_t}{c_t} = -\frac{1}{\theta}\cdot\frac{\dot\mu_t}{\mu_t}    \tag{4}
\end{eqnarray}</script><p>根据（3）</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \dot\mu_t=-\mu_t[f'(k_t)-\beta-(n+g)]    \tag{5}
\end{eqnarray}</script><p>将（5）代入（4）</p>
<script type="math/tex; mode=display">
\frac{\dot c_t}{c_t} = \frac{1}{\theta}\cdot[f'(k_t)-\beta-(n+g)]</script><p>根据（2），我们有</p>
<script type="math/tex; mode=display">
\frac{\dot k_t}{k_t} = \frac1{k_t}[f(k_t)-c_t]-(n+g)</script><p>第二种，离散法</p>
<p>将中央计划者的规划问题离散化，得到：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \max &&\left\{ \sum_i B e^{-\beta t_i}\frac{c(t_i)^{1-\theta}}{1-\theta} \Delta t_i \right\}    \notag\\
    \text{s.t. } && k(t_{i+1})-k(t_i) = [f(k(t_i))-c(t_i)-(n+g)k(t_i)]\Delta t_i    \notag
\end{eqnarray}</script><p>构造如下拉格朗日方程：</p>
<script type="math/tex; mode=display">
\max \sum_i \left(B e^{-\beta t_i}\frac{c(t_i)^{1-\theta}}{1-\theta} \Delta t_i 
+\lambda_i \left\{    -k(t_{i+1})+k(t_i) + [f(k(t_i))-c(t_i)-(n+g)k(t_i)]\Delta t_i    \right\} \right)</script><p>关于消费的一阶条件为：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    B e^{-\beta t_i}c(t_i)^{-\theta}\Delta t_i =\lambda_i\Delta t_i 
    \Longrightarrow 
    \left\{\begin{aligned}
    &B e^{-\beta t_i}c(t_i)^{-\theta} =\lambda_i\\
    &B e^{-\beta t_{i+1}}c(t_{i+1})^{-\theta} =\lambda_{i+1}
    \end{aligned}\right.    \notag
\end{eqnarray}\tag{6}</script><p>关于资本的一阶条件为：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    &&\lambda_{i-1}(-1)+\lambda_i\left\{1+[f'(k(t_i))-(n+g)]\Delta t_i    \right\}=0    \notag\\
    \Rightarrow && \lambda_{i-1}=\lambda_i\left\{1+[f'(k(t_i))-(n+g)]\Delta t_i    \right\}    \notag\\
    \Rightarrow && \lambda_{i}=\lambda_{i+1}\left\{1+[f'(k(t_{i+1}))-(n+g)]\Delta t_{i+1}    \right\}    \tag{7}
\end{eqnarray}</script><p>将(6)代入(7)中得到：</p>
<script type="math/tex; mode=display">
B e^{-\beta t_i}c(t_i)^{-\theta} = B e^{-\beta t_{i+1}}c(t_{i+1})^{-\theta}\left\{1+[f'(k(t_{i+1}))-(n+g)]\Delta t_{i+1}    \right\}</script><p>变形得到：</p>
<script type="math/tex; mode=display">
1 = e^{-\beta \Delta t_{i+1}}\left\{1+[f'(k(t_{i+1}))-(n+g)]\Delta t_{i+1}    \right\}\left[\frac{c(t_{i+1})}{c(t_i)}\right]^{-\theta}</script><p>其中$\Delta t_{i+1}\equiv t_{i+1}-t_i$，变形得到：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    &&    1 = e^{-\beta \Delta t_{i+1}}\left\{1+[f'(k(t_{i+1}))-(n+g)]\Delta t_{i+1}    \right\}\left[1+\frac{c(t_{i+1})-c(t_i)}{c(t_i)}\right]^{-\theta}    \notag\\
    &&    1 = e^{-\beta \Delta t_{i+1}}\color{blue}{\left\{1+[f'(k(t_{i+1}))-(n+g)]\Delta t_{i+1}    \right\}}
    \left\{\color{purple} {\left[1+\frac{c(t_{i+1})-c(t_i)}{c(t_i)}\right]^{\frac{c(t_i)}{c(t_{i+1})-c(t_i)}}}\right\}^{-\theta\left[ {\color{green}{\frac{c(t_{i+1})-c(t_i)}{\Delta t_{i+1}}}}\cdot \frac{\Delta t_{i+1}}{c(t_i)}\right]}        \notag
\end{eqnarray}</script><p>这里需要使用一些数学里面等价的知识：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    &&\color{blue}{1+[f'(k(t_{i+1}))-(n+g)]\Delta t_{i+1}\sim e^{[f'(k(t_{i+1}))-(n+g)]\Delta t_{i+1}},\quad(\Delta t_{i+1}\rightarrow 0)}    \notag\\
    &&\color{purple}{\left[1+\frac{c(t_{i+1})-c(t_i)}{c(t_i)}\right]^{\frac{c(t_i)}{c(t_{i+1})-c(t_i)}}\rightarrow e,\quad    \left(    \frac{c(t_i)}{c(t_{i+1})-c(t_i)}\rightarrow+\infty    \right)}    \notag\\
    &&\color{green}{\frac{c(t_{i+1})-c(t_i)}{\Delta t_{i+1}}\rightarrow \dot c(t_{i+1})    \quad (\Delta t_{i+1}\rightarrow 0)}    \notag
\end{eqnarray}</script><p>上边式子化为：</p>
<script type="math/tex; mode=display">
1=e^{-\beta\Delta t_{i+1}} e^{[f'(k(t_{i+1}))-(n+g)]\Delta t_{i+1}} e^{-\theta \dot c(t_{i+1})\frac{\Delta t_{i+1}}{c(t_i)}}</script><p>考虑到时间的任意性，那么得到：</p>
<script type="math/tex; mode=display">
1= e^{-\beta\Delta t} e^{[f'(k(t)) -(n+g)]\Delta t} e^{-\theta \frac{\dot c(t)}{c(t)}\Delta t}
=e^{\left\{ -\beta+[f'(k(t))-(n+g)]-\theta\frac{\dot c(t)}{c(t)} \right\}\Delta t}</script><p>两边取对数</p>
<script type="math/tex; mode=display">
0 = \left\{ -\beta+[f'(k(t))-(n+g)]-\theta\frac{\dot c(t)}{c(t)} \right\}\Delta t</script><p>于是得到了欧拉方程：</p>
<script type="math/tex; mode=display">
\frac{\dot c(t)}{c(t)}=\frac{f'(k(t))-n-g-\beta}\theta</script><p>此欧拉方程和竞争性均衡中的欧拉方程是相同的。因此中央计划者的最优解和竞争性均衡的解是完全相同的。</p>
<h2 id="戴德蒙（diamond）世代交替模型（OLG，overlapping-generation）"><a href="#戴德蒙（diamond）世代交替模型（OLG，overlapping-generation）" class="headerlink" title="戴德蒙（diamond）世代交替模型（OLG，overlapping generation）"></a>戴德蒙（diamond）世代交替模型（OLG，overlapping generation）</h2><p>OLG最大的特征是<span style='color:red'>考虑了人口的新老更替，即新的经济个体不断出生，而老的个体不断衰亡</span>。仅仅是为了弥补自身数学方面的短板，这个模型里面时间是离散的，也就是说时间$t$的取值只能是$1,2,3,\cdots$。</p>
<h3 id="一些假设："><a href="#一些假设：" class="headerlink" title="一些假设："></a>一些假设：</h3><ul>
<li>离散时间</li>
<li>第$t$期有个人出生，人口增长率为$n$，也就是$\frac{L_{t+1}}{L_t}=1+n$</li>
<li>假设每个人只生存两期，这是为了简化分析，突出<span style='color:red'>新老交替</span>这个特征（不好意思我就是数学不好）</li>
<li>消费假定：每个人在年轻时（$t=1$）都提供1单位劳动，并且将劳动所得用于第1期的消费和储蓄。在年老时($t=2$)，人们仅仅消费其储蓄的本息和。</li>
<li><span style='font-family:fangsong'>很显然这个消费的假定有很强的历史局限性，在不同的历史时期以及不同的地区，这个假定都是不现实的。比如，这个假定没有考虑信贷，对于当前买车买房基本靠按揭的时代，这个模型需要修改！</span></li>
</ul>
<h3 id="模型设定及求解"><a href="#模型设定及求解" class="headerlink" title="模型设定及求解"></a>模型设定及求解</h3><ul>
<li><p><span style='color:red'>人口</span>：$L_t = L_0(1+n)^t \equiv(1+n)^t(L_0=1)$</p>
</li>
<li><p><span style='color:red'>代表性企业</span>：$f’(k_t)=r_t+\delta,\quad w_t = f(k_t)-k_tf’(k)$。第一个式子表达的是资本的边际产出，它等于折旧与利息之和。第二个式子是有效劳动平均工资的决定式(在拉姆齐模型中求出来的)。</p>
</li>
<li><p>设$c_{t+1}^t$代表第$t$期出生的人在第$t+1$期的消费，那么第$t$期出生的人面临如下的效用最大化问题。</p>
</li>
<li><script type="math/tex; mode=display">
\begin{eqnarray}
    \max_{c_t^t,c^t_{t+1}} &&u(c_t^t,c^t_{t+1})    \notag\\
    \text{s.t.} && c_t^t+s_t\le w_t\notag\\
  && c^t_{t+1}\le (1+r_{t+1}^e)s_t    \notag
\end{eqnarray}</script></li>
<li><p>第一个约束条件的含义是年轻时的消费和储蓄之和不能超过工资，第二个约束条件的含义是老年时的消费不能超过储蓄带来的本息之和。这个问题的一阶条件为：</p>
</li>
<li><script type="math/tex; mode=display">
u_1(-1)+u_2(1+r_{t+1}) = 0\Rightarrow \frac{u_1}{u_2} = 1+r_{t+1}</script></li>
<li><p>$r_{t+1}^e$是老年期的预期利润率，上标$e$是“预期”（expection）的意思。关于这个利润率，也有完全预期($r_{t+1}^e=r_{t+1}$，对老年的利润率了如指掌)和适应性预期（$r_{t+1}^e$短视，用当前的利润率估计下一期的利润率）两种假定。</p>
</li>
<li><p>模型中储蓄率是内生的（也好理解，因为每一阶段的选择变量为当期出生人的消费$c_t^t$，而一旦$c_t^t$确定了，那么$s_t$也就确定了，因此选$c_t^t$就相当于选$s_t$），可以将约束条件取等号代入效用函数，再反解出来。</p>
</li>
<li><script type="math/tex; mode=display">
s_t\equiv s(w_t,r_{t+1}) = \arg\max_{s_t} u(w_t-s_t,(1+r_{t+1})s_t)</script></li>
<li><p>当然这里要对下一期（老年期）的利润率作一定的假定才可以。接下来写出<span style='color:red'>资本积累方程</span>：</p>
</li>
<li><script type="math/tex; mode=display">
\begin{eqnarray}
    \color{red}{K_{t+1}} &=& \color{purple}{Y_t(\text{产出})} \color{blue}{- C_t(\text{消费})} + (1-\delta)K_t(\text{资本残值})    \notag\\
    &=& \color{purple}{w_tL_t + (r_t+\delta)K_t}(\text{假定当期产出用于支付工资、分红和补偿折旧})    \notag\\
    && \color{blue}{-c^{t-1}_tL_{t-1}-c^t_tL_t}(\text{消费包括当期出生和上一期出生的两类人的消费})    \notag\\
    && +(1-\delta)K_t    \notag\\
    &=& \color{purple}{(c^t_t+s_t)L_t}(\text{工资用于消费和储蓄})    \notag\\
    && +(1+\color{purple}{r_t})K_t \notag\\
    &&\color{blue}{-(1+r_t)S_{t-1}(\text{老年的消费等于上一期储蓄的本息和}) -c_t^tL_t}    \notag\\
    &=& \color{red}{s_tL_t+(1+r_t)(K_t-s_{t-1}L_{t-1})}    \notag\\
    \Delta K_t&=& s_tL_t+r_tK_t-(1+r_t)s_{t-1}L_{t-1}    \notag
\end{eqnarray}</script></li>
<li><p>进一步求解：</p>
</li>
<li><script type="math/tex; mode=display">
\begin{eqnarray}
    K_{t+1} &=& s_tL_t+(1+r_t)(K_t-s_{t-1}L_{t-1})    \notag\\
                    &=&    s_tL_t+\color{purple}{(1+r_t)K_t} \color{blue}{- (1+r_t)s_{t-1}L_{t-1}}    \notag\\
                    &=& s_tL_t+\color{purple}{c^{t-1}_tL_{t-1}}(\text{假定t期的资本均为上一期出生的人所有}) \notag\\
                    &&\color{blue}{-c^{t-1}_tL_{t-1}}    \notag\\
                    &=&s_tL_t\equiv S_t    \notag\\
    \color{red}{k_{t+1}}    &=&\color{red}{\frac{s_tL_t}{L_{t+1}} = \frac{s_t}{1+n} 
                    = \frac{s(w_t,r_{t+1})}{1+n}=\frac{s(f(k_t)-k_tf'(k),f'(k_{t+1})-\delta)}{1+n}}    \notag
\end{eqnarray}</script></li>
<li><p>红色的式子为OLG的基本方程</p>
</li>
</ul>
<h3 id="经典例子"><a href="#经典例子" class="headerlink" title="经典例子"></a>经典例子</h3><p>假设生产函数为：$f(k)=k^\alpha$，最优化问题如下：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \max_{c_t^t,c_{t+1}^t} u(c_t^t,c_{t+1}^t) &=& \frac{(c_t^t)^{1-\theta}-1}{1-\theta}+\beta\frac{(c_{t+1}^t)^{1-\theta}-1}{1-\theta}    \notag\\
    \text{s.t.}\quad     &&c_t^t+s_t\le w_t    \notag\\
                                        &&c^t_{t+1}\le (1+r_{t+1})s_t    \notag
\end{eqnarray}</script><blockquote>
<p>解答：</p>
<p>取等式约束，其一阶条件为：</p>
<script type="math/tex; mode=display">
\frac{(c_t^t)^{-\theta}}{(c_{t+1}^t)^{-\theta}} = \beta(1+r_{t+1})</script><p>据此求解内生变量$s_t$。</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    &&\left[\frac{w_t-s_t}{(1+r_{t+1})s_t}\right]^{-\theta} =\beta(1+r_{t+1})        \notag\\
    &\Rightarrow&\frac{w_t-s_t}{(1+r_{t+1})s_t} = \left[\frac{1}{\beta(1+r_{t+1})}\right]^{\frac1\theta}    =\frac{1}{\beta^{\frac1\theta}(1+r_{t+1})^{\frac1\theta}}\notag\\
    &\Rightarrow&\frac{w_t}{s_t}-1 = \frac{1+r_{t+1}}{\beta^{\frac1\theta}(1+r_{t+1})^{\frac1\theta}} = \frac1{\beta^\frac1\theta(1+r_{t+1})^{\frac1\theta-1}}    \notag\\
    &\Rightarrow& \frac{w_t}{s_t} = \frac{1+\beta^\frac1\theta(1+r_{t+1})^{\frac1\theta-1}}{\beta^\frac1\theta(1+r_{t+1})^{\frac1\theta-1}} \notag\\
    &\Rightarrow&s_t = \frac{w_t\beta^\frac1\theta(1+r_{t+1})^{\frac1\theta-1}}{1+\beta^\frac1\theta(1+r_{t+1})^{\frac1\theta-1}} 
    =\frac{w_t}{\beta^{-\frac1\theta}(1+r_{t+1})^{1-\frac1\theta}+1}    \notag
\end{eqnarray}</script><p>工资为:$w_t = f(k_t)-k_tf’(k_t) = k_t^\alpha-k_t\cdot\alpha k_t^{\alpha-1}=(1-\alpha)k_t^\alpha$。</p>

<h2 id="货币"><a href="#货币" class="headerlink" title="货币"></a>货币</h2><h3 id="OLG中的货币"><a href="#OLG中的货币" class="headerlink" title="OLG中的货币"></a>OLG中的货币</h3><p>在Samuelson的模型中，由于货币的价值储藏功能，可以产生对于货币的内生需求，而不需要事先假定货币的交易功能。应该指出的是，具有货币的OLG模型的这一突出特征的获得是由于假定了货币作为价值储藏形式不受其他资产支配的缘故。一旦我们在经济中引入资本、政府债券等其他资产形式，则为了获得货币经济均衡，就一定需要某种交易技术的出现。</p>
<h3 id="一些假定："><a href="#一些假定：" class="headerlink" title="一些假定："></a>一些假定：</h3><ul>
<li><p>时间离散，且只存在年轻和老年期两个时期。</p>
</li>
<li><p>$t$时刻出生的人数为$N_t$，人口增长率为$n$，于是$N_t=N_0(1+n)^t\equiv(1+n)^t $。</p>
</li>
<li><p>假定每个人在年轻的时候可获得<span style='color:red'>一单位无法储存的消费品</span>，而在年老的时候没有收获。</p>
</li>
<li><p>$t$时刻出生的人的效用函数为：$u(c^t_t,c^t_{t+1})$。满足约束条件：$c^t_t\le1,c^t_{t+1}\le 1+n$。</p>
</li>
<li><p>一般而言，个人总是希望在生命的每一期中都有正的消费，但在此模型中这却是一个不可达到的结果。因为假定消费品不能储存，因此当本期的年轻人变老时，他将没有任何东西（既没有收获，也没有储藏）来与年轻人进行交换。于是，在这样的实物经济当中，最后的均衡一定是：$c^t_t=1,c^t_{t+1}=0$。</p>
</li>
<li><p>上述均衡肯定不是帕累托最优的，这一困难将在引货币后解决。假定在经济的初始时刻老年人获得来自政府的$H$张完全可分的钞票（即货币），并且老年人以及其后的每一代人都相信他们可以用货币以一定的价格交换商品。于是，每个人都可以有两期的正消费，即在<span style='font-family:fangsong'>年轻时出售商品来换取货币，而在年老时再利用货币来购买商品</span>。</p>
</li>
<li><p>$t$时刻出生的人所面临的最优化问题为：</p>
</li>
<li><script type="math/tex; mode=display">
\begin{eqnarray}
    \max_{c^t_t,c^t_{t+1}}    && u(c^t_t,c^t_{t+1})    \notag\\
    \text{s.t.}    && p_t(1-c^t_t) = M^d_t    \notag\\
    && p_{t+1} c^t_{t+1} = M^d_t    \notag
\end{eqnarray}</script></li>
<li><p>其中$p_t,p_{t+1}$分别表示$t$期和$t+1$的价格水平，$M^d_t$表示个人的货币需求。</p>
</li>
</ul>
<p>一个均衡条件：两期中，单位价格的边际效用相等。</p>
<script type="math/tex; mode=display">
\frac{\partial u/\partial c^t_t}{p_t}=\frac{\partial u/\partial c^t_{t+1}}{p_{t+1}}</script><p>上式所决定的$c^t_t$意味着货币需求函数为：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \frac{M_t^d}{p_t}=f\left( \frac{p_t}{p_{t+1}} \right)    \tag{14.3}
\end{eqnarray}</script><p>这里$\left( \frac{p_t}{p_{t+1}} \right)$表示货币的收益率，可记为$(1+g_t)$，其中$g_t$是通货膨胀率。</p>
<p>我们知道，老年人必定无弹性地供给他们手中的货币，而年轻人则按照货币需求函数来决定货币的持有量。因此，经济的均衡条件是：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    (1+n)^t M_t^d = H\quad\text{人口}\times\text{个人货币需求}=\text{货币发行量}    \tag{14.4}
\end{eqnarray}</script><p>根据（14.3）和（14.4），得到</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    f(1+g_t) &=& \frac{M_t^d}{p_t} = \frac{H}{(1+n)^tp_t}    \notag\\
    f(1+g_{t+1}) &=& \frac{M_{t+1}^d}{p_{t+1}} = \frac{H}{(1+n)^{t+1}p_{t+1}}    \notag
\end{eqnarray}</script><p>于是得到</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \frac{f(1+g_t)}{f(1+g_{t+1})}=\frac{(1+n)p_{t+1}}{p_t} =(1+g)^{-1}(1+n)    \tag{14.5}
\end{eqnarray}</script><p>在经济的稳态中，人均实际货币持有量是常数，从而$g_t$也必定是常数。于是，由上式可知稳态的通货紧缩率等于人口增长率。</p>
<h3 id="Tobin模型"><a href="#Tobin模型" class="headerlink" title="Tobin模型"></a>Tobin模型</h3><p>假定<span style='color:red'>生产函数</span>是新古典的：</p>
<script type="math/tex; mode=display">
y_t=f(k_{t-1})</script><p>假定代表性消费者<span style='color:red'>可持有的资产</span>有两种形式：物质资本和货币：</p>
<script type="math/tex; mode=display">
a_t = k_t+m_t</script><p>其中$m_t\equiv\frac{M_t}{P_tN_t}$，$M_t$表示名义货币存量，$P_t$表示价格水平，$N_t$表示人口。</p>
<p>$t$时刻的<span style='color:red'>总收入</span>可以表示为：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    &&Y_t+\tau_t N_t+\left( \frac{M_{t-1}}{P_t}-\frac{M_{t-1}}{P_{t-1}} \right)    \notag\\
  &&\text{总产出}+\text{转移支付}+\text{货币形式的资产因价格波动带来的损失}    \notag
\end{eqnarray}</script><p>如果定义通货膨胀率为：$\pi_t\equiv\frac{P_t-P_{t-1}}{P_{t-1}}$，那么资产因价格波动造成的损失可以表示为：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \frac{M_{t-1}}{P_t}-\frac{M_{t-1}}{P_{t-1}} &=& M_{t-1}\cdot\frac{P_{t-1}-P_t}{P_tP_{t-1}} = - \frac{M_{t-1}}{P_t}\cdot\frac{P_t-P_{t-1}}{P_{t-1}}    \notag\\
    &=&-\frac{M_{t-1}\pi_t}{P_{t-1}}\cdot\frac{P_{t-1}}{P_t}
    =-\frac{M_{t-1}\pi_t}{P_{t-1}(1+\pi_t)}    \notag
\end{eqnarray}</script><p>总资产的运动方程可以表示为：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \Delta K+\Delta\left(\frac{M_t}{P_t}\right) 
\equiv s\left( Y_t+\tau_tN_t-\frac{\pi_t}{1+\pi_t}\cdot\frac{M_{t-1}}{P_{t-1}} \right)    \tag{14.15}
\end{eqnarray}</script><p>将上式写成人均形式：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \frac{\Delta K_t}{N_t} &=& \frac{\Delta(k_tN_t)}{N_t}
=\frac{N_{t-1}\Delta k_t+k_{t-1}\Delta N_t}{N_t}    \notag\\
&=& \frac{\Delta k_t}{1+n}+ k_{t-1}\frac{\Delta N_t}{N_{t-1}}\cdot\frac{N_{t-1}}{N_t}    \notag\\
&=& \frac{\Delta k_t}{1+n}+\frac{n_t}{1+n_t}k_{t-1}    \notag\\
&\approx& \Delta k_t+\frac{n_t}{1+n_t}k_{t-1}    \notag
\end{eqnarray}</script><script type="math/tex; mode=display">
\begin{eqnarray}
    \frac{1}{N_t}\Delta\left(\frac{M_t}{P_t}\right)  
    &=& \frac{1}{N_t}\frac{P_{t-1}\Delta M_t-M_{t-1}\Delta P_t}{P_tP_{t-1}}    \notag\\
    &=& \frac{1}{P_tN_t} \left( \Delta M_t - \frac{M_{t-1}\Delta P_t}{P_{t-1}} \right)    \notag\\
    &=& \frac{M_{t-1}}{P_tN_t} \left( \frac{\Delta M_t}{M_{t-1}} - \frac{\Delta P_t}{P_{t-1}} \right)    \notag\\
    &=& \frac{P_{t-1}N_{t-1}}{P_tN_t}\cdot\frac{M_{t-1}}{P_{t-1}N_{t-1}}\left( \frac{\Delta M_t}{M_{t-1}} - \frac{\Delta P_t}{P_{t-1}} \right)    \notag\\    \notag\\
    &=& \frac{1}{(1+\pi_t)(1+n_t)}\cdot m_{t-1}(\theta_t-\pi_t)    \notag
\end{eqnarray}</script><script type="math/tex; mode=display">
\frac{M_{t-1}/P_{t-1}}{N_t} 
= \frac{M_{t-1}}{P_{t-1}N_{t-1}}\cdot\frac{N_{t-1}}{N_t}
= m_{t-1}\cdot\frac{1}{1+n_t}</script><p>其中$m_t\equiv\frac{\Delta M_t}{M_{t-1}}$为名义货币存量增长率，于是有：</p>
<script type="math/tex; mode=display">
\Delta k_t = s\left[ f(k_{t-1})+\tau_t -\frac{\pi_t}{1+\pi_t}\cdot\frac{m_{t-1}}{1+n_t} \right]
-\left[ \frac{\theta_t-\pi_t}{(1+\pi_t)(1+n_t)} \right]m_{t-1}-\frac{n_t}{1+n_t}k_[t-1]</script><p><span style='color:red'>由于名义货币存量的改变由政府的转移支付所导致</span>，$\tau_tN_t=\frac{\Delta M_t}{P_t}$从而：</p>
<script type="math/tex; mode=display">
\tau_t=\frac{\Delta M_t}{P_tN_t} 
= \frac{\Delta M_t}{M_{t-1}}\cdot\frac{M_{t-1}}{P_{t-1}N_{t-1}}\cdot\frac{P_{t-1}N_{t-1}}{P_tN_t}
=\theta_tm_{t-1}\frac{1}{(1+\pi_t)(1+n_t)}</script><p>于是资产运动方程可以进一步简化为：</p>
<script type="math/tex; mode=display">
\Delta k_t = sf(k_{t-1})-(1-s)\left[ \frac{\theta_t-\pi_t}{(1+\pi_t)(1+n_t)} \right]m_{t-1}-\frac{n_t}{1+n_t}k_{t-1}</script><p>在稳态中，$\Delta k^\star=0$，于是有：</p>
<script type="math/tex; mode=display">
sf(k^\star)=(1-s)\frac{\theta-\pi}{(1+\pi)(1+n)}m^\star+\frac{n}{1+n}k^\star</script><p>结论：Tobin模型中货币是中性的，即名义货币存量的增加只影响价格水平，不会影响到经济的实际均衡。</p>
<h3 id="效用函数中的货币：Sidrauski模型"><a href="#效用函数中的货币：Sidrauski模型" class="headerlink" title="效用函数中的货币：Sidrauski模型"></a>效用函数中的货币：Sidrauski模型</h3><p>假定消费者的效用函数为$u(c_t,m_t)$，$u_c,u_m&gt;0;u_{cc},u_{mm}&lt;0$。自变量分别为人均消费和人均实际货币余额。</p>
<p>消费者面临的预算约束为：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \text{支出：}\quad C+\frac{\text{d}K}{\text{d}t}+\frac1P\frac{\text{d}M}{\text{d}t}
    =wN+rK+\tau N\quad \text{收入}    \tag{14.27}
\end{eqnarray}</script><p>记$k\equiv\frac{K}{N};m\equiv\frac{M}{PN}$，分别为人均资本存量和人均实际货币余额，由于</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \frac{\text{d}K/\text{d}t}{N}&=&\frac{\text{d}(kN)/\text{d}t}{N}
    =\frac{k\frac{\text{d}N}{\text{d}t}+N\frac{\text{d}k}{\text{d}t}}{N}
    =\frac{\text{d}k}{\text{d}t}+nk    \notag\\
    \frac{1}{N}\left( \frac1P\frac{\text{d}M}{\text{d}t} \right)
    &=& \frac{1}{PN} \frac{\text{d}(mPN)}{\text{d}t} 
    =\frac{1}{PN}\frac{m\text{d}(PN)+PN\cdot\text{d}m}{\text{d}t}    \notag\\
    &=&\frac{m}{PN}\frac{P\text{d}N+N\text{d}P}{\text{d}t}+\frac{\text{d}m}{\text{d}t}    \notag\\
    &=&\frac{m}{N}\frac{\text{d}N}{\text{d}t}+\frac{m}{P}\frac{\text{d}P}{\text{d}t}+\frac{\text{d}m}{\text{d}t}    \notag\\
    &=& mn+m\pi+\frac{\text{d}m}{\text{d}t}    \notag
\end{eqnarray}</script><p>于是（14.27）可以进一步写成：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    c+\frac{\text{d}k}{\text{d}t}+nk+mn+m\pi+\frac{\text{d}m}{\text{d}t}
    =w+rk+\tau    \tag{14.28}
\end{eqnarray}</script><p>将总资产记为$a\equiv k+m$，（14.28）可以进一步改写：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \frac{\text{d}a}{\text{d}t} =[(r-n)a+w+\tau]-[c+(\pi+r)m]    \tag{14.29}
\end{eqnarray}</script><p>于是代表性消费者面临的优化问题为：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \max_{c,m} &&\int_0^\infty u(c,m)e^{-\rho t}\text{d}t    \notag\\
    \text{s.t.} && \frac{\text{d}a}{\text{d}t} =[(r-n)a+w+\tau]-[c+(\pi+r)m]    \notag
\end{eqnarray}</script><p>构造汉密尔顿函数：</p>
<script type="math/tex; mode=display">
H=u(c,m)+\lambda\{ [(r-n)a+w+\tau]-[c+(\pi+r)m] \}</script><p>一阶条件为：</p>
<script type="math/tex; mode=display">
\left\{\begin{aligned}
    &\frac{\partial H}{\partial c} = u_c-\lambda=0\\
    &\frac{\partial H}{\partial m} =u_m-\lambda(\pi+r)=0\\
    &\dot{\lambda}=-\frac{\partial H}{\partial a}+\rho\lambda=-\lambda(r-n)+\rho\lambda\\
    &\lim_{t\rightarrow\infty}a_t\lambda_te^{-\rho t}=0
\end{aligned}\right.</script><blockquote>
<p>多说一句最后一个方程：横截条件。</p>
<p>由于目标函数积分是无穷期的，不妨假设是垂直截止情形，期末时刻设为$t$，写出表达式后再令$t\rightarrow\infty$。</p>
<p>此外，人均资本存量还必须满足$a_t\ge 0$这个条件，结合垂直截止情形的横截条件$\lambda_t\ge 0$。利用库恩-塔克条件，得到</p>
<script type="math/tex; mode=display">
a_t\lambda_t e^{-\rho t}=0</script><p>注意目标函数中有贴现因子，因此多了一个$e^{-\rho t}$。</p>
</blockquote>
<p>最后要<span style='color:red'>求解方程</span>：</p>
<p>假定生产函数是新古典的，于是资本和劳动的收益率分别等于它们的边际产品：</p>
<script type="math/tex; mode=display">
r=f'(k);\quad w=f(k)-kf'(k)</script><p>由于名义货币存量的改变是由政府的转移支付导致的，因此</p>
<script type="math/tex; mode=display">
\tau=\frac{\text{d}M/\text{d}t}{PN} 
= \frac{\text{d}M/\text{d}t}{M}\frac{M}{PN}=\theta m</script><p>稳态下，$\text{d}a^\star=\text{d}k^\star=\text{d}m^\star=0$。</p>
<p>由$\text{d}m^\star=0$:</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    &&\text{d}m=\text{d}\left(\frac{M}{PN}\right)=\frac{PN\text{d}M-M\text{d}(PN)}{(PN)^2}=0    \notag\\
    \Rightarrow && (PN)\text{d}M=M\text{d}(PN)    \notag\\
    \Rightarrow && \text{d}M=\frac{M}{PN}(P\text{d}N+N\text{d}P)    \notag\\
    \Rightarrow && \text{d}M=\frac{M}{N}\text{d}N+\frac{M}{P}\text{d}P    \notag\\
    \Rightarrow && \frac{1}{M}\frac{\text{d}M}{\text{d}t}
    =\frac{\text{d}N}{N\text{d}t} + \frac{\text{d}P}{P\text{d}t}    \notag\\
    \Rightarrow && \theta = n+\pi    \notag
\end{eqnarray}</script><p>稳态消费为：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    c^\star &=& (r-n)a^\star +\color{purple}w +\color{blue}{\tau}-(\pi+r)m^\star    \notag\\
            &=& (r-n)a^\star +\color{purple}{[f(k^\star)-kf'(k^\star)]} +\color{blue}{\theta m^\star}-(\pi+r)m^\star    \notag\\
            &=&(r-n)a^\star +f(k^\star)-k^\star r+(\color{green}{\theta-\pi}-r)m^\star    \notag\\
            &=&(r-n)a^\star +f(k^\star)\color{pink}{-k^\star r}+(\color{green}n-r)m^\star    \notag\\
            &=&(r-n)a^\star +f(k^\star)+\color{pink}{(n-r)k^\star}+(n-r)m^\star\color{pink}{-nk^\star}    \notag\\
            &=&f(k^\star)-nk^\star    \notag
\end{eqnarray}</script><p>由一阶条件$u_m=u_c(\pi+r)$。稳态时$\dot{\lambda}=0\Rightarrow r=\rho+n$，于是能得到：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    u_m(c^\star,m^\star) = (\rho+\theta)u_c(c^\star,m^\star)    \tag{14.38}
\end{eqnarray}</script><p>稳态的人均资本存量水平和消费水平是由与标准的Ramsey 模型中相同的条件决定的，他们都与货币增长率无关。因此，在Sidrauski 模型中，货币是<span style='color:red'>超中性</span>的，这是和Tobin 模型不同的一个结论。用隐函数求导法则：</p>
<script type="math/tex; mode=display">
\frac{\text{d}m}{\text{d}\theta} = \frac{u_c}{u_{mm}-(\rho+\theta)u_{cm}}
=\frac{u_c}{u_{mm}-\frac{u_m}{u_c}u_{cm}}<0</script><p>较高的货币增长将会降低消费者对货币的持有。</p>
<h2 id="实际经济周期模型（RBC）"><a href="#实际经济周期模型（RBC）" class="headerlink" title="实际经济周期模型（RBC）"></a>实际经济周期模型（RBC）</h2><p>RBC模型是在拉姆齐模型的<span style='color:red'>离散版本</span>基础上进行的扩展。本模型与离散时间版本拉姆齐模型两个最主要的区别是：<span style='font-family:fangsong'>引入了技术冲击和政府购买冲击，效用函数中引入了劳动。</span></p>
<h3 id="模型设定"><a href="#模型设定" class="headerlink" title="模型设定"></a>模型设定</h3><ul>
<li>生产函数：$Y_t = K_t^\alpha(A_tL_t)^{1-\alpha}$</li>
<li>资本运动方程：$K_{t+1}=K_t+I_t-\delta K_t = K_t+(Y_t-C_t-G_t)-\delta K_t$</li>
<li>实际工资：$w_t=(1-\alpha)K_t^\alpha(A_tL_t)^{-\alpha}A_t=(1-\alpha)\left(\frac{K_t}{A_tL_t}\right)^\alpha A_t$</li>
<li>实际利率：$r_t=\alpha\left( \frac{A_tL_t}{K_t} \right)^{1-\alpha}-\delta$</li>
<li>人口增长：$\ln N_t=\bar{N}+nt,n&lt;\rho\Rightarrow N_t =e^{\bar{N}+nt}$</li>
</ul>
<h3 id="代表性家庭的最大化问题的介绍"><a href="#代表性家庭的最大化问题的介绍" class="headerlink" title="代表性家庭的最大化问题的介绍"></a>代表性家庭的最大化问题的介绍</h3><script type="math/tex; mode=display">
U = \sum_{t=0}^\infty e^{-\rho t}u(c_t,1-\mathscr{l}_t)\frac{N_t}{H}</script><ul>
<li>$H$：家庭数量</li>
<li>$\frac NH$：家庭成员数量</li>
<li>$c=\frac CN$：人均消费</li>
<li>$\mathscr{l}=\frac LN$：人均劳动时间（或者是就业率？PPT上没有进行说明）</li>
<li>瞬时效用函数：$u_t=\ln c_t+b\ln(1-\mathscr{l}_t),b&gt;0$。<span style='color:red'>这里假定效用会因劳动时间的增加而减少！</span></li>
<li>技术冲击：$\ln A_t=\bar{A}+gt+\tilde{A}_t$</li>
<li>其中$\tilde{A}_t$服从一阶自回归过程AR(1)：$\tilde{A}_t=\rho_A\tilde{A}_{t-1}+\varepsilon_{A,t},-1&lt;\rho_A&lt;1$，$\varepsilon_{A,t}$为白噪声。</li>
<li>政府购买冲击：$\ln G_t=\bar{G}+(n+g)t+\tilde{G}_t$</li>
<li>其中$\tilde{G}_t$服从一阶自回归过程AR(1)：$\tilde{G}_t=\rho_G\tilde{G}_{t-1}+\varepsilon_{G,t},-1&lt;\rho_G&lt;1$，$\varepsilon_{A,t}$为白噪声，且与$\varepsilon_{A,t}$不相关。</li>
</ul>
<h3 id="家庭行为"><a href="#家庭行为" class="headerlink" title="家庭行为"></a>家庭行为</h3><h4 id="1-劳动供给的跨期替代"><a href="#1-劳动供给的跨期替代" class="headerlink" title="1. 劳动供给的跨期替代"></a>1. 劳动供给的跨期替代</h4><h5 id="情形1：静态模型（一期模型）"><a href="#情形1：静态模型（一期模型）" class="headerlink" title="情形1：静态模型（一期模型）"></a>情形1：静态模型（一期模型）</h5><p>家庭只有一个成员，其规划问题为：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \max && \ln c+b\ln(1-\mathscr{l})    \notag\\
    \text{s.t. } && c=w\mathscr{l}    \notag\\
    \text{FOC:} &&\left\{ 
        \begin{aligned}
            &\frac1c-\lambda=0\\
            &-\frac{b}{1-\mathscr{l}}+\lambda w=0
        \end{aligned}\right.    \notag\\
    \Rightarrow && -\frac{b}{1-\mathscr{l}}+\frac{1}{\mathscr{l}} = 0    \notag
\end{eqnarray}</script><p>从上述结果来看，劳动供给独立于工资。解释：效用函数是对数形式，并且家庭无初始财富，因此工资变动的收入效应和替代效应相互抵消。</p>
<h5 id="情形2：两期模型"><a href="#情形2：两期模型" class="headerlink" title="情形2：两期模型"></a>情形2：两期模型</h5><p>存活两期的家庭的规划问题为：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \max && \ln c_1+b\ln(1-\mathscr{l}_1) 
    +e^{-\rho}[\ln c_2+b\ln(1-\mathscr{l}_2)]    \notag\\
    \text{s.t. } && c_1+\frac{c_2}{1+r}=w_1\mathscr{l}+\frac{w_2\mathscr{\mathscr{l}_2}}{1+r}    \notag
\end{eqnarray}</script><p>构造拉格朗日函数：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \mathscr{L} &=& \ln c_1+b\ln(1-\mathscr{l}_1) 
    +e^{-\rho}[\ln c_2+b\ln(1-\mathscr{l}_2)]    \notag\\
  &&+\lambda\left[ w_1\mathscr{l}+\frac{w_2\mathscr{\mathscr{l}_2}}{1+r}
  -c_1-\frac{c_2}{1+r} \right]\notag\\     
    \text{FOC:} &&\left\{ 
        \begin{aligned}
            &\frac{b}{1-\mathscr{l}_1}=\lambda w_1\\
            &\frac{e^{-\rho}b}{1-\mathscr{l}_2}=\frac{\lambda w_2}{1+r}
        \end{aligned}\right.    \notag\\
    \Rightarrow && \frac{1-\mathscr{l}_1}{1-\mathscr{l}_2}=\frac{1}{e^{-\rho}(1+r)}\frac{w_2}{w_1}    \notag
\end{eqnarray}</script><p>两期的相对劳动供给取决于相对劳动工资和利率。由于对数效用函数，两期闲暇的替代弹性为1。</p>
<h4 id="2-不确定情形下的家庭最优化"><a href="#2-不确定情形下的家庭最优化" class="headerlink" title="2. 不确定情形下的家庭最优化"></a>2. 不确定情形下的家庭最优化</h4><p>这里要构造<span style='color:red'>家庭</span>的最优化问题，将利率和工资视为外生给定的。</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
        \max && U=\mathbb{E}_0\left\{ \sum_{t=0}^\infty e^{-\rho t } u\left( \frac{C_t}{N_t},1-\frac{L_t}{N_t} \right) \frac{N_t}{H} \right\}    \notag\\
    \text{s.t. } && K_t(1+r_t)+W_tL_t-C_t=K_{t+1}\notag
\end{eqnarray}</script><p>构造拉格朗日函数：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \mathscr{L} = \mathbb{E}_0\sum_{t=0}^{\infty}
    &&\left\{ e^{-\rho t} \frac{N_t}{H}\left[ \ln\left( \frac{C_t}{N_t} \right) + b\ln\left( 1-\frac{L_t}{N_t} \right) \right] 
    +\lambda_t[K_t(1+r_t)+W_tL_t-K_{t+1}-C_t]\right\}     \notag\\
    \text{FOC:(分别对}K_{t+1},L_t,C_t) &&\left\{ 
        \begin{aligned}
            &\lambda_t=\mathbb{E}_t[\lambda_{t+1}(1+r_{t+1})]\\
            &\lambda_t=\frac{be^{-\rho t}}{HW_t(1-\mathscr{l}_t)}\\
            &\lambda_t=\frac{e^{-\rho t}c_t}{H}
        \end{aligned}\right.    \notag\\
    \Rightarrow && \left\{ 
        \begin{aligned}
            &\frac{1}{c_t}=e^{-\rho}\mathbb{E}_t\left[ \frac{1}{c_{t+1}}(1+r_{t+1}) \right]\\
            &\frac{c_t}{1-\mathscr{l}_t} = \frac{w_t}{b}
        \end{aligned}\right.    \notag
\end{eqnarray}</script><p>(中央计划者)最大化家庭效用：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
        \max && U=\mathbb{E}_0\left\{ \sum_{t=0}^\infty e^{-\rho t } u\left( \frac{C_t}{N_t},1-\frac{L_t}{N_t} \right) \frac{N_t}{H} \right\}    \notag\\
    \text{s.t. } && K_{t+1}=K_t+[F(K_t,L_t)-C_t-G_t]-\delta K_t\notag
\end{eqnarray}</script><p>为了便于求解，这里作了一些（不切实际）假定：</p>
<ul>
<li>折旧率为$\delta=100%$</li>
<li>没有政府购买</li>
</ul>
<p>因此最大化家庭效用为：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
        \max && U=\mathbb{E}_0\left\{ \sum_{t=0}^\infty e^{-\rho t } u\left( \frac{C_t}{N_t},1-\frac{L_t}{N_t} \right) \frac{N_t}{H} \right\}    \notag\\
    \text{s.t. } && K_{t+1}=Y_t-C_t\notag
\end{eqnarray}</script><h5 id="1-求储蓄率"><a href="#1-求储蓄率" class="headerlink" title="1.求储蓄率"></a>1.求储蓄率</h5><p>将人均消费</p>
<script type="math/tex; mode=display">
c_t=\frac{(1-s_t)Y_t}{N_t}</script><p>代入一阶条件中</p>
<script type="math/tex; mode=display">
\frac{1}{c_t}=e^{-\rho}\mathbb{E}_t\left[ \frac{1}{c_{t+1}}(1+r_{t+1}) \right]</script><p>两边取对数，得到：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    -\ln \left[ (1-s_t)\frac{Y_t}{N_t} \right] 
=-\rho+\ln\mathbb{E}_t
\left[ \frac{1+r_{t+1}}{(1-s_{t+1})Y_{t+1}/N_{t+1}} \right]    \tag{3}
\end{eqnarray}</script><p>又因为有</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    K_{t+1}(1+r_{t+1}) = \alpha Y_{t+1}    \tag{CD生产函数假定}\\
    K_{t+1} = Y_t-C_t=s_tY_t    \notag
\end{eqnarray}</script><p>将其代入（3）中：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
        -\ln \left[ (1-s_t)\frac{Y_t}{N_t} \right] 
    &=&-\rho+\ln\mathbb{E}_t
\left[ \frac{\alpha Y_{t+1}/K_{t+1}}{(1-s_{t+1})Y_{t+1}/N_{t+1}} \right]    \notag\\
    \ln(1-s_t)-\ln Y_t+\ln N_t&=&-\rho+\ln\mathbb{E}_t
\left[ \frac{\alpha \color{blue}{N_{t+1}}}{(1-s_{t+1})\color{purple}{K_{t+1}}} \right]    \notag\\
    &=&-\rho+\ln\mathbb{E}_t
\left[ \frac{\alpha \color{blue}{N_te^{n}}}{(1-s_{t+1})\color{purple}{s_tY_t}} \right]    \notag\\ 
    &=& -\rho+\ln\alpha+\ln N_t+n-\ln s_t-\ln Y_t+\ln\mathbb{E}\left[ \frac{1}{1+s_{t+1}} \right]    \notag
\end{eqnarray}</script><p>进一步化简得到：</p>
<script type="math/tex; mode=display">
\ln s_t-\ln(1-s_t)=-\rho+n+\ln\alpha+\ln\mathbb{E}\left[ \frac{1}{1+s_{t+1}} \right]</script><p>猜测：存在一个常数的储蓄率$\hat{s}$满足上式。有</p>
<script type="math/tex; mode=display">
\ln\hat{s} = -\rho+n+\ln\alpha    \Rightarrow \color{red}{\hat{s}=\alpha e^{n-\rho}}</script><p>因此储蓄率不变，猜测正确。从而解出了储蓄率。</p>
<h5 id="2-求劳动供给"><a href="#2-求劳动供给" class="headerlink" title="2.求劳动供给"></a>2.求劳动供给</h5><p>将人均消费</p>
<script type="math/tex; mode=display">
c_t=\frac{(1-s_t)Y_t}{N_t}</script><p>代入另一个一阶条件中</p>
<script type="math/tex; mode=display">
\frac{c_t}{1-\mathscr{l}_t} = \frac{w_t}{b}</script><p>两边取对数，得到：</p>
<script type="math/tex; mode=display">
\ln\left[(1-\hat{s})\frac{Y_t}{N_t}\right]-\ln(1-\mathscr{l}_t)=\ln w_t-\ln b</script><p>由于在CD生产函数中，工资满足</p>
<script type="math/tex; mode=display">
w_t=(1-\alpha)\frac{Y_t}{\mathscr{l}_tN_t}</script><p>合并以上两个方程：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    &&\ln(1-\hat{s})+\ln Y_t-\ln N_t-\ln(1-\mathscr{l}_t) 
    =\ln(1-\alpha)+\ln Y_t-\ln N_t-\ln\mathscr{l}_t-\ln b    \notag\\
    && \ln\mathscr{l}_t-\ln(1-\mathscr{l}_t)=\ln(1-\alpha)-\ln(1-\hat{s})-\ln b    \notag
\end{eqnarray}</script><p>求解得到：</p>
<script type="math/tex; mode=display">
\mathscr{l}_t = \color{red}{\frac{1-\alpha}{1-\alpha+b(1-\hat{s})}\equiv \hat{\mathscr{l}}}</script><p>因此劳动供给不随时间而改变。</p>
<p><span style='color:red;font-family:kai'>解释：虽然家庭存在跨期替代，但是在此特殊模型中，工资效应和利率效应相互抵消了。</span></p>
<h5 id="3-求产出：产出（缺口）表示成滞后项和外生变量的函数"><a href="#3-求产出：产出（缺口）表示成滞后项和外生变量的函数" class="headerlink" title="3.求产出：产出（缺口）表示成滞后项和外生变量的函数"></a>3.求产出：产出（缺口）表示成滞后项和外生变量的函数</h5><p>由生产函数</p>
<script type="math/tex; mode=display">
Y_t = K_t^\alpha(A_tL_t)^{1-\alpha}</script><p>取对数：    </p>
<script type="math/tex; mode=display">
\ln Y_t =\alpha\ln K_t+(1-\alpha)(\ln A_t+\ln L_t)</script><p>前面有结果：</p>
<script type="math/tex; mode=display">
K_t=\hat{s}Y_{t-1};\quad L_t=\hat{\mathscr{l}}N_t</script><p>代入上面对数形式的生产函数</p>
<script type="math/tex; mode=display">
\ln Y_t = \alpha\ln\hat{s}+\alpha\ln Y_{t-1}+(1-\alpha)(\ln A_t + \ln\hat{\mathscr{l}}+\ln N_t)</script><p>技术的运动方程$\ln A_t=\bar{A}+gt+\tilde{A}_t$和人口的运动方程$\ln N_t=\bar{N}+nt$代入得到：</p>
<script type="math/tex; mode=display">
\ln Y_t = \alpha\ln\hat{s}+\alpha\ln Y_{t-1}+(1-\alpha)(\bar{A}+gt+\tilde{A}_t + \ln\hat{\mathscr{l}}+\bar{N}+nt)</script><p>为了更加直观展示结果，我们将常数项合并并用一个字母替代，从而对该方程进行改写：</p>
<script type="math/tex; mode=display">
\ln Y_t - (n+g)t = Q+\alpha[\ln Y_{t-1}-(n+g)(t-1)]+(1-\alpha)\tilde{A}_t</script><p>其中：</p>
<script type="math/tex; mode=display">
Q\equiv \alpha\ln\hat{s}+(1-\alpha)\left[\bar{A}+\ln\hat{\mathscr{l}}+\bar{N}\right] -\alpha(n+g)</script><p>注意，这里为了构造递推公式，$Q$中包含了$-\alpha(n+g)$一项。在没有技术冲击的平衡增长路径上，$\tilde{A}_t=0$，且$\ln Y_t-\ln Y_{t-1}=n+g$，求解稳态下的产出水平如下：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \ln Y_t-(n+g)t &=& Q +\alpha[\ln Y_t-(n+g)-(n+g)(t-1)]\notag\\
    &=& Q +\alpha[\ln Y_t-(n+g)t]    \notag
\end{eqnarray}\tag{*}</script><p>解出来</p>
<script type="math/tex; mode=display">
\ln Y_t^\star=\frac{Q}{1-\alpha}+(n+g)t</script><p>定义$\tilde{Y}_t=\ln Y_t-\ln Y_t^\star$，被称为偏离平衡增长路径的百分比。于是有</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \color{purple}{\tilde{Y}_t} &=& \color{purple}{\ln Y_t-\frac{Q}{1-\alpha}-(n+g)t}    \notag\\
    \tilde{Y}_{t-1} &=& \ln Y_{t-1}-\frac{Q}{1-\alpha}-(n+g)(t-1)    \notag
\end{eqnarray}</script><p>可以得到：</p>
<script type="math/tex; mode=display">
\color{blue}{\alpha\ln Y_{t-1}=\alpha\tilde{Y}_{t-1}+\frac{\alpha}{1-\alpha}Q+\alpha(n+g)(t-1)}</script><p><span style='font-family:kai;color:red'>(下面的内容个人暂时有疑问)</span></p>
<p>根据</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \color{purple}{\ln Y_t} &=& \alpha\ln\hat{s}+\color{blue}{\alpha\ln Y_{t-1}}+(1-\alpha)(\bar{A}+gt+\tilde{A}_t + \ln\hat{\mathscr{l}}+\bar{N}+nt)    \notag\\
    \color{purple}{\tilde{Y}_t+\frac{Q}{1-\alpha}+(n+g)t} &=& \alpha\ln\hat{s}+    \color{blue}{\alpha\tilde{Y}_{t-1}+\frac{\alpha}{1-\alpha}Q+\alpha(n+g)(t-1)}\notag\\
    &&+(1-\alpha)(\bar{A}+gt+\tilde{A}_t +\ln\hat{\mathscr{l}}+\bar{N}+nt)    \notag\\
    \tilde{Y}_t &=& \alpha\ln\hat{s}+\alpha\tilde{Y}_{t-1}+\color{green}{\frac{\alpha}{1-\alpha}Q}+\color{pink}{\alpha(n+g)(t-1)}    \notag\\
                            &&+(1-\alpha)\left[ \bar{A}+\tilde{A}_t +\ln\hat{\mathscr{l}}+\bar{N} +\color{pink}{(n+g)t} \right]    \notag\\
                            &&\color{green}{-\frac{Q}{1-\alpha}}\color{pink}{-(n+g)t}    \notag\\
    \tilde{Y}_t&=& \alpha\ln\hat{s}+(1-\alpha)(\bar{A}+\ln\hat{\mathscr{l}}+\bar{N})-Q-\alpha(n+g)    \notag\\
                        &&+\alpha\tilde{Y}_{t-1}+(1-\alpha)\tilde{A}_t    \notag
\end{eqnarray}</script><p>由于</p>
<script type="math/tex; mode=display">
Q\equiv \alpha\ln\hat{s}+(1-\alpha)\left[\bar{A}+\ln\hat{\mathscr{l}}+\bar{N}\right] -\alpha(n+g)</script><p>因此有</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    &&\tilde{Y}_t=\alpha \tilde{Y}_{t-1}+(1-\alpha)\tilde{A}_t    \notag
\end{eqnarray}</script><p>于是有</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
        &&\tilde{Y}_{t-1}=\alpha \tilde{Y}_{t-2}+(1-\alpha)\tilde{A}_{t-1}    \notag\\
    \Rightarrow &&\color{purple}{\tilde{A}_{t-1} = \frac{1}{1-\alpha}\left(\tilde{Y}_{t-1}-\alpha\tilde{Y}_{t-2}\right)}    \notag
\end{eqnarray}</script><p>按照定义，技术冲击为：</p>
<script type="math/tex; mode=display">
\color{blue}{\tilde{A}_{t}=\rho_A\tilde{A}_{t-1}+\varepsilon_{A,t}}</script><p>结合可得：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \tilde{Y}_t    &=&    \alpha \tilde{Y}_{t-1}+(1-\alpha)\tilde{A}_t    \notag\\
    &=& \alpha \tilde{Y}_{t-1}+(1-\alpha)\color{blue}{(\rho_A\tilde{A}_{t-1}+\varepsilon_{A,t})}    \notag\\
    &=& \alpha \tilde{Y}_{t-1}+(1-\alpha)\left[\rho_A\color{purple}{\frac{1}{1-\alpha}\left(\tilde{Y}_{t-1}-\alpha\tilde{Y}_{t-2}\right)}+\varepsilon_{A,t}\right]    \notag\\
    &=& \alpha \tilde{Y}_{t-1}+\rho_A\left(\tilde{Y}_{t-1}-\alpha\tilde{Y}_{t-2}\right)+(1-\alpha)\varepsilon_{A,t}    \notag\\
    &=& (\alpha+\rho_A)\tilde{Y}_{t-1}-\rho_A\alpha\tilde{Y}_{t-2}+(1-\alpha)\varepsilon_{A,t}    \notag
\end{eqnarray}</script><p>因此$\tilde{Y}_t\sim AR(2)$。</p>
