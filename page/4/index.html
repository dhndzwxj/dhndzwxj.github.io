        <p><span style='font-family:kai'>知识点：线性回归中的估计，只要残差是外生的，参数估计结果就是无偏的；如果残差是内生的，参数估计结果一定是有偏的，这种情况下我们追求的是得到一致的估计结果。本页的内容解决的均为残差内生的情况。</span></p>
<h2 id="分块回归"><a href="#分块回归" class="headerlink" title="分块回归"></a>分块回归</h2><p>参考章永辉课件第179页。</p>
<h2 id="时间序列"><a href="#时间序列" class="headerlink" title="时间序列"></a>时间序列</h2><h3 id="概念合集"><a href="#概念合集" class="headerlink" title="概念合集"></a>概念合集</h3><h4 id="自相关系数"><a href="#自相关系数" class="headerlink" title="自相关系数"></a>自相关系数</h4><p>章永辉课件第292页。</p>
<h4 id="鞅（Martingales）"><a href="#鞅（Martingales）" class="headerlink" title="鞅（Martingales）"></a>鞅（Martingales）</h4><p>一个<span style='color:red'>向量</span>值时间序列过程如果满足：</p>
<script type="math/tex; mode=display">
\mathbb{E}(Y_t\lvert Y_{t-1},Y_{t-2},\cdots)
=\mathbb{E}(Y_t\lvert I_{t-1})=Y_{t-1}\quad\text{a.s.}</script><p>它被称为鞅。</p>
<p>对于标量时间序列$\{Y_{tj}\}$，它是向量值时间序列$\{Y_t\}$的一个元素。当它满足条件：</p>
<script type="math/tex; mode=display">
\mathbb{E}(Y_{tj}\lvert Y_{t-1},Y_{t-2},\cdots)=Y_{t-1,j},\quad\text{a.s.}</script><p>被称为<span style='color:red'>关于$\{Y_t\}$的</span>鞅。如果条件是基于其过去值$(Y_{t-1,j},Y_{t-2,j},\cdots)$，那么被称为鞅。</p>
<h4 id="鞅差序列"><a href="#鞅差序列" class="headerlink" title="鞅差序列"></a>鞅差序列</h4><p>如果$\{Y_t\}$是一个鞅，且有</p>
<script type="math/tex; mode=display">
Y_t=Y_{t-1}+\varepsilon_t</script><p>其中$\mathbb{E}(\varepsilon_t\lvert I_{t-1})=0\text{ a.s.}$。那么$\{\varepsilon_t\}$被称为一个相对于$I_t$的鞅差序列(martingale di§erence sequence ,m.d.s.)。根据鞅的定义，上式还可以转化为：</p>
<script type="math/tex; mode=display">
Y_t-Y_{t-1}=\varepsilon_t\Rightarrow Y_t-\mathbb{E}(Y_t\lvert I_{t-1})=\varepsilon_t</script><p>这说明鞅差序列是$t$期$Y$的值减去$t-1$时期对$t$期$Y$取值的预测值，显然其条件期望等于0.信息集：</p>
<script type="math/tex; mode=display">
I_{t-1}=(Y_{t-1},Y_{t-2},\cdots)=(\varepsilon_{t-1},\varepsilon_{t-2},\cdots)</script><p>对于有限期的信息集：</p>
<script type="math/tex; mode=display">
I_{t-1}=(Y_{t-1},Y_{t-2},\cdots,Y_1)=(\varepsilon_{t-1},\varepsilon_{t-2},\cdots,\varepsilon_1)    \quad Y_0\text{已知}</script><h4 id="随机游走"><a href="#随机游走" class="headerlink" title="随机游走"></a>随机游走</h4><script type="math/tex; mode=display">
Y_t=Y_{t-1}+\varepsilon_t</script><p>它也是一个鞅，这是因为：</p>
<script type="math/tex; mode=display">
\mathbb{E}(\varepsilon_t\lvert Y_{t-1},\cdots,Y_1) = \mathbb{E}(\varepsilon_t\lvert \varepsilon_{t-1},\cdots,\varepsilon_1)= \mathbb{E}(\varepsilon_t)=0</script><h4 id="遍历平稳鞅差序列的中心极限定理"><a href="#遍历平稳鞅差序列的中心极限定理" class="headerlink" title="遍历平稳鞅差序列的中心极限定理"></a>遍历平稳鞅差序列的中心极限定理</h4><p>假设$\{\varepsilon_t\}$是一个平稳遍历的鞅差序列（m.d.s），有$\mathbb{E}(\varepsilon_t\varepsilon_t’)=V$，是一个有限的正定矩阵。那么有：</p>
<script type="math/tex; mode=display">
\frac{1}{\sqrt{n}}\sum_{t=1}^n \varepsilon_t\xrightarrow[]{d} N(0,V)</script><p>很容易证明：</p>
<script type="math/tex; mode=display">
\text{var}\left( \frac{1}{\sqrt{n}}\sum_{t=1}^n\varepsilon_t \right) 
=\frac1n \sum_{t=1}^n\sum_{s=1}^n\mathbb{E}\left(\varepsilon_t\varepsilon_s'\right)
\xlongequal{IID}\frac1n \sum_{t=1}^n \mathbb{E}(\varepsilon_t\varepsilon_t')=V</script><h3 id="基本假定"><a href="#基本假定" class="headerlink" title="基本假定"></a>基本假定</h3><ul>
<li>线性的遍历平稳序列：$Y_t=X_t\beta+\varepsilon_t$</li>
<li>残差条件期望正确:$\mathbb{E}(\varepsilon_t\lvert X_t)=0\text{ a.s.},\mathbb{E}\varepsilon_t^2=\sigma^2$</li>
<li>非奇异：$Q\equiv\mathbb{E}(XX’)$是有限的，并且是正定的</li>
<li>$\{X_t\varepsilon_t\}$是鞅差序列，其方差$V=\mathbb{E}(X_tX’_t\varepsilon_t^2)$有限正定（finite p.d.）。</li>
<li>条件同方差：$\mathbb{E}(\varepsilon_t^2\lvert X_t)=\sigma^2\text{ a.s.}$。基本假定中，并没有假设$\{\varepsilon_t\}$服从正态分布。</li>
<li>$\{\varepsilon_t\}$是鞅差序列，即序列不相关的。</li>
</ul>
<h3 id="定理"><a href="#定理" class="headerlink" title="定理"></a>定理</h3><p>在以上假定下，$\hat{\beta}\xrightarrow{p}\beta;s^2\xrightarrow{p}\sigma^2$</p>
<blockquote>
<p>前面得到：</p>
<script type="math/tex; mode=display">
\hat{\beta}=\beta+(X'X)^{-1}X'\varepsilon;\quad s^2=\frac{\hat{\varepsilon}'\hat{\varepsilon}}{n-k}</script></blockquote>
<p>还有：</p>
<script type="math/tex; mode=display">
\sqrt{n}(\hat{\beta}-\beta)\rightarrow_d N(0,Q^{-1}VQ^{-1})</script><h3 id="假设检验"><a href="#假设检验" class="headerlink" title="假设检验"></a>假设检验</h3><p>原假设$H_0:R\beta=r$，在这个假定下有</p>
<script type="math/tex; mode=display">
\sqrt{n}(R\hat\beta-r)\rightarrow_d N(0,RQ^{-1}VQ^{-1}R')</script><p>Wald检验统计量</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    W_n &=& n(R\hat\beta-r)'\left[R\hat Q^{-1}\hat V\hat Q^{-1}R'\right]^{-1}(R\hat\beta-r)    \notag\\
    &=& n^{-1}(R\hat\beta-r)'\left[R(X'X)^{-1}\hat V(X'X)^{-1}R'\right]^{-1}(R\hat\beta-r)    \notag
\end{eqnarray}</script><p>如果$\hat V\rightarrow_p V$，那么：</p>
<script type="math/tex; mode=display">
W_n\rightarrow_d \chi^2(q)</script><h2 id="7-内生性问题"><a href="#7-内生性问题" class="headerlink" title="7 内生性问题"></a>7 内生性问题</h2><h3 id="7-1-内生性"><a href="#7-1-内生性" class="headerlink" title="7.1 内生性"></a>7.1 内生性</h3><p>若OLS一个关键的假定不再成立，有$\mathbb{E}(x_i\varepsilon_i)\neq 0$，那么不再有一致的估计。</p>
<p>内生性类型：</p>
<ul>
<li>遗漏变量</li>
<li>测量误差</li>
</ul>
<h3 id="7-2-工具变量回归"><a href="#7-2-工具变量回归" class="headerlink" title="7.2 工具变量回归"></a>7.2 工具变量回归</h3><h4 id="7-2-1-结构方程"><a href="#7-2-1-结构方程" class="headerlink" title="7.2.1 结构方程"></a>7.2.1 结构方程</h4><p>我们感兴趣的方程是：</p>
<script type="math/tex; mode=display">
Y_i=\textbf{x}_i'\beta+\varepsilon_i</script><p>假定$\mathbb{E}(\textbf{x}_i\varepsilon_i)\neq0$，这被称为结构方程。矩阵记法为：</p>
<script type="math/tex; mode=display">
\textbf{Y}=\textbf{X}\beta+\varepsilon</script><p>工具变量的定义：</p>
<ul>
<li>$\mathbb{E}(\textbf{z}_i\varepsilon_i)=0$：外生性</li>
<li>$\mathbb{E}(\textbf{z}_i\textbf{x}_i’)\neq0$：相关性</li>
</ul>
<p>在回归中，有些自变量可能与残差无关，即对于：</p>
<script type="math/tex; mode=display">
\textbf{x}_i=
\left(\begin{matrix}
    \textbf{x}_{1i}\\\textbf{x}_{2i}
\end{matrix}\right)
\begin{matrix}
    k_1\times1\\k_2\times1
\end{matrix}</script><p>其中$\mathbb{E}(\textbf{x}_{1i}\varepsilon_i)=0;\mathbb{E}(\textbf{x}_{2i}\varepsilon_i)\neq0$，我们称$\textbf{x}_{1i}$为<strong>外生变量</strong>，$\textbf{x}_{2i}$为<strong>内生变量</strong>。因此$\textbf{x}_{1i}$是一个IV，应该包含在$\textbf{z}_i$中。</p>
<script type="math/tex; mode=display">
\textbf{z}_i=
\left(\begin{matrix}
    \textbf{x}_{1i}\\\textbf{z}_{2i}
\end{matrix}\right)
\begin{matrix}
    k_1\times1\\l_2\times1
\end{matrix}</script><p>因此<span style='color:red'>工具变量中包括内部的外生变量</span>。上面的工具变量识别问题存在以下三种情形：</p>
<ul>
<li>恰好识别：$l_2=k_2$</li>
<li>过度识别：$l_2&gt;k_2$</li>
<li>识别不足：$l_2&lt;k_2$</li>
</ul>
<h4 id="7-2-2-简约形式"><a href="#7-2-2-简约形式" class="headerlink" title="7.2.2 简约形式"></a>7.2.2 简约形式</h4><p>将工具变量回归到内生变量上，可以得到</p>
<script type="math/tex; mode=display">
\Gamma=[\mathbb{E}(\textbf{z}_i\textbf{z}_i')]^{-1}\mathbb{E}(\textbf{z}_i\textbf{x}_i')</script><blockquote>
<p>注意是$[\mathbb{E}(\textbf{z}_i\textbf{z}_i’)]^{-1}$而非$[\mathbb{E}(\textbf{z}_i’\textbf{z}_i)]^{-1}$，和前面的$(X’X)^{-1}$。原因是前面的构造中$\textbf{z}_i$的行数$k$对应于解释变量的个数$k$，而前面OLS部分$X$的列数正好等于解释变量的个数$k$。一句话，$(X’X)$非奇异的前提是，它是$k$阶方阵。</p>
</blockquote>
<p>这个式子相当于将$\textbf{x}$投影到由$\textbf{z}$张成的空间上。约简形式的线性回归可以写成：</p>
<script type="math/tex; mode=display">
\textbf{x}_i'=\textbf{z}_i'\Gamma+\textbf{e}_i';\quad \textbf{X}=\textbf{Z}\Gamma+\textbf{E}</script><p>$\mathbb{E}(\textbf{z}_i\textbf{e}_i’)=0$。于是得到：</p>
<script type="math/tex; mode=display">
\hat\Gamma = (\textbf{Z}'\textbf{Z})^{-1}\textbf{Z}\textbf{X};
\quad \hat{\textbf{E}}=\textbf{X}-\textbf{Z}\hat\Gamma</script><p>接下来：</p>
<script type="math/tex; mode=display">
\textbf{Y}=\textbf{X}\beta+\varepsilon
=(\textbf{Z}\Gamma+\textbf{E})\beta+\varepsilon=\textbf{Z}\lambda+\textbf{V}</script><p>其中$\lambda=\Gamma\beta,\textbf{V}=\textbf{E}\beta+\varepsilon$。这里</p>
<script type="math/tex; mode=display">
\mathbb{E}(\textbf{z}_i\textbf{v}_i') 
= \mathbb{E}\left[\textbf{z}_i(\textbf{e}_i'\beta+\varepsilon_i)\right]=0</script><p>得到：</p>
<script type="math/tex; mode=display">
\hat\lambda=(\textbf{Z}'\textbf{Z})^{-1}\textbf{Z}'\textbf{Y};\quad
\hat{\textbf{V}}= \textbf{Y}-\textbf{Z}\hat\lambda</script><h4 id="7-2-3-识别"><a href="#7-2-3-识别" class="headerlink" title="7.2.3 识别"></a>7.2.3 识别</h4><p>参数$\beta$被识别，意味着它可以从约简形式中恢复，需要满足：</p>
<script type="math/tex; mode=display">
\text{rank}(\Gamma)=k</script><p>有以下几种情况：</p>
<ul>
<li>若$l=k$，那么$\beta=\Gamma^{-1}\lambda$</li>
<li>若$l&gt;k$，对于$l\times l$正定矩阵$W$，$\beta=(\Gamma’W\Gamma)^{-1}\Gamma’W\lambda$</li>
</ul>
<p>一个重要的前提条件是$l\ge k$（不存在识别不足的情况）。</p>
<p>接前面的例子，$\textbf{x}_{1i}$为<strong>外生变量</strong>，$\textbf{x}_{2i}$为<strong>内生变量</strong>，令$\textbf{Z}=[\textbf{Z}_1,\textbf{Z}_2],\textbf{X}=[\textbf{Z}_1,\textbf{X}_2]$,此时有：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \Gamma &=&
\left(\begin{matrix}
    \Gamma_{11}    &    \Gamma_{12}\\
    \Gamma_{21}    &    \Gamma_{22}
\end{matrix}\right)
=
\left(\begin{matrix}
    I_{k_1}    &    \Gamma_{12}\\
    0_{l_2\times k_1}    &    \Gamma_{22}
\end{matrix}\right)    \notag\\
    \textbf{E}&=&(0_{n\times k_1},\textbf{E}_2)    \notag
\end{eqnarray}</script><p>于是有：</p>
<script type="math/tex; mode=display">
\left\{\begin{aligned}
    \textbf{X}_1 &= \textbf{Z}_1    \\
    \textbf{X}_2 &= \textbf{Z}_1\Gamma_{12} + \textbf{Z}_2\Gamma_{22}+\textbf{E}_2
\end{aligned}\right.</script><p>当$\text{rank}(\Gamma)=k$时，$\beta$可被识别。这个条件也等价于$\text{rank}(\Gamma_{22}=k_2)$，因此关键在于$\Gamma_{22}$。</p>
<h4 id="7-2-4-假定"><a href="#7-2-4-假定" class="headerlink" title="7.2.4 假定"></a>7.2.4 假定</h4><p>$\{Y_i,\textbf{x}_i,\textbf{z}_i\}$是一个独立同分布的随机过程</p>
<ul>
<li>线性：$Y_i=\textbf{x}_i’\beta+\varepsilon_i,i=1,\cdots,n$</li>
<li>非奇异：$Q_{xx}=\mathbb{E}(\textbf{x}_i\textbf{x}_i’),Q_{zz}=\mathbb{E}(\textbf{z}_i\textbf{z}_i’)$都是有限并且非奇异的</li>
<li>IV条件：$\mathbb{E}(\textbf{x}_i\varepsilon_i)\neq0;\mathbb{E}(\textbf{z}_i\varepsilon_i)=0；Q_{zx}=\mathbb{E}(\textbf{z}_i\textbf{x}_i’)$是有限且满秩</li>
<li>非奇异：$V=\mathbb{E}(\textbf{z}_i\textbf{z}_i’\varepsilon_i^2)$是有限并且非奇异的</li>
<li>条件同方差：$\mathbb{E}(\varepsilon_i^2\lvert \textbf{z}_i)=\sigma^2\text{ a.s.}$</li>
</ul>
<h4 id="7-2-5-两阶段最小二乘估计（2SLS）"><a href="#7-2-5-两阶段最小二乘估计（2SLS）" class="headerlink" title="7.2.5 两阶段最小二乘估计（2SLS）"></a>7.2.5 两阶段最小二乘估计（2SLS）</h4><p>第一阶段：</p>
<p>将自变量回归到工具变量上，$\hat\Gamma=(\textbf{Z}’\textbf{Z}’)^{-1}\textbf{Z}’\textbf{X}$，得到内生变量的估计值：</p>
<script type="math/tex; mode=display">
\hat{\textbf{X}}=\textbf{Z}\hat\Gamma=\textbf{Z}(\textbf{Z}'\textbf{Z}')^{-1}\textbf{Z}'\textbf{X} =P_\textbf{Z}\textbf{X}</script><p>注意到，$P_{\textbf{Z}}$是对称且幂等的。然后再将$\textbf{Y}$回归到$\hat{\textbf{X}}$上：</p>
<script type="math/tex; mode=display">
\hat\beta_{2SLS}
=(\hat{\textbf{X}}'\hat{\textbf{X}})^{-1}\hat{\textbf{X}}'\textbf{Y}</script><p>如果仔细考察投影：$\hat{\textbf{X}}$：</p>
<script type="math/tex; mode=display">
\hat{\textbf{X}}=[\hat{\textbf{X}}_1,\hat{\textbf{X}}_2]
=[P_{\textbf{Z}}\textbf{X}_1,P_{\textbf{Z}}\textbf{X}_2]
=[\textbf{X}_1,P_{\textbf{Z}}\textbf{X}_2]
=[\textbf{X}_1,\hat{\textbf{X}}_2]</script><p>在第二步回归中，只有内生变量被其拟合值替代：</p>
<script type="math/tex; mode=display">
\hat{\textbf{X}}_2 = \textbf{X}_1\hat\Gamma_{12}+\textbf{Z}_2\hat\Gamma_{22}</script><p>进一步改写两阶段的回归结果：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \hat\beta_{2SLS}
&=&(\hat{\textbf{X}}'\hat{\textbf{X}})^{-1}\hat{\textbf{X}}'\textbf{Y}    \notag\\
    &=&(\textbf{X}'P_{\textbf{Z}}\textbf{X})^{-1}\textbf{X}'P_{\textbf{Z}}\textbf{Y}    \notag\\
    &=& \left[ \frac{\textbf{X}'\textbf{Z}}{n}\left(\frac{\textbf{Z}'\textbf{Z}}{n}\right)^{-1} \frac{\textbf{Z}'\textbf{X}}{n} \right]^{-1} 
    \frac{\textbf{X}'\textbf{Z}}{n}\left(\frac{\textbf{Z}'\textbf{Z}}{n}\right)^{-1} \frac{\textbf{Z}'\textbf{Y}}{n}    \notag\\
    &=& \beta+\left[ \hat Q_{xz}\hat Q_{zz}^{-1}\hat Q_{zx} \right]^{-1}\hat Q_{xz}\hat Q_{zz}^{-1}\frac{\textbf{Z}'\varepsilon}{n}    \notag
\end{eqnarray}</script><p>根据以上假定：$\hat\beta_{2SLS}\rightarrow_p\beta$。</p>
<p>需要注意的是：</p>
<ul>
<li><p><span style='color:red'>如果模型是恰好识别的，即$l=k$，$\textbf{Z}$为非奇异方阵，</span>那么有</p>
</li>
<li><script type="math/tex; mode=display">
\begin{eqnarray}
    \hat\beta_{2SLS}&=&\left[ \frac{\textbf{X}'\textbf{Z}}{n}\left(\frac{\textbf{Z}'\textbf{Z}}{n}\right)^{-1} \frac{\textbf{Z}'\textbf{X}}{n} \right]^{-1} 
    \frac{\textbf{X}'\textbf{Z}}{n}\left(\frac{\textbf{Z}'\textbf{Z}}{n}\right)^{-1} \frac{\textbf{Z}'\textbf{Y}}{n}    \notag\\
    &=& (\textbf{Z}'\textbf{X})^{-1}
    \color{green}{(\textbf{Z}'\textbf{Z})}\color{purple}{(\textbf{X}'\textbf{Z})^{-1}(\textbf{X}'\textbf{Z})}
    \color{green}{(\textbf{Z}'\textbf{Z})^{-1}} \color{black}{\textbf{Z}'\textbf{Y}}    \notag\\
    &=&(\textbf{Z}'\textbf{X})^{-1}\textbf{Z}'\textbf{Y}\equiv\hat\beta_{IV}    \notag\\
\end{eqnarray}</script></li>
</ul>
<h4 id="7-2-6-协方差矩阵估计"><a href="#7-2-6-协方差矩阵估计" class="headerlink" title="7.2.6 协方差矩阵估计"></a>7.2.6 协方差矩阵估计</h4><p>2SLS估计量的渐进正态分布：</p>
<script type="math/tex; mode=display">
\sqrt{n}\left( \hat\beta_{2SLS}-\beta \right)\rightarrow_d N(0,\Omega)</script><p>其中</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \Omega&=& \text{Var}(\hat\beta_{2SLS})
    =\text{Var}\left\{ \left[ \textbf{X}'\textbf{Z}(\textbf{Z}'\textbf{Z})^{-1}\textbf{Z}'\textbf{X} \right]^{-1} \textbf{X}'\textbf{Z}(\textbf{Z}'\textbf{Z})^{-1}\textbf{Z}'\varepsilon\right\}    \notag\\
    &=&    \left[ \textbf{X}'\textbf{Z}(\textbf{Z}'\textbf{Z})^{-1}\textbf{Z}'\textbf{X} \right]^{-1} \textbf{X}'\textbf{Z}(\textbf{Z}'\textbf{Z})^{-1}\textbf{Z}'\text{Var}(\textbf{Z}'\varepsilon)\textbf{Z}(\textbf{Z}'\textbf{Z})^{-1}\textbf{Z}'\textbf{X}\left[ \textbf{X}'\textbf{Z}(\textbf{Z}'\textbf{Z})^{-1}\textbf{Z}'\textbf{X} \right]^{-1}    \notag\\
    &=&\left[ \frac{\textbf{X}'\textbf{Z}}n\frac{(\textbf{Z}'\textbf{Z})^{-1}}n\frac{\textbf{Z}'\textbf{X}}n \right]^{-1} \frac{\textbf{X}'\textbf{Z}}n\frac{(\textbf{Z}'\textbf{Z})^{-1}}nV
    \frac{(\textbf{Z}'\textbf{Z})^{-1}}n\frac{\textbf{Z}'\textbf{X}}n
    \left[ \frac{\textbf{X}'\textbf{Z}}n\frac{(\textbf{Z}'\textbf{Z})^{-1}}n\frac{\textbf{Z}'\textbf{X}}n \right]^{-1}    \notag\\
    &=&\left(Q_{xz}Q_{zz}^{-1}Q_{zx}\right)^{-1}Q_{xz}Q_{zz}^{-1}VQ_{zz}^{-1}Q_{zx}\left(Q_{xz}Q_{zz}^{-1}Q_{zx}\right)^{-1}    \notag\\
\end{eqnarray}</script><p>其中</p>
<script type="math/tex; mode=display">
V=\text{Var}(\textbf{Z}'\varepsilon)=\textbf{Z}'\text{Var}(\varepsilon)\textbf{Z}</script><p>情形1:条件同方差情形：$\text{Var}(\varepsilon)=\sigma^2I\Rightarrow V=\sigma^2\textbf{Z}’\textbf{Z}\Rightarrow \Omega=\left[Q_{xz}Q_{zz}^{-1}Q_{zx}\right]^{-1}\sigma^2$，于是统计量的估计值为：</p>
<script type="math/tex; mode=display">
\hat\Omega=\left[\hat Q_{xz}\hat Q_{zz}^{-1}\hat Q_{zx}\right]^{-1}s^2</script><p>情形2:条件异方差：我们这样估计$V$:</p>
<script type="math/tex; mode=display">
\hat V=n^{-1}\sum_{i=1}^n \textbf{z}_i\textbf{z}_i'\hat\varepsilon_i^2</script><p>其中$\hat\varepsilon_i=Y_i-\textbf{x}_i’\hat\beta_{2SLS}$，于是可以证明：</p>
<script type="math/tex; mode=display">
\hat\Omega=\left(\hat Q_{xz}\hat Q_{zz}^{-1}\hat Q_{zx}\right)^{-1}\hat Q_{xz}\hat Q_{zz}^{-1}V
\hat Q_{zz}^{-1}\hat Q_{xz}'\left(\hat Q_{xz}\hat Q_{zz}^{-1}\hat Q_{zx}\right)^{-1}
\rightarrow_p \Omega</script><h4 id="7-2-7-假设检验"><a href="#7-2-7-假设检验" class="headerlink" title="7.2.7 假设检验"></a>7.2.7 假设检验</h4><script type="math/tex; mode=display">
H_0:R\beta=r\leftrightarrow H_1:R\beta\neq r</script><p>在原假设成立的前提下，理论上有：</p>
<script type="math/tex; mode=display">
W_n=n\left(R\hat\beta_{2SLS}-r\right)'
\left[R' \left(\hat Q_{xz}\hat Q_{zz}^{-1}\hat Q_{zx}\right)^{-1}\hat Q_{xz}\hat Q_{zz}^{-1}V
\hat Q_{zz}^{-1}\hat Q_{xz}'\left(\hat Q_{xz}\hat Q_{zz}^{-1}\hat Q_{zx}\right)^{-1} R\right]^{-1}
\left(R\hat\beta_{2SLS}-r\right)
\rightarrow_d\chi^2(q)</script><p>如果满足条件同方差假定，$V=\sigma^2I$，上式可以写为：</p>
<script type="math/tex; mode=display">
W_n = n\left(R\hat\beta_{2SLS}-r\right)'
\left[ s^2R'\left(\hat Q_{xz}\hat Q_{zz}^{-1}\hat Q_{zx}\right)^{-1}  R \right]^{-1}
\left(R\hat\beta_{2SLS}-r\right)</script><hr>
<p>此外，两阶段最小二乘回归估计量$\hat\beta_{2SLS}$的渐进性质，与手动回归的OLS估计量的渐进性质是等价的：</p>
<script type="math/tex; mode=display">
Y_i=\bar{\textbf{x}}_i'\beta+v_i</script><p>其中$\bar{\textbf{x}}_i=\Gamma’\textbf{z}_i$，以及$\Gamma=\left[\mathbb{E}(\textbf{z}_i\textbf{z}_i’)\right]^{-1}\mathbb{E}(\textbf{z}_i\textbf{x}_i’)$，现在：</p>
<script type="math/tex; mode=display">
\tilde\beta=\left( \bar{\textbf{X}}'\bar{\textbf{X}} \right)^{-1}\bar{\textbf{X}}'\textbf{Y}</script><p>理论推导可以得到：</p>
<script type="math/tex; mode=display">
\sqrt{n}\left(\tilde\beta-\beta\right)\rightarrow_d N(0,Q_{\tilde x\tilde x}^{-1}\tilde V Q_{\tilde x\tilde x}^{-1})</script><p>其中$Q_{\tilde x\tilde x}=\mathbb{E}(\bar{\textbf{x}}_i\bar{\textbf{x}}_i’)$以及$\tilde V=\mathbb{E}\left(\bar{\textbf{x}}_i\bar{\textbf{x}}_i’v_i^2\right)$。</p>
<h4 id="7-2-8-Hausman（豪斯曼）检验：检验自变量的内生性"><a href="#7-2-8-Hausman（豪斯曼）检验：检验自变量的内生性" class="headerlink" title="7.2.8 Hausman（豪斯曼）检验：检验自变量的内生性"></a>7.2.8 Hausman（豪斯曼）检验：检验自变量的内生性</h4><p>令回归模型为：</p>
<script type="math/tex; mode=display">
Y_i=\textbf{x}_i'\beta+\varepsilon_i,\quad \mathbb{E}(\varepsilon_i^2\lvert \textbf{z}_i)=\sigma^2</script><p>原假设和备择假设分别为：</p>
<script type="math/tex; mode=display">
H_0:\mathbb{E}(\textbf{x}_i\varepsilon_i)=0\leftrightarrow H_1:\mathbb{E}(\textbf{x}_i\varepsilon_i)\neq 0</script><p>其中$\mathbb{E}(\textbf{z}_i\varepsilon_i)=0$，以及$\mathbb{E}(\textbf{x}_i\textbf{z}_i’)$满秩。</p>
<blockquote>
<p>思路：</p>
<ol>
<li>在原假设下，OLS估计量$\hat\beta_{OLS}$是有效率的</li>
<li>在备择假设下，OLS估计量$\hat\beta_{OLS}$是不一致的，但2SLS估计量$\hat\beta_{2SLS}$依然是一致估计量。</li>
<li>因此如果原假设成立，那么$\hat\beta_{2SLS}-\hat\beta_{OLS}$依概率收敛于0；如果备择假设成立，那么便不会依概率收敛到0.</li>
</ol>
</blockquote>
<p>基于以上思路，Hausman认为我们能构造如下统计量：</p>
<script type="math/tex; mode=display">
T_n=\left( \hat\beta_{2SLS}-\hat\beta_{OLS} \right)'\hat V^{-1}\left( \hat\beta_{2SLS}-\hat\beta_{OLS} \right)</script><p>其中$\hat V=\hat{\text{Var}}\left( \hat\beta_{2SLS}-\hat\beta_{OLS} \right)$，它是下面的一致估计量：</p>
<script type="math/tex; mode=display">
V=\text{Var}\left( \hat\beta_{2SLS}-\hat\beta_{OLS} \right)
=\text{Var}\left( \hat\beta_{2SLS}\right)-\text{Var}\left( \hat\beta_{OLS} \right)</script><p>Hausman已经证明，在原假设下：</p>
<script type="math/tex; mode=display">
T_n\rightarrow_d \chi^2(k)</script><p>我们计算一下这两个统计量之差：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \hat\beta_{2SLS}-\hat\beta_{OLS} &=& \left( \textbf{X}'P_{\textbf{Z}} \textbf{X} \right)^{-1}    
    \left[ \textbf{X}'P_{\textbf{Z}}\textbf{Y}-  ( \textbf{X}'P_{\textbf{Z}} \textbf{X})(\textbf{X}'\textbf{X})^{-1}\textbf{X}'\textbf{Y}\right]    \notag\\ 
    &=& \left( \textbf{X}'P_{\textbf{Z}} \textbf{X} \right)^{-1}    \textbf{X}'P_{\textbf{Z}}
    \left[ I-   \textbf{X}(\textbf{X}'\textbf{X})^{-1}\textbf{X}'\right]\textbf{Y}    \notag\\ 
    &=& \left( n^{-1}\textbf{X}'P_{\textbf{Z}} \textbf{X} \right)^{-1}
    n^{-1}\textbf{X}'P_{\textbf{Z}}M_{\textbf{X}}\textbf{Y}    \notag
\end{eqnarray}</script><p>前面有$P_{\textbf{z}}=\textbf{Z}(\textbf{Z}’\textbf{Z})^{-1}\textbf{Z}’$，此处有$M_{\textbf{X}}=I-   \textbf{X}(\textbf{X}’\textbf{X})^{-1}\textbf{X}’$。由于$\left( n^{-1}\textbf{X}’P_{\textbf{Z}} \textbf{X} \right)^{-1}$正定，因此检验原假设等价于检验：</p>
<script type="math/tex; mode=display">
n^{-1}\textbf{X}'P_{\textbf{Z}}M_{\textbf{X}}\textbf{Y}=0
\Rightarrow (P_{\textbf{Z}}\textbf{X})'M_{\textbf{X}}\textbf{Y}=0</script><p>前面我们将自变量$\textbf{X}$分块，其中是$\textbf{x}_1$外生变量，$\textbf{x}_2$是内生变量。$\textbf{z}_{1i}=\textbf{x}_{1i}$，很明显下面的式子是恒成立的：</p>
<script type="math/tex; mode=display">
(P_{\textbf{Z}}\textbf{X}_1)'M_{\textbf{X}}\textbf{Y}=0</script><p>因此我们需要检验的是：</p>
<script type="math/tex; mode=display">
n^{-1}(P_{\textbf{Z}}\textbf{X}_2)'M_{\textbf{X}}\textbf{Y}=0</script><p>我们将使用F检验，在增广的OLS回归中施加$k_2$个约束条件：</p>
<script type="math/tex; mode=display">
\textbf{Y}=\textbf{X}\beta+P_{\textbf{Z}}\textbf{X}_2\delta+\varepsilon</script><p>根据FWL定理，OLS回归结果可以通过将$M_{\textbf{X}}\textbf{Y}$回归到$M_\textbf{X}P_{\textbf{Z}}\textbf{X}_2$上得到：</p>
<script type="math/tex; mode=display">
\hat\delta=(n^{-1}\textbf{X}_2'P_{\textbf{Z}}M_{\textbf{X}}\textbf{X}_2)^{-1}
n^{-1}\textbf{X}_2'P_{\textbf{Z}}M_{\textbf{X}}\textbf{Y}</script><p>此时检验$\delta=0$等价于检验$n^{-1}\textbf{X}_2’P_{\textbf{Z}}M_{\textbf{X}}\textbf{Y}=0$。</p>
<h2 id="8-广义矩估计（GMM）"><a href="#8-广义矩估计（GMM）" class="headerlink" title="8 广义矩估计（GMM）"></a>8 广义矩估计（GMM）</h2><h3 id="8-1-矩估计（MM）的例子"><a href="#8-1-矩估计（MM）的例子" class="headerlink" title="8.1 矩估计（MM）的例子"></a>8.1 矩估计（MM）的例子</h3><h4 id="泊松分布"><a href="#泊松分布" class="headerlink" title="泊松分布"></a>泊松分布</h4><p>令$X_1,X_2,\cdots,X_n$独立同分布，服从参数为$\lambda$的泊松分布，已知$\mathbb{E}_\lambda{X_1}=\lambda$，于是可以这么估计参数$\lambda$：</p>
<script type="math/tex; mode=display">
\hat \lambda=\frac1n \sum_{i=1}^n X_i</script><h4 id="正态分布"><a href="#正态分布" class="headerlink" title="正态分布"></a>正态分布</h4><p>令$X_1,X_2,\cdots,X_n$独立同分布，服从$N(\mu,\sigma^2)$。有：</p>
<script type="math/tex; mode=display">
\hat\mu = m_1 =\frac1n\sum_{i=1}^n X_i;
\quad \hat\sigma^2=m_2-m_1^2=\frac1n \sum_{i=1}^n (X_i-\bar X)^2</script><p>注意：$m_1$代表一阶矩，$m_2$代表二阶矩。</p>
<h4 id="极大似然估计（MLE，maximize-likelihood-estimate）"><a href="#极大似然估计（MLE，maximize-likelihood-estimate）" class="headerlink" title="极大似然估计（MLE，maximize likelihood estimate）"></a>极大似然估计（MLE，maximize likelihood estimate）</h4><p>令$I(\theta;X_i)=\ln f(X_i,\theta)$，以及一阶条件$s(\theta,X_i)=\frac{\partial I(\theta,X_i)}{\partial\theta}$，那么</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \mathbb{E}[s(\theta,X_i)] &=&    \int\frac{\partial I(\theta,X_i)}{\partial\theta} f(\theta,X_i)\text{d}X_i    \notag\\
    &=& \int\frac{\partial \ln f(X_i,\theta)}{\partial\theta} f(\theta,X_i)\text{d}X_i    \notag\\
    &=& \int\frac{\partial f(\theta,X_i)}{\partial\theta} \text{d}X_i    \notag\\
    &=& \frac{\partial}{\partial\theta} \int f(\theta,X_i)\text{d}X_i    \notag\\
    &=& \frac{\partial}{\partial\theta}  1=0    \notag
\end{eqnarray}</script><p>将上面的总体矩写成样本矩，因此MLE为：</p>
<script type="math/tex; mode=display">
\frac1n \sum_{i=1}^n s\left( \hat\theta_{MLE},X_i \right)=0</script><h3 id="8-2-广义矩估计的定义"><a href="#8-2-广义矩估计的定义" class="headerlink" title="8.2 广义矩估计的定义"></a>8.2 广义矩估计的定义</h3><p>考虑总体矩条件：</p>
<script type="math/tex; mode=display">
\mathbb{E}g(Z_i,\theta_0)=0</script><p>其中$Z_i$是一个$l\times1$随机变量，$g(\cdot,\cdot):\mathbb{R}^l\times\mathbb{R}^k\rightarrow\mathbb{R}^m,m\ge k$。令$W_n$为一个$m\times m$对称权重矩阵，以及样本矩：</p>
<script type="math/tex; mode=display">
\bar g(\theta)=\frac1n\sum_{i=1}^n g(Z_i,\theta)</script><p>GMM估计量$\hat\theta$要最小化下面的准则函数（criterion function）：（<span style='font-family:kai'>如果看不懂这里为啥要这么做，可以看本网页最后面知乎用户更加通俗的解释！</span>）</p>
<script type="math/tex; mode=display">
S_n(\theta)=\bar g(\theta)'W_n \bar g(\theta)</script><p>其中$\theta\in\Theta\subset\mathbb{R}^k$。</p>
<blockquote>
<p>实际上这里并不知道权重矩阵$W_n$具体是什么！</p>
<p><span style='font-family:kai'>注意：期望等于0，才能通过求最小值的方法估计参数。同时还得要求权重矩阵$W$必须是正定的！</span></p>
</blockquote>
<h4 id="8-2-1-一个例子：线性回归模型的GMM估计"><a href="#8-2-1-一个例子：线性回归模型的GMM估计" class="headerlink" title="8.2.1 一个例子：线性回归模型的GMM估计"></a>8.2.1 一个例子：线性回归模型的GMM估计</h4><p>考虑下面的模型：</p>
<script type="math/tex; mode=display">
y_i=x_i'\beta+u_i,\mathbb{E}(z_iu_i)=0,i=1,2,\cdots,n</script><p>其中$x_i$的维度是$k\times1$，$z_i$的维度是$m\times1$，且$m\ge k$。</p>
<ul>
<li>如果$m=k$，模型恰好识别。</li>
<li>如果$m&gt;k$，模型过度识别。</li>
</ul>
<p>构造：</p>
<script type="math/tex; mode=display">
g(y_i,x_i,z_i,\beta)=z_i(y_i-x_i'\beta)</script><p>即便模型不是线性的：</p>
<script type="math/tex; mode=display">
y_i=f(x_i,\beta)+u_i</script><p>我们依然可以构造：</p>
<script type="math/tex; mode=display">
g(y_i,x_i,z_i,\beta)=z_i[y_i-f(x_i,\beta)]</script><h4 id="8-2-2-GMM估计量的一致性"><a href="#8-2-2-GMM估计量的一致性" class="headerlink" title="8.2.2 GMM估计量的一致性"></a>8.2.2 GMM估计量的一致性</h4><p>上面一顿操作后，咋保证估计的结果具有一致性呢？（<span style='font-family:kai'>这里已经放低了要求，不要求“无偏性”了！</span>）</p>
<p>假定：</p>
<ul>
<li><p>G1:$\Theta$是紧集。</p>
</li>
<li><p>G2:在$\theta\in\Theta$，$\bar{g}(\theta)$依概率收敛于$g(\theta)$:</p>
<ul>
<li><script type="math/tex; mode=display">
\sup_{\theta\in\Theta} \| \bar g(\theta)-g(\theta) \|\rightarrow_p 0</script></li>
</ul>
</li>
<li><p>G3:存在$\theta_0\in\Theta$，使得$g(\theta_0)=0$。</p>
</li>
<li><p>G4:$\theta_0$是方程$g(\theta)=0$的唯一解。</p>
</li>
<li><p>G5:$W_n\rightarrow_p W$，其中$W$是一个非随机对称非奇异矩阵（nonstochastic symmetric and nonsingular matrix）。</p>
</li>
</ul>
<p>基于以上假定，有</p>
<script type="math/tex; mode=display">
\hat\theta\rightarrow_p\theta_0</script><h4 id="8-2-3-渐进正态性"><a href="#8-2-3-渐进正态性" class="headerlink" title="8.2.3 渐进正态性"></a>8.2.3 渐进正态性</h4><p>还有补充假定：</p>
<ul>
<li><p>G6:$\theta$是$\Theta$的内点。</p>
</li>
<li><p>G7:$\{g(Z_i,\theta_0)\}$服从中心极限定理（CLT）：</p>
<ul>
<li><script type="math/tex; mode=display">
\frac1{\sqrt{n}}\sum_{i=1}^n g(Z_i,\theta_0)\rightarrow_d N(0,V)</script></li>
<li><p>其中$V$有限且正定。</p>
</li>
</ul>
</li>
<li><p>G8:$g(Z,\theta)$关于$\theta$连续可微，$\left\{\frac{\partial g(Z_i\theta)}{\partial\theta} \right\}$满足弱一致性：</p>
<ul>
<li><script type="math/tex; mode=display">
\sup_{\theta\in\Theta} \left\| \frac1n\sum_{i=1}^n\frac{\partial g(Z_i,\theta)}{\partial\theta'}-G(\theta)  \right\|\rightarrow_p0</script></li>
<li><p>其中$G(\theta)=\lim_{n\rightarrow\infty} \frac1n \sum_{i=1}^n\mathbb{E}\left[ \frac{\partial g(Z_i,\theta)}{\partial\theta’}  \right]$是一个关于$\theta\in\Theta$连续的$m\times k$矩阵，在$\theta_0$的小邻域内满秩$\text{rank}(G)=k$。</p>
</li>
</ul>
</li>
</ul>
<p>基于以上假定，有</p>
<script type="math/tex; mode=display">
\sqrt{n}(\hat\theta-\theta)\rightarrow_d N(0,\Sigma)</script><p>其中:</p>
<script type="math/tex; mode=display">
\Sigma=(G_0'WG_0)^{-1} G_0'WVWG_0(G_0'WG_0)^{-1};\quad G_0=G(\theta_0)</script><blockquote>
<p>证明：</p>
<p>注意到：</p>
<script type="math/tex; mode=display">
\hat\theta=\arg\min \bar g(\theta)'W_n\bar g(\theta)</script><p>一阶条件为：</p>
<script type="math/tex; mode=display">
\left[ \frac{\partial\bar g(\hat\theta)}{\partial\theta'}  \right]'W_n\bar g(\hat\theta)=0</script><p>将一阶条件泰勒展开：</p>
<script type="math/tex; mode=display">
\left[ \frac{\partial\bar g(\hat\theta)}{\partial\theta'}  \right]'W_n\bar g(\hat\theta_0)
+\left[ \frac{\partial\bar g(\hat\theta)}{\partial\theta'}  \right]'
W_n\frac{\partial\bar g(\bar\theta)}{\partial\theta'}(\hat\theta-\theta_0)=0</script><p>其中$\bar\theta$在$\hat\theta$和$\theta_0$之间，满足$\bar\theta\rightarrow_p\theta_0$。于是：</p>
<script type="math/tex; mode=display">
\sqrt{n}(\hat\theta-\theta_0)
=-\left\{ \left[ \frac{\partial\bar g(\hat\theta)}{\partial\theta'}  \right]'
W_n\frac{\partial\bar g(\bar\theta)}{\partial\theta'} \right\}^{-1}
\left[ \frac{\partial\bar g(\hat\theta)}{\partial\theta'}  \right]'W_n\sqrt{n}\bar g(\hat\theta_0)</script><p>根据前面的假定G8：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
     \left\| \frac{\partial\bar g(\hat\theta)}{\partial\theta'} -G(\theta_0) \right\| 
     &<& \left\|  \frac{\partial\bar g(\hat\theta)}{\partial\theta'} -G(\hat\theta) \right\| 
     + \| G(\hat\theta)-G(\theta_0) \|    \notag\\
     &\le& \sup_{\theta\in\Theta}\left\| \frac{\partial\bar g(\theta)}{\partial\theta'} -G(\theta) \right\| 
     + \| G(\hat\theta)-G(\theta_0) \|    \notag\\
     &=&op(1)+op(1)    \notag
\end{eqnarray}</script><p>同理可证明：$\left| \frac{\partial\bar g(\bar\theta)}{\partial\theta’}-G(\theta_0) \right|=op(1)$。于是结合G5和G8不难证明：</p>
<script type="math/tex; mode=display">
\left[ \frac{\partial\bar g(\hat\theta)}{\partial\theta'}  \right]'
W_n\frac{\partial\bar g(\bar\theta)}{\partial\theta'}\rightarrow_p G_0'WG_0</script><p>结合G5和G7，得到：</p>
<script type="math/tex; mode=display">
\sqrt{n}(\hat\theta-\theta_0)\rightarrow_dN\left(0, (G_0'WG_0)^{-1}G_0'WVWG_0 (G_0'WG_0)^{-1}\right)</script></blockquote>
<h4 id="8-2-4-最优权重矩阵"><a href="#8-2-4-最优权重矩阵" class="headerlink" title="8.2.4 最优权重矩阵"></a>8.2.4 最优权重矩阵</h4><p><span style='font-family:kai'>前面我们的估计结果已经满足了一致性这个小小目标了，但是我们的步伐不能到此为止。细心的同学可能发现了，前面我们使用的权重矩阵并没有被确定，也就是说只要是个正定矩阵就可以拿来随便用。这哪儿行啊！这一节的目的就是想在茫茫的权重矩阵海中，找到最优的那一个！</span></p>
<p>最优的$W$：将渐进协方差矩阵$\Sigma$最小化。答案是$W=V^{-1}$（$\mathbb{E}g(Z,\theta)=V$）。渐进协方差简写为：</p>
<script type="math/tex; mode=display">
\Sigma_0=(G_0'VG_0)^{-1}</script><p>这足以证明$\Sigma-\Sigma_0$是半正定的：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \Sigma_0^{-1}-\Sigma^{-1} 
    &=& G_0'V^{-1}G_0-G_0'WG_0(G_0'WVWG_0)^{-1}G_0'WG_0    \notag\\
    &=& G_0'V^{-\frac12}(I-P)V^{-\frac12}G_0    \notag
\end{eqnarray}</script><p>其中$P=V^{\frac12} WG_0(G_0’WVWG_0)^{-1}G_0’WV^{\frac12}$是一个投影矩阵。</p>
<h4 id="8-2-5-有效率的GMM估计量"><a href="#8-2-5-有效率的GMM估计量" class="headerlink" title="8.2.5 有效率的GMM估计量"></a>8.2.5 有效率的GMM估计量</h4><script type="math/tex; mode=display">
\sqrt{n}\left(\hat\theta_{EGMM}-\theta_0\right)\rightarrow_d N(0,\Sigma_0)</script><p>其中$\Sigma_0=(G_0’V^{-1}G_0)^{-1}$。</p>
<blockquote>
<p>注意到，$\hat\theta_{GMM}$中的权重矩阵是任意的正定矩阵，而$\hat\theta_{EGMM}$的是最优的权重矩阵$W_n=\hat V^{\star-1}_n$。</p>
<p><span style='font-family:hei;font-size:24px'>拓展：实操中获得得到GMM估计量？</span></p>
<p>第一步：</p>
<script type="math/tex; mode=display">
S_n(\theta)=\bar g(\theta)'W_n \bar g(\theta)</script><p>令$W_n=I$，得到$\theta_0$的第一步回归结果$\tilde\theta$。（尽管$\tilde\theta$是无效率的估计结果，但它依然是$\theta_0$的一致估计量）</p>
<p>第二步：</p>
<p>找到$V=\text{avar}[\sqrt{n}g(\theta_0)]$的初步一致估计量$\tilde V_n=\mathbb{E}\left[\bar g(\tilde\theta)\bar g(\tilde\theta)\right]$(<span style='font-family:kai'>如果$\{g(Z_i,\theta_0\}$是一个平稳的鞅差序列。如果它不是鞅差序列，情况会复杂很多。</span>)，再令$W_n=\tilde V^{-1}_n$，最小化$S_n(\theta)$，得到$\theta_0$的有效GMM估计量$\hat\theta_{EGMM}$。</p>
</blockquote>
<h4 id="8-2-6-渐进方差估计量"><a href="#8-2-6-渐进方差估计量" class="headerlink" title="8.2.6 渐进方差估计量"></a>8.2.6 渐进方差估计量</h4><p>假定G9：$\hat V_n\rightarrow_p V$，令</p>
<script type="math/tex; mode=display">
\hat G_n=\frac1n\sum_{i=1}^n \frac{\partial f\left(Z_i,\hat\theta_{EGMM}\right)}{\partial \theta'}</script><p>基于假定G1-G8:$\hat G_n\rightarrow_p G_0$。</p>
<p>基于以上九个假定，我们得到：</p>
<script type="math/tex; mode=display">
\hat\Sigma_0=\left( \hat G_n'\hat V^{-1} \hat G_n \right)^{-1}\rightarrow_p \Sigma_0</script><h4 id="8-2-7-假设检验"><a href="#8-2-7-假设检验" class="headerlink" title="8.2.7 假设检验"></a>8.2.7 假设检验</h4><script type="math/tex; mode=display">
H_0: R(\theta_0)=r\leftrightarrow H_1:R(\theta_0)\neq r</script><p>$R:\mathbb{R}^k\rightarrow\mathbb{R}^q$是一个连续可分函数，其中$q\le k$。假定：</p>
<script type="math/tex; mode=display">
\text{rank}[R'(\theta)]=q,\text{其中}R'(\theta)=\frac{\partial R(\theta)}{\partial\theta'}</script><p>在原假设下：</p>
<script type="math/tex; mode=display">
\sqrt{n}\left[ R\left(\hat\theta_{EGMM} \right)-r \right]
\rightarrow_d N\left( 0,R'(\theta_0)\Sigma_0[R'(\theta)]' \right)</script><p>由此断定：</p>
<script type="math/tex; mode=display">
W_n=\sqrt{n}\left[ R\left(\hat\theta_{EGMM} \right)-r \right]'
\left[R'\left(\hat\theta_{EGMM}\right)\hat\Sigma_0R\left(\hat\theta_{EGMM}\right)\right]^{-1}
\sqrt{n}\left[ R\left(\hat\theta_{EGMM} \right)-r \right]
\rightarrow_d\chi^2(q)</script><h3 id="8-3-一个实例"><a href="#8-3-一个实例" class="headerlink" title="8.3 一个实例"></a>8.3 一个实例</h3><p>前面的太理论了，实操一下应该好很多。</p>
<p>令$X_1,\cdots,X_n$为一组独立同分布的随机变量，其概率密度函数为：</p>
<script type="math/tex; mode=display">
f(x)=\theta\exp(-\theta x)\mathbb{1}(x\ge0),\theta>0</script><p>设$\theta_0$为参数的真值。注意到，$\mathbb{E}(X_1)=\frac{1}{\theta_0}$，于是参数$\theta$的矩估计量（MM）为：$\hat\theta_{MM}=\bar X^{-1}$。$\sqrt{n}(\hat\theta_{MM}-\theta_0)\rightarrow_d N(0,\theta_0^2)$。此外，$\mathbb{E}(X_1^2)=\frac{2}{\theta_0^2}$。</p>
<p>通过一阶和二阶矩构造估计量：</p>
<script type="math/tex; mode=display">
g_i(\theta)=\left(
\begin{matrix}
    g_1(X_i,\theta)\\ g_2(X_i,\theta)
\end{matrix}
\right)
=\left(
\begin{matrix}
    X_i-\frac1\theta\\ X_i^2-\frac{2}{\theta^2}
\end{matrix}
\right)</script><p>$\theta$的GMM估计量$\hat\theta$被定义为：</p>
<script type="math/tex; mode=display">
\hat\theta = \arg\min_{\theta} S_n(\theta)
=\left[ \frac1n \sum_{i=1}^n g(X_i,\theta) \right]'W_n\left[ \frac1n \sum_{i=1}^n g(X_i,\theta) \right]</script><p>一阶条件并泰勒展开：</p>
<script type="math/tex; mode=display">
0=\frac{\partial S_n(\hat\theta)}{\partial\theta'}
=\frac{\partial S_n(\theta_0)}{\partial\theta'} 
+\frac{\partial^2 S_n(\bar\theta)}{\partial\theta'\partial\theta} \left(\hat\theta-\theta_0\right)</script><p>求解该方程：</p>
<script type="math/tex; mode=display">
\hat\theta-\theta_0=-\left[ \frac{\partial^2 S_n(\bar\theta)}{\partial\theta'\partial\theta}  \right]^{-1}\frac{\partial S_n(\theta_0)}{\partial\theta'}</script><p>基于此，接下来一步的构造就非常巧妙：</p>
<script type="math/tex; mode=display">
\sqrt{n}(\hat\theta-\theta)=
-\color{purple}{\left[ \frac{\partial^2 S_n(\bar\theta)}{\partial\theta'\partial\theta}  \right]^{-1}}
\color{blue}{\sqrt{n}\frac{\partial S_n(\theta_0)}{\partial\theta'}}</script><p>首先：$\color{blue}{\sqrt{n}\frac{\partial S_n(\theta_0)}{\partial\theta’}}=\color{green}{\left[ \frac1n\sum_{i=1}^n\frac{\partial g_i(\theta_0)}{\partial\theta’}  \right]’}W_n\color{orange}{\frac1{\sqrt{n}}\sum_{i=1}^n g_i(\theta_0)}$</p>
<ul>
<li>$\color{green}{\frac1n\sum_{i=1}^n\frac{\partial g_i(\theta_0)}{\partial\theta’} =\left( \frac1{\theta_0^2},\frac{4}{\theta_0^3} \right)’=G_0}$</li>
<li>$\color{orange}{\frac1{\sqrt{n}}\sum_{i=1}^n g_i(\theta_0)}=\left(\begin{matrix}\frac1{\sqrt n}\sum_{i=1}^n(X_i-\theta_0^{-1})\\\frac1{\sqrt n}\sum_{i=1}^n(X_i^2-2/\theta_0^{-2}) \end{matrix}\right)\rightarrow_d N(0,V)$<ul>
<li>其中$V=\mathbb{E}[g_i(\theta_0)g_i(\theta_0)’]=\left(\begin{matrix}\frac{1}{\theta_0^2}&amp;\frac{4}{\theta_0^3}\\\frac{4}{\theta_0^3}&amp;\frac{20}{\theta_0^4}\end{matrix}\right)$。</li>
</ul>
</li>
</ul>
<blockquote>
<p>各阶矩分别求得：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \mathbb{E}X_i&=&\frac{1}{\theta_0}    \notag\\
    \mathbb{E}X_i^2&=&\frac{2}{\theta_0^2}    \notag\\
    \mathbb{E}X_i^3&=&\int_0^\infty x^3\theta_0\exp(-\theta_0 x)\text{d}x
    =-\int_0^\infty x^3\exp(-\theta_0 x)\text{d}(-\theta_0 x)    \notag\\
    &=&-\int_0^\infty x^3\text{d}\left(e^{-\theta_0 x}\right)
    =-\left[\left.x^3e^{-\theta_0 x}\right\lvert_{x=0}^\infty -\int_0^\infty e^{-\theta_0 x}3x^2\text{d}x \right]\notag\\
    &=&3 \int_0^\infty x^2 e^{-\theta_0 x}\text{d}x
    =\frac3\theta_0 \int_0^\infty x^2 \theta_0 e^{-\theta_0 x}\text{d}x
    =\frac{3}{\theta_0}\mathbb{E}(X_i^2)=\frac{6}{\theta_0^3}    \notag\\
    \mathbb{E}X_i^4&=&\int_0^\infty x^4\theta_0\exp(-\theta_0 x)\text{d}x
    =-\int_0^\infty x^4\exp(-\theta_0 x)\text{d}(-\theta_0 x)    \notag\\
    &=&-\int_0^\infty x^4\text{d}\left(e^{-\theta_0 x}\right)
    =-\left[\left.x^4e^{-\theta_0 x}\right\lvert_{x=0}^\infty -\int_0^\infty e^{-\theta_0 x}4x^3\text{d}x \right]\notag\\
    &=& 4 \int_0^\infty x^3 e^{-\theta_0 x}\text{d}x
    =\frac4\theta_0 \int_0^\infty x^3 \theta_0 e^{-\theta_0 x}\text{d}x
    =\frac{4}{\theta_0}\mathbb{E}(X_i^3)=\frac{24}{\theta_0^4}    \notag
\end{eqnarray}</script><p>然后：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \mathbb{E}(g_1g_1)&=&\mathbb{E}\left(X_i-\frac{1}{\theta_0}\right)^2=\mathbb{E}X_i^2-\frac{2}{\theta_0}\mathbb{E}X_i+\frac{1}{\theta_0^2}=    \frac{1}{\theta_0^2}\notag\\
    \mathbb{E}(g_1g_2)&=&\mathbb{E}(g_2g_1)
    =\mathbb{E}\left(X_i-\frac{1}{\theta_0}\right)\left(X^2_i-\frac{2}{\theta_0^2}\right)    \notag\\
    &=& \mathbb{E}X_i^3    -\frac{1}{\theta_0}\mathbb{E}X_i^2-\frac{2}{\theta_0^2}\mathbb{E}X_i+\frac{2}{\theta_0^3}\notag\\
    &=&    \frac{6}{\theta_0^3}-\frac1{\theta_0}\frac{2}{\theta_0^2}-\frac{2}{\theta_0^2}\frac{1}{\theta_0}+\frac{2}{\theta_0^3}\notag\\
    &=&\frac{4}{\theta_0^3} \notag\\
    \mathbb{E}(g_2g_2)&=&\mathbb{E}\left(X_i-\frac{2}{\theta_0^2}\right)^2 = \mathbb{E}X_i^4-\frac{4}{\theta_0^2}\mathbb{E}X_i^2+\frac{4}{\theta^4_0}\notag\\
    &=&\frac{24}{\theta_0^4}-\frac{4}{\theta_0^2}\frac{2}{\theta_0^2}+\frac{4}{\theta_0^4}=\frac{20}{\theta_0^4}    \notag
\end{eqnarray}</script><p>于是得到了$V$矩阵。</p>
</blockquote>
<p>然后：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \color{purple}{\frac{\partial^2 S_n(\bar{\theta})}{\partial\theta'\partial\theta}}
    &=& \left[ \frac1n\sum_{i=1}^n \frac{\partial g_i(\bar\theta)}{\partial\theta'}  \right]'W_n\left[ \frac1n\sum_{i=1}^n \frac{\partial g_i(\bar\theta)}{\partial\theta'}  \right]    \notag\\
    &+&\left[ \frac1n\sum_{i=1}^n \frac{\partial^2 g_i(\bar\theta)}{\partial\theta'\partial\theta}  \right]'W_n\left[ \frac1n\sum_{i=1}^n  g_i(\bar\theta)  \right]         \notag\\
    &\rightarrow&_p G_0'WG_0+\mathbb{E}\left[ \frac{\partial^2g_i(\theta_0)}{\partial\theta'\partial\theta}  \right]'W\color{red}{\mathbb{E}[g_i(\theta_0)]_{=0}}    \notag\\
    &=&\color{purple}{G_0'WG_0}    \notag
\end{eqnarray}</script><p>从而得到：</p>
<script type="math/tex; mode=display">
\sqrt{n}(\hat\theta-\theta_0)\rightarrow_d
N\left(0,\color{purple}{(G_0'WG_0)^{-1}}\color{green}{G_0'}W\color{orange}VW\color{green}{G_0}\color{purple}{(G_0'WG_0)^{-1}}\right)</script><p>令$W=V^{-1}$，那么$\sqrt{n}(\hat\theta_{EGMM}-\theta_0)\rightarrow_dN(0,[G_0’V^{-1}G_0]^{-1})$，其中：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    G_0'V^{-1}G_0 &=& 
    \left(\begin{matrix}
        \frac{1}{\theta_0^2} &\frac{4}{\theta_0^3}
    \end{matrix}\right)
    \left(\begin{matrix}
        \frac{1}{\theta_0^2} &\frac{4}{\theta_0^3}\\
        \frac{4}{\theta_0^3}& \frac{20}{\theta_0^4}
    \end{matrix}\right)^{-1}
    \left(\begin{matrix}
        \frac{1}{\theta_0^2} \\\frac{4}{\theta_0^3}
    \end{matrix}\right)
    =\frac{1}{\theta_0^2}
    \notag
\end{eqnarray}</script><p>从而可以证明$\sqrt{n}(\hat\theta_{EGMM}-\theta_0)\rightarrow_d N(0,\theta_0^2)$。</p>
<h2 id="更多关于GMM的"><a href="#更多关于GMM的" class="headerlink" title="更多关于GMM的"></a>更多关于GMM的</h2><blockquote>
<p>以下内容感谢来自知乎用户<a href='https://www.zhihu.com/question/41312883/answer/91484566' target='_blank'>慧航</a>分享的内容。</p>
</blockquote>
<p>在上面的例子中，我们只使用了两个矩条件。然而我们知道，正态分布的矩是有无穷多个可以用的，那么我们是不是可以使用更多的矩条件呢？</p>
<p>但是有个问题不好解决。在这个例子里面，我们有两个未知参数，如果只使用一阶矩，那么只有一个方程解两个未知数，显然是不可能的。像上面一样，我们用两个矩条件解两个未知数，就解出来了。然而，当我们用一到三阶矩，总共三个方程求解的时候，三个方程求解两个未知数，可能无解。如果再用到四阶矩、五阶矩，这个问题可能就会更尖锐。</p>
<p>到这里我们不妨引入一些记号。还是使用上面的例子，我们把上面的三个矩条件写到一个向量里面去，记：</p>
<script type="math/tex; mode=display">
g(x_i,\theta)=\left( \begin{matrix}
x_i-\mu\\    x_i^2-\mu^2-\sigma^2\\x_i^3-\mu^3-3\mu\sigma^2 
\end{matrix}\right),\theta=\{\mu,\sigma^2\}</script><p>不难发现有$\mathbb{E}g(x_i\theta)=0$。这是总体矩条件，写成样本矩就是：</p>
<script type="math/tex; mode=display">
\frac1N \sum_i g(x_i,\hat\theta)=0</script><p>解这个方程应该就可以得到参数$\theta$的估计。但是正如上面所说的，三个方程两个未知数，并不能确保这个方程有解，所以必须想一些其他办法。</p>
<p>一个比较自然的想法是，上面的矩条件等于0，虽然我不太可能保证三个方程同时等于0，但是仿照OLS，我们可以让他们的平方和最小，也就是：</p>
<script type="math/tex; mode=display">
\min_\hat\theta \left[\frac1N \sum_i g(x_i,\hat\theta)\right]'\left[\frac1N \sum_i g(x_i,\hat\theta)\right]</script><p>这样我们就能保证三个矩条件的样本矩都足够贴近于0，当然不可能同时为0。这样不就综合使用了三个矩条件的信息么？更一般的，由于上面的$g$函数是一个$3\times1$的列向量，我们可以使用一个权重矩阵$W$来赋予每个矩条件以不同的权重：</p>
<script type="math/tex; mode=display">
\min_\hat\theta \left[\frac1N \sum_i g(x_i,\hat\theta)\right]'W\left[\frac1N \sum_i g(x_i,\hat\theta)\right]</script><p><span style='color:red'>只要这个$W$是一个正定矩阵</span>，那么仍然可以保证每个样本矩都足够贴近于0。</p>
<p>那么问题来了，既然对W的要求只要求正定矩阵，那么使用不同的权重矩阵就有可能得到不同的结果。问题是，有没有一个最优的权重矩阵呢？当然是有的。可以证明，最优的权重矩阵应该是：(前面的GMM内容中已经予以证明！)</p>
<script type="math/tex; mode=display">
\{\mathbb{E}\left[g(x_i,\theta)g(x_i\theta)'\right]\}^{-1}</script><p>答主还贴心地给出了stata代码：</p>
<figure class="highlight"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br></pre></td><td class="code"><pre><span class="line">nulldata <span class="number">1000</span></span><br><span class="line">set seed <span class="number">1988</span></span><br><span class="line">series x=randgen(N,<span class="number">1</span>,<span class="number">2</span>)</span><br><span class="line">series x2=x^<span class="number">2</span></span><br><span class="line">series x3=x^<span class="number">3</span></span><br><span class="line">series e</span><br><span class="line">series e2</span><br><span class="line">series e3</span><br><span class="line">scalar mu=<span class="number">0</span></span><br><span class="line">scalar sigma2=<span class="number">1</span></span><br><span class="line">matrix W2=I(<span class="number">2</span>)</span><br><span class="line">gmm</span><br><span class="line">    series e=x-mu</span><br><span class="line">    series e2=x2-sigma2-mu^<span class="number">2</span></span><br><span class="line">    orthog e; const</span><br><span class="line">    orthog e2; const</span><br><span class="line">    weights W2</span><br><span class="line">    params mu sigma2</span><br><span class="line">end gmm</span><br><span class="line">matrix W3=I(<span class="number">3</span>)</span><br><span class="line">scalar mu=<span class="number">0</span></span><br><span class="line">scalar sigma2=<span class="number">1</span></span><br><span class="line">gmm</span><br><span class="line">    series e=x-mu</span><br><span class="line">    series e2=x2-sigma2-mu^<span class="number">2</span></span><br><span class="line">    series e3=x3-<span class="number">3</span>*mu*sigma2-mu^<span class="number">3</span></span><br><span class="line">    orthog e; const</span><br><span class="line">    orthog e2; const</span><br><span class="line">    orthog e3; const</span><br><span class="line">    weights W3</span><br><span class="line">    params mu sigma2</span><br><span class="line">end gmm</span><br><span class="line">scalar mu=<span class="number">0</span></span><br><span class="line">scalar sigma2=<span class="number">1</span></span><br><span class="line">gmm</span><br><span class="line">    series e=x-mu</span><br><span class="line">    series e2=x2-sigma2-mu^<span class="number">2</span></span><br><span class="line">    series e3=x3-<span class="number">3</span>*mu*sigma2-mu^<span class="number">3</span></span><br><span class="line">    orthog e; const</span><br><span class="line">    orthog e2; const</span><br><span class="line">    orthog e3; const</span><br><span class="line">    weights W3</span><br><span class="line">    params mu sigma2</span><br><span class="line">end gmm --iterate</span><br></pre></td></tr></table></figure>
<p>下面的总结开始升华主题了：</p>
<p>计量经济学的很多很多问题基本都可以归结为GMM的问题。从最简单的OLS、2SLS到稍微复杂一点的面板数据、动态面板等等，本质上都是在找矩条件。比如工具变量的2SLS，可以发现矩条件不过就是：</p>
<script type="math/tex; mode=display">
\mathbb{E}[(y_i-x_i'\beta)z_i]=0</script><p>套一下上面的公式，最优权重矩阵(的逆)为：</p>
<script type="math/tex; mode=display">
\mathbb{E}[(y_i-x_i\beta)z_iz_i'(y_i-x_i'\beta)']
=\mathbb{E}[e_i^2z_iz_i']=\sigma^2\mathbb{E}(z_iz_i')</script><p>甚至，一些其他的估计量，比如MLE、M-estimator等，在一定的条件下也可以转化为GMM，因为这些估计量的一阶条件可以看成是矩条件。<span style='color:red'>所以GMM也就变成了一个统一的框架。</span></p>

<script type="math/tex; mode=display">
\begin{eqnarray}
    &&Y'M_0Y = (M_0Y)'(M_0Y)=\sum_{i=1}^n(Y_i-\bar{Y})^2    \notag\\
    &&X'M_0Y = (M_0X)'(M_0Y)=\sum_{i=1}^n(X_i-\bar{X})(Y_i-\bar{Y})    \notag
\end{eqnarray}</script><blockquote>
<p>有一个意外的小收获：<span style='color:red;font-family:kai'>幂等且对称的矩阵一定是半正定矩阵！！</span></p>
<p>因为<span style='font-family:fangsong'>半正定矩阵$A$的一个判定条件为存在矩阵$C$，满足$A=C’C$。</span>而对于幂等且对称的矩阵而言：</p>
<script type="math/tex; mode=display">
M=M^2=M'M</script><p>因此它一定是半正定的！</p>
<p>后来才知道，这个发现是“柯赫伦定理”～</p>
</blockquote>
<h3 id="有效率的定义"><a href="#有效率的定义" class="headerlink" title="有效率的定义"></a>有效率的定义</h3><p>对于两个无偏估计量$\hat{\beta},\tilde{\beta}$，当且仅当$\text{Var}(\tilde{\beta})-\text{Var}(\hat{\beta})$是半正定矩阵(p.s.d)时，$\hat{\beta}$比$\tilde{\beta}$更有效率。</p>
<h3 id="依概率收敛"><a href="#依概率收敛" class="headerlink" title="依概率收敛"></a>依概率收敛</h3><p>设$\{ X_n \}_{n=1}^{+\infty}$是一个随机变量序列，$X$是一个随机变量。如果对于任意的正实数$\varepsilon&gt;0$，都有</p>
<script type="math/tex; mode=display">
\lim_{n\rightarrow+\infty} \mathbb{P}(|X-X_n|\ge\varepsilon)=0</script><p>那么称序列$\{ X_n \}_{n=1}^{+\infty}$依概率收敛到$X$。</p>
<h3 id="几乎处处收敛（a-s-）"><a href="#几乎处处收敛（a-s-）" class="headerlink" title="几乎处处收敛（a.s.）"></a>几乎处处收敛（a.s.）</h3><p>设$\{ X_n \}_{n=1}^{+\infty}$是一个随机变量序列，$X$是一个随机变量。如果：</p>
<script type="math/tex; mode=display">
\mathbb{P}\left(\lim_{ n\rightarrow+\infty } X_n=X \right)=1</script><p>称$\{ X_n \}_{n=1}^{+\infty}$几乎处处收敛于随机变量$X$，记为$X_n \xrightarrow{\text{a.s.}} X$。</p>
<h3 id="依-r-阶均值收敛"><a href="#依-r-阶均值收敛" class="headerlink" title="依$r$阶均值收敛"></a>依$r$阶均值收敛</h3><p>设$\{ X_n \}_{n=1}^{+\infty}$是一个随机变量序列，其中$\mathbb{E}| X_n |^r&lt;\infty$对某一个$r&gt;0$成立。如果存在一个随机变量$X$满足：</p>
<script type="math/tex; mode=display">
\lim_{n\rightarrow+\infty} \mathbb{E}(\| X_n-X \|^r)=0</script><p>那么称$\{ X_n \}_{n=1}^{+\infty}$依$r$阶均值收敛于$X$，记为：$X_n\xrightarrow{\text{r.m.}}X$或者$X_n\xrightarrow{L^r} X$。</p>
<h3 id="依-r-阶矩收敛"><a href="#依-r-阶矩收敛" class="headerlink" title="依$r$阶矩收敛"></a>依$r$阶矩收敛</h3><p>设$\{ X_n \}_{n=1}^{+\infty}$是一个随机变量序列，其中$\mathbb{E}| X_n |^r&lt;\infty$对某一个$r&gt;0$成立。如果：</p>
<script type="math/tex; mode=display">
\mathbb{E}\| X_n \|^r \rightarrow \mathbb{E}\| X \|^r</script><p>那么称$\{ X_n \}_{n=1}^{+\infty}$依$r$阶矩收敛于$X$。</p>
<h3 id="依分布收敛"><a href="#依分布收敛" class="headerlink" title="依分布收敛"></a>依分布收敛</h3><p>设$\{ X_n \}_{n=1}^{+\infty}$是一个随机变量序列，其分布函数为：$F_n(x)=\mathbb{P}(X_n\le x)$。如果对于所有$x$都有$F(x)=\mathbb{P}(X\le x)$是连续的，且</p>
<script type="math/tex; mode=display">
F_n(x)\rightarrow F(x)</script><p>那么称$X_n$依分布收敛于$X$，记为$X_n\rightarrow_d X$。我们还称$X$及其分布$F(x)$为$X$的<strong>渐进分布</strong>、<strong>大样本分布</strong>或者<strong>极限分布</strong>。</p>
<h3 id="检验的功效（power-of-a-test）"><a href="#检验的功效（power-of-a-test）" class="headerlink" title="检验的功效（power of a test）"></a>检验的功效（power of a test）</h3><script type="math/tex; mode=display">
1-\mathbb{P}(\text{Type II error}) = 1-\mathbb{P}(\text{not reject } \mathbb{H}_0 \lvert \mathbb{H}_1 \text{ is true})</script><p>不犯第二类错误的概率。</p>
<h2 id="一些容易忽视的假定"><a href="#一些容易忽视的假定" class="headerlink" title="一些容易忽视的假定"></a>一些容易忽视的假定</h2><h3 id="OLS的基本假定"><a href="#OLS的基本假定" class="headerlink" title="OLS的基本假定"></a>OLS的基本假定</h3><p>编个小口诀就是：<span style='font-family:kai'>“线性外生非退化，还要加上球方差”</span>。</p>
<ol>
<li>线性：$Y_i=X_i\beta+\varepsilon_i$，$Y_i=(y_1,\cdots,y_n)^T$，$X_i=(l,X_1,\cdots,X_k)$，$n$为样本量，$k$为自变量的数量。</li>
<li>严格外生性：$\mathbb{E}(\varepsilon_i\lvert X) = \mathbb{E}(\varepsilon_i\lvert X_1,\cdots X_n)=0,\text{for }i，2，\cdots,n$。$\varepsilon$与每一个样本的自变量都是独立的，这个条件一定不能写成$\mathbb{E}(\varepsilon_i\lvert X_i)=0$</li>
<li>非退化性：$X’X$的秩为$k$的概率为1.</li>
<li>球性方差：$\mathbb{E}(\varepsilon_i^2\lvert X)=\sigma^2,\mathbb{E}(\varepsilon_i\varepsilon_j\lvert X)=0$</li>
</ol>
<h3 id="正态假定是在大样本这块提出来的！"><a href="#正态假定是在大样本这块提出来的！" class="headerlink" title="正态假定是在大样本这块提出来的！"></a>正态假定是在大样本这块提出来的！</h3><p>对残差提出了正态假定：$\varepsilon\lvert X\sim N(0,\sigma^2 I_n)$，那么它的概率分布函数（p.d.f）写成：</p>
<script type="math/tex; mode=display">
f(\varepsilon\lvert X) = (2\pi\sigma^2)^{-\frac n2}\exp\left(  -\frac{\varepsilon'\varepsilon}2\right)</script><p>这一假定下，$\varepsilon$与$X$不相关，也就是说$\varepsilon\perp X$。</p>
<p>得到以下引理：</p>
<ul>
<li>若$\varepsilon\sim N(0,\Sigma)$，$\Sigma$是非退化的，那么$\varepsilon’\Sigma^{-1}\varepsilon\sim\chi^2(n)$。</li>
<li>如果$\varepsilon\sim N(0,\sigma^2I_n)$，$A$是一个$n\times n$投影矩阵，那么$\varepsilon’A\varepsilon\sim\chi^2(\text{rank}(A))=\chi^2(\text{tr}(A))$</li>
<li>如果$\varepsilon\sim N(0,\sigma^2I_n)$，$A$是一个$n\times n$投影矩阵，若$A’B=0$，那么$\varepsilon’ A\varepsilon\perp B’\varepsilon$</li>
<li>如果$\varepsilon\sim N(0,\sigma^2I_n)$，$A$和$B$都是对称矩阵。只有当$A’B=0$时，才有$\varepsilon’ A\varepsilon\perp B’\varepsilon$</li>
<li>若$\varepsilon\sim N(0,\sigma^2I_n)$，$A$是<strong>对称且为幂等</strong>的，那么$\frac1{\sigma^2}\varepsilon’ A\varepsilon=\color{red}{\left(\frac{\varepsilon’}{\sigma}\right)A\left(\frac{\varepsilon}{\sigma}\right)}\sim\chi^2(\text{rank}(A))$。</li>
</ul>
<blockquote>
<p> 可以简单证明一下前两个引理：</p>
<p>第一个，设$Y=\Sigma^{-\frac12}\varepsilon\sim N(0,I_n)$</p>
<p>于是</p>
<script type="math/tex; mode=display">
\varepsilon'\Sigma^{-1}\varepsilon=Y'Y\sim \chi^2(n)</script><p>第二个，由于$A$不一定可逆，因此不能直接像上面那样构造了。</p>
<p>由于$A$是投影矩阵，因此它是对称且幂等的半正定矩阵。稍微用一点线性代数的知识，可以知道存在正交矩阵$P$，满足$PP’=I_n$，使得$A$能以下面的形式对角化：</p>
<script type="math/tex; mode=display">
A=P'
\left(\begin{matrix}
    \Lambda&0\\
    0&0
\end{matrix}\right)
P</script><p>其中$\Lambda$是一个对角矩阵，其对角元素为$A$的非零特征值，它的阶数等于矩阵$A$的秩。</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \varepsilon'A\varepsilon&=&\varepsilon'P'\Lambda P\varepsilon=
\varepsilon'P'
\left(\begin{matrix}
    \Lambda_a&0\\
    0&0
\end{matrix}\right)
P\varepsilon    \notag\\
    &=&\left[\left(\begin{matrix}
    \Lambda_a^{\frac12}&0\\
    0&0
\end{matrix}\right)
    P\varepsilon
    \right]'
    \left[\left(\begin{matrix}
    \Lambda_a^{\frac12}&0\\
    0&0
\end{matrix}\right)
    P\varepsilon
    \right]    \notag\\
    &=& \left(\Lambda^{\frac12}P\varepsilon\right)'\left(\Lambda^{\frac12}P\varepsilon\right)    \notag
\end{eqnarray}</script><p>其中$a=\text{rank}(A)$，$\Lambda_a$为$A$的特征值构成的对角矩阵。又有</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \text{Var}(\Lambda^{\frac12}P\varepsilon) 
    &=&\Lambda^{\frac12}P\text{Var}(\varepsilon)P'\Lambda^{\frac12}    \notag\\
    &=& \Lambda^{\frac12}P\sigma^2I_n P'\Lambda^{\frac12}    \notag\\
    &=& \sigma^2 \Lambda^{\frac12}P P'\Lambda^{\frac12}    \notag\\
    &=& \sigma^2\Lambda
  \notag
\end{eqnarray}</script><p>？</p>
</blockquote>
<p>还有一点，<span style='color:red'>作了外生性这个假定后，原来的“严格外生”和“球性方差”两个假定也就没必要了！！</span>因此在大样本情形下只有三个假定：</p>
<ul>
<li>线性</li>
<li>非退化</li>
<li>正态</li>
</ul>
<p>这时候有以下定理：</p>
<ul>
<li>$\hat{\beta}-\beta\lvert X\sim N(0,\sigma^2(X’X)^{-1})$</li>
<li>$\left.\frac{(n-k)s^2}{\sigma^2}\right\lvert X\sim\chi^2(n-k)$</li>
<li>$\hat{\beta}\perp s^2\lvert X$</li>
</ul>
<blockquote>
<p>证明：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \hat{\beta}-\beta&=&(X'X)^{-1}X\varepsilon\equiv C\varepsilon    \notag\\
    \text{Var}(\hat{\beta}-\beta\lvert X)&=&C\text{Var}(\varepsilon\lvert X)C'=C\sigma^2I_nC'    \notag\\
    &=&\sigma^2 (X'X)^{-1}XX'(X'X)^{-1}=\sigma^2(X'X)^{-1}    \notag
\end{eqnarray}</script><script type="math/tex; mode=display">
\left.\frac{(n-k)s^2}{\sigma^2}\right\lvert X 
= \left.\frac{\varepsilon'M\varepsilon}{\sigma^2}\right\lvert X
\sim\chi^2(\text{rank}(M))=\chi^2(n-k)</script><p>前面的引理发挥了很大作用！！</p>
</blockquote>
<h3 id="正态假定也是进行假设检验的关键假定！"><a href="#正态假定也是进行假设检验的关键假定！" class="headerlink" title="正态假定也是进行假设检验的关键假定！"></a>正态假定也是进行假设检验的关键假定！</h3><h4 id="t检验"><a href="#t检验" class="headerlink" title="t检验"></a>t检验</h4><p>对于一个约束的情况：</p>
<script type="math/tex; mode=display">
H_0:c'\beta=r \leftrightarrow  H_1:c'\beta\neq r</script><p>如果原假设$H_0$成立的话，在正态假定下有$\hat{\beta}\lvert X\sim N(\beta,\sigma^2(X’X)^{-1})$</p>
<script type="math/tex; mode=display">
\left.c'\hat{\beta}\right\lvert X\sim N(c'\beta,\sigma^2c'(X'X)^{-1}c) = N(r,\sigma^2c'(X'X)^{-1}c)</script><p>于是</p>
<script type="math/tex; mode=display">
Z\equiv \frac{c'\hat{\beta}-r}{\sqrt{\sigma^2c'(X'X)^{-1}c}}\sim N(0,1)</script><p>但由于总体的方差是未知的，因此上面的统计量不能直接用来检验，需要将样本方差替代总体方差，构造如下检验统计量：</p>
<script type="math/tex; mode=display">
T_n = \frac{c'\hat{\beta}-r}{\sqrt{s^2c'(X'X)^{-1}c}}</script><p>关键是弄清楚服$T_n$从什么分布！结论来了！它服从自由度为$n-k$的$t$分布！($n$是样本总量，$k$是解释变量的数量)</p>
<blockquote>
<p>证明：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    T_n &=& \frac{c'\hat{\beta}-r}{\sqrt{s^2c'(X'X)^{-1}c}} 
= \frac{c'(\hat{\beta}-\beta)}{\sqrt{s^2c'(X'X)^{-1}c}}    \notag\\
    &=& \frac{c'(\hat{\beta}-\beta)/\sqrt{\sigma^2c'(X'X)^{-1}c}}{\sqrt{\frac{(n-k)s^2/\sigma^2}{n-k}}}    \notag\\
    &=& \frac{c'(\hat{\beta}-\beta)/\sqrt{\sigma^2c'(X'X)^{-1}c}}{\sqrt{S_n/(n-k)}}    \notag
\end{eqnarray}</script><p>注意到</p>
<script type="math/tex; mode=display">
\frac{c'(\hat{\beta}-\beta)}{\sqrt{\sigma^2c'(X'X)^{-1}c}}\sim N(0,1),\quad S_n\sim \chi^2(n-k)</script><p>因此$T_n\sim t(n-k)$</p>
</blockquote>
<h4 id="F检验"><a href="#F检验" class="headerlink" title="F检验"></a>F检验</h4><p>对于$q$个约束的情况：</p>
<script type="math/tex; mode=display">
H_0:R\beta=r \leftrightarrow  H_1:R\beta\neq r</script><p>$R$是$q\times k$矩阵，$q&lt;k$。假定$\text{rank}(R)=q$，否则有些约束是多余的。构造检验统计量：</p>
<script type="math/tex; mode=display">
F_n\equiv \frac{1}{q}(R\hat{\beta}-r)'[s^2R(X'X)^{-1}R']^{-1}(R\hat{\beta}-r)\sim F(q,n-k)</script><blockquote>
<script type="math/tex; mode=display">
\hat{\beta}\lvert X\sim N(\beta,\sigma^2(X'X)^{-1})</script><p>当原假设成立的时候，</p>
<script type="math/tex; mode=display">
R\hat{\beta}-r\lvert X\sim N(0,\sigma^2 R(X'X)^{-1}R')</script><p>因此</p>
<script type="math/tex; mode=display">
A_n\equiv(R\hat{\beta}-r)'[\sigma^2R(X'X)^{-1}R']^{-1}(R\hat{\beta}-r) \sim\chi^2(\text{rank}(R(X'X)^{-1}R')=\chi^2(q)</script><p>又因为</p>
<script type="math/tex; mode=display">
S_n = \frac{(n-k)s^2}{\sigma^2}\sim\chi^2(n-k)</script><p>因此</p>
<script type="math/tex; mode=display">
F_n = \frac{A_n/q}{S_n/(n-k)}\sim F(q,n-k)</script></blockquote>
<h4 id="Wald检验、LM、LR检验"><a href="#Wald检验、LM、LR检验" class="headerlink" title="Wald检验、LM、LR检验"></a>Wald检验、LM、LR检验</h4><script type="math/tex; mode=display">
W_n\equiv qF_n=(R\hat{\beta}-r)'\left[s^2R(X'X)^{-1}R'\right]^{-1}(R\hat{\beta}-r)\rightarrow_d \chi^2(q)</script><script type="math/tex; mode=display">
\begin{eqnarray}
    W_n &=& n\left( \frac{RSS_r-RSS_{ur}}{RSS_{ur}} \right)    \notag\\
    LM_n &=& n\left( \frac{RSS_r-RSS_{ur}}{RSS_{r}} \right)    \notag\\
    LR_n &=& n\ln\left(\frac{RSS_r}{RSS_{ur}}\right)    \notag
\end{eqnarray}</script><p>一般只关注Wald检验。</p>
<h3 id="同方差检验：White检验BP检验"><a href="#同方差检验：White检验BP检验" class="headerlink" title="同方差检验：White检验BP检验"></a>同方差检验：White检验BP检验</h3><p>原假定为：</p>
<script type="math/tex; mode=display">
H_0:\mathbb{E}(\varepsilon_i^2\lvert X_i) = \mathbb{E}(\varepsilon_i^2) = \sigma^2,\text{for all }i \leftrightarrow H_1:\text{not }H_0</script><h3 id="OLS估计量的渐进，假定"><a href="#OLS估计量的渐进，假定" class="headerlink" title="OLS估计量的渐进，假定"></a>OLS估计量的渐进，假定</h3><ul>
<li>线性假定</li>
<li>Correct specification(??):$\mathbb{E}(\varepsilon_i\lvert X_i)=0\quad\text{a.s.}$（几乎处处成立）。$\mathbb{E}(\varepsilon_i^2)\equiv\sigma^2&lt;\infty$</li>
<li>非退化：$Q\equiv \mathbb{E}(X_iX_i’)$非退化</li>
<li>$V\equiv\mathbb{E}(\varepsilon_i^2 X_iX_i’)$是有限的，并且是正定的。</li>
<li>条件同方差：$\mathbb{E}(\varepsilon_i^2\lvert X_i)\equiv\sigma^2\quad\text{a.s.}$</li>
</ul>
<h3 id="弱外生性假定"><a href="#弱外生性假定" class="headerlink" title="弱外生性假定"></a>弱外生性假定</h3><p>弱外生性：$\mathbb{E}(X_i\varepsilon_i)=0$，其中$\mathbb{E}(\varepsilon_i^2)\equiv\sigma^2&lt;\infty$。</p>
<h2 id="一些记不起来的定理"><a href="#一些记不起来的定理" class="headerlink" title="一些记不起来的定理"></a>一些记不起来的定理</h2><h3 id="期望迭代定理（LIE，Law-of-Iterated）"><a href="#期望迭代定理（LIE，Law-of-Iterated）" class="headerlink" title="期望迭代定理（LIE，Law of Iterated）"></a>期望迭代定理（LIE，Law of Iterated）</h3><script type="math/tex; mode=display">
\begin{eqnarray}
    &&\mathbb{E}[\mathbb{E}(Y\lvert X)] = \mathbb{E}(Y)    \notag\\
    &&\mathbb{E}\{\mathbb{E}[g(X,Y)\lvert X]\} = \mathbb{E}[g(X,Y)]    \notag\\
    &&\mathbb{E}[\mathbb{E}(Y\lvert X,Z)\lvert X] = E(Y\lvert X)    \notag
\end{eqnarray}</script><p>还有如果$\mathbb{E}\lvert Y\lvert&lt;\infty$，，就有（<span style='font-family:fangsong'>如果$X$的信息是已知的，那么就不必要期望</span>）：</p>
<script type="math/tex; mode=display">
\mathbb{E}[g(X)Y\lvert X] = g(X)\mathbb{E}(Y\lvert X)</script><p>如果$\mathbb{E}\lvert g(X)\lvert&lt;\infty$，两边取期望，还能得到：</p>
<script type="math/tex; mode=display">
\mathbb{E}[g(X)Y] = \mathbb{E}[g(X)\mathbb{E}(Y\lvert X)]</script><h3 id="方差分解公式"><a href="#方差分解公式" class="headerlink" title="方差分解公式"></a>方差分解公式</h3><script type="math/tex; mode=display">
\text{Var}(Y) = \text{Var}[\mathbb{E}(Y\lvert X)] + \mathbb{E}[\text{Var}(Y\lvert X)]</script><p>根据方差分解公式我们还能得到下面的推论：</p>
<script type="math/tex; mode=display">
\text{Var}(Y)\ge \text{Var}[Y-\mathbb{E}(Y\lvert X_1)]\ge\text{Var}[Y-\mathbb{E}(Y\lvert X_1,X_2)]</script><p>这说明加的$X$越多，越能改进模型？</p>
<h3 id="GLS（Generalized-Least-Squares，广义最小二乘法）是解决异方差问题使用的方法！"><a href="#GLS（Generalized-Least-Squares，广义最小二乘法）是解决异方差问题使用的方法！" class="headerlink" title="GLS（Generalized Least Squares，广义最小二乘法）是解决异方差问题使用的方法！"></a>GLS（Generalized Least Squares，广义最小二乘法）是解决异方差问题使用的方法！</h3><p>广义的正态性假设：$\varepsilon\lvert X\sim N(0,\sigma^2V)$</p>
<p>这意味着：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    &&\mathbb{E}(\varepsilon_i\lvert X) = 0    \notag\\
    &&\mathbb{E}(\varepsilon_i^2\lvert X) = \sigma^2V_{ii}(X)    \notag\\
    &&\mathbb{E}(\varepsilon_i\varepsilon_j\lvert X) = \sigma^2V_{ij}(X)    \notag\\
\end{eqnarray}</script><p>这种情况下有：</p>
<ul>
<li>无偏性</li>
<li>$\text{Var}(\hat{\beta}\lvert X) = \sigma^2 (X’X)^{-1}X’VX(X’X)^{-1}$</li>
<li>$\hat{\beta}-\beta\lvert X\sim N\left(0,\sigma^2(X’X)^{-1}X’VX(X’X)^{-1}\right)$</li>
<li>$\text{cov}(\hat{\beta},\hat{\varepsilon}\lvert X)=0$</li>
</ul>
<blockquote>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \text{Var}(\hat{\beta}\lvert X) &=& \text{Var}((X'X)^{-1}X'\varepsilon\lvert X) = (X'X)^{-1}X'\text{Var}(\varepsilon\lvert X)X(X'X)^{-1}    \notag\\
    &=& (X'X)^{-1}X' \sigma^2V X(X'X)^{-1}    \notag
\end{eqnarray}</script></blockquote>
<p>对于可逆的实对称矩阵$V$，稍微用一点线性代数的只是就可以知道，存在非退化的矩阵$C$，满足$V^{-1}=C’C$。对于异方差问题的线性回归模型$Y=X\beta+\varepsilon$,可以改写为：</p>
<script type="math/tex; mode=display">
CY = CX\beta+C\varepsilon\Rightarrow Y^\star+X^\star\beta+\varepsilon^\star</script><p>我们发现：</p>
<script type="math/tex; mode=display">
\text{Var}(\varepsilon^\star\lvert X) = \text{Var}(C\varepsilon\lvert X) 
= C\text{Var}(\varepsilon\lvert X)C' = C\sigma^2VC' = \sigma^2C(C'C)^{-1}C
=\sigma^2 I_n</script><p>变成了球性方差！！！系数估计量为：</p>
<script type="math/tex; mode=display">
\hat{\beta}^\star = (X^{\star'}X^\star)^{-1}X^{\star'}Y^\star 
= (X'C'CX)^{-1}X'C'CY = (X'\hat{V}^{-1}X)^{-1}X'\hat{V}^{-1}Y
\equiv \hat{\beta}_{\text{GLS}}</script><p>该估计量有以下几条性质：</p>
<ul>
<li>无偏</li>
<li>$\text{Var}(\hat{\beta}_{\text{GLS}}\lvert X) = \sigma^2 (X’V^{-1}X)^{-1}$</li>
<li>$\left.\hat{\beta}_{\text{GLS}}-\beta\right\lvert X\sim N(0,\sigma^2(X’V^{-1}X)^{-1})$</li>
<li>$\mathbb{E}(s^{2\star}\lvert X)=\sigma^2$</li>
<li>$\text{cov}(\hat{\beta}_{\text{GLS}},\hat{\varepsilon}^\star\lvert X)=0$</li>
</ul>
<blockquote>
<p><span style='font-family:kai'>大样本部分有五大法宝，分别是弱大数定律（WLLN）、中心极限定理（CLT）、Delta方法、斯拉茨基定理（Slutsky’s Theorem）、连续映射定理(CMT. continuous mapping theorem)。</span></p>
</blockquote>
<h3 id="弱大数定律-WLLN-weak-law-of-large-numbers"><a href="#弱大数定律-WLLN-weak-law-of-large-numbers" class="headerlink" title="弱大数定律(WLLN,weak law of large numbers)"></a>弱大数定律(WLLN,weak law of large numbers)</h3><p>假定$X_1,\cdots,X_n$独立同分布（IID，Independent Indentical Distribution），且有$\mathbb{E}|X_i|&lt;\infty$，那么当$n\rightarrow\infty$，有</p>
<script type="math/tex; mode=display">
\bar{X}_n=\frac1{n}\sum_{i=1}^n X_i \rightarrow_p \mathbb{E}X_1=\mu</script><h3 id="强大数定律"><a href="#强大数定律" class="headerlink" title="强大数定律"></a>强大数定律</h3><p>假定$X_1,\cdots,X_n$独立同分布（IID，Independent Indentical Distribution），且有$\mathbb{E}|X_1|&lt;\infty$，那么当$n\rightarrow\infty$，有</p>
<script type="math/tex; mode=display">
\bar X_n = \frac1n\sum_{i=1}^n X_i\xrightarrow{\text{a.s.}} \mathbb{E}X_1</script><h3 id="中心极限定理-CLT-Central-Limit-Theorem"><a href="#中心极限定理-CLT-Central-Limit-Theorem" class="headerlink" title="中心极限定理(CLT,Central Limit Theorem)"></a>中心极限定理(CLT,Central Limit Theorem)</h3><p>$\{X_n\}$iid，且均值向量$\mu$和协方差矩阵$\Sigma$均为有限值。那么有</p>
<script type="math/tex; mode=display">
Z_n\equiv \sqrt{n}(\bar{X}_n-\mu)\rightarrow_d N(0,\Sigma)</script><h3 id="Delta-Method"><a href="#Delta-Method" class="headerlink" title="Delta Method"></a>Delta Method</h3><p>假设$\sqrt{n}(\hat{\theta}_n-\theta)\rightarrow_d N(0,\Sigma)$，以及函数$\phi:\mathbb{R}^k\rightarrow\mathbb{R}^l,l\le k$在$\theta$的小邻域内连续可微。那么有</p>
<script type="math/tex; mode=display">
\sqrt{n}\left(\phi\left(\hat{\theta}_n\right)-\phi(\theta)\right)\rightarrow N(0,\Phi\Sigma\Phi')</script><p>其中$\Phi$是函数关于自变量向量求梯度：$\nabla_\theta\phi(\theta)$。</p>
<h3 id="斯拉茨基定理"><a href="#斯拉茨基定理" class="headerlink" title="斯拉茨基定理"></a>斯拉茨基定理</h3><p>假定$X_n\rightarrow_p X$和$Y_n\rightarrow_pY$，那么有</p>
<ol>
<li>$c_nX_n\rightarrow_p cX$，其中$c=\lim_{n\rightarrow+\infty} c_n$。</li>
<li>$X_n+Y_n\rightarrow_p X+Y$。</li>
<li>$X_nY_n\rightarrow_p XY$。</li>
<li>$\frac{X_n}{Y_n}\rightarrow_p\frac{X}{Y}$当$Y\neq0$时。</li>
</ol>
<h3 id="连续映射定理（CMT，Continuous-mapping-theorem）"><a href="#连续映射定理（CMT，Continuous-mapping-theorem）" class="headerlink" title="连续映射定理（CMT，Continuous mapping theorem）"></a>连续映射定理（CMT，Continuous mapping theorem）</h3><p>假设$\{ X_n \}$是一个$k$维随机向量序列，满足$X_n\rightarrow_d X(n\rightarrow+\infty)$。如果是$g:\mathbb{R}^k\rightarrow\mathbb{R}^l$连续的，那么</p>
<script type="math/tex; mode=display">
g(X_n)\rightarrow_d g(X),(n\rightarrow+\infty)</script><h2 id="补充知识点"><a href="#补充知识点" class="headerlink" title="补充知识点"></a>补充知识点</h2><h3 id="分块回归（Partition-Regressions）"><a href="#分块回归（Partition-Regressions）" class="headerlink" title="分块回归（Partition Regressions）"></a>分块回归（Partition Regressions）</h3><p>分块回归在多处有应用，包括在多重共线性的研究中。考虑模型：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \textbf{Y} &=& \textbf{X}\beta+\varepsilon=
  (\textbf{X}_1,\textbf{X}_2)
  \left(\begin{matrix}
      \beta_1 \\ \beta_2
  \end{matrix}\right)+\varepsilon    \notag\\
  &=& \textbf{X}_1\beta_1 + \textbf{X}_2\beta_2+\varepsilon    \notag
\end{eqnarray}</script><p>其中$\dim(\textbf{X}_1)=n\times k_1$，$\dim(\textbf{X}_2)=n\times k_2$,$k_2+k_2=k$。</p>
<p>OLS的一阶条件为：</p>
<script type="math/tex; mode=display">
\textbf{X}'\textbf{X}\hat\beta=\textbf{X}\textbf{Y}</script><p>写成分块形式就是：</p>
<script type="math/tex; mode=display">
\left[\begin{matrix}
    \textbf{X}_1'\textbf{X}_1 & \textbf{X}_1'\textbf{X}_2\\
    \textbf{X}_2'\textbf{X}_1 & \textbf{X}_2'\textbf{X}_2
\end{matrix}
\right]
\left(\begin{matrix}
    \hat\beta_1\\\hat\beta_2
\end{matrix}
\right)
=
\left(\begin{matrix}
    \textbf{X}_1'\textbf{Y} \\ \textbf{X}_2'\textbf{Y}
\end{matrix}\right)</script><p>分块形式的一阶条件写成：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \textbf{X}_1'\textbf{X}_1\hat\beta_1+\textbf{X}_1'\textbf{X}_2\hat\beta_2=\textbf{X}_1'\textbf{Y}    \tag{1}\\
    \textbf{X}_2'\textbf{X}_1\hat\beta_1+\textbf{X}_2'\textbf{X}_2\hat\beta_2=\textbf{X}_2'\textbf{Y}    \tag{2}
\end{eqnarray}</script><p>将式子(1)两边同时乘以$\textbf{X}_2’\textbf{X}_1(\textbf{X}_1’\textbf{X}_1)^{-1}$</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    &&\textbf{X}_2'\textbf{X}_1\hat\beta_1 
+\textbf{X}_2'\textbf{X}_1(\textbf{X}_1'\textbf{X}_1)^{-1}\textbf{X}_1'\textbf{X}_2\hat\beta_2=\textbf{X}_2'\textbf{X}_1(\textbf{X}_1'\textbf{X}_1)^{-1}\textbf{X}_1'\textbf{Y}    \notag\\
&&\Rightarrow     \textbf{X}_2'\textbf{X}_1\hat\beta_1+\textbf{X}_2'\textbf{P}_1\textbf{X}_2\hat\beta_2=\textbf{X}_2'\textbf{P}_1\textbf{Y}    \tag{3}
\end{eqnarray}</script><p>其中$\textbf{P}_1=\textbf{X}_1(\textbf{X}_1’\textbf{X}_1)^{-1}\textbf{X}_1’$。</p>
<p>由（2）减去（3）可以得到：</p>
<script type="math/tex; mode=display">
\textbf{X}_2'\textbf{M}_1\textbf{X}_2\hat\beta_2=\textbf{X}_2'\textbf{M}_1\textbf{Y}
\Longrightarrow 
\hat\beta_2=(\textbf{X}_2'\textbf{M}_1\textbf{X}_2)^{-1}\textbf{X}_2'\textbf{M}_1\textbf{Y}</script><p>其中$\textbf{M}_1=\textbf{I}_n-\textbf{P}_1=\textbf{I}_n-\textbf{X}_1(\textbf{X}_1’\textbf{X}_1)^{-1}\textbf{X}_1’$。类似地，还可以得到：</p>
<script type="math/tex; mode=display">
\hat\beta_1=(\textbf{X}_1'\textbf{M}_2\textbf{X}_1)^{-1}\textbf{X}_1'\textbf{M}_2\textbf{Y}</script><p>其中$\textbf{M}_2=\textbf{I}_n-\textbf{P}_2=\textbf{I}_n-\textbf{X}_2(\textbf{X}_2’\textbf{X}_2)^{-1}\textbf{X}_2’$。</p>
<p>注意到$\textbf{M}_1$和$\textbf{M}_2$都是投影正交阵，于是这里我们能得到$\hat\beta_1$和$\hat\beta_1$的另一种表达：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
&&\hat\beta_1
=\left(\textbf{X}_1^{\star'}\textbf{X}_1^\star\right)^{-1}\textbf{X}_1^{\star'}\textbf{Y}_{(2)}^\star
=\left(\textbf{X}_1^{\star'}\textbf{X}_1^\star\right)^{-1}\textbf{X}_1^{\star'}\textbf{Y}    \notag\\
&&\hat\beta_2
=\left(\textbf{X}_1^{\star'}\textbf{X}_1^\star\right)^{-1}\textbf{X}_1^{\star'}\textbf{Y}_{(2)}^\star
=\left(\textbf{X}_1^{\star'}\textbf{X}_1^\star\right)^{-1}\textbf{X}_1^{\star'}\textbf{Y}    \notag
\end{eqnarray}</script><p>其中$\textbf{X}_1^\star=\textbf{M}_2\textbf{X}_1$,$\textbf{X}_2^\star=\textbf{M}_1\textbf{X}_2$,$\textbf{Y}_{(2)}^\star=\textbf{M}_2\textbf{Y}$,$\textbf{Y}_{(1)}^\star=\textbf{M}_1\textbf{Y}$。</p>
<p>得到$\hat\beta_1$的分块回归步骤：</p>
<ol>
<li>将$\textbf{Y}$回归到$\textbf{X}_2$上，得到其残差为$\textbf{Y}_{(2)}^\star=\textbf{M}_2\textbf{Y}$；</li>
<li>将$\textbf{X}_1$回归到$\textbf{X}_2$上，得到其残差为$\textbf{X}_1^\star=\textbf{M}_2\textbf{X}_1$：</li>
<li>将$\textbf{Y}_{(2)}^\star$或者$\textbf{Y}$回归到$\textbf{X}_1^\star$上，得到$\hat\beta_1$。</li>
</ol>
<p>令$\hat\beta=\left( \hat\beta_1’,\hat\beta_2’ \right)’$，$\hat{\varepsilon}=\textbf{Y}-\textbf{X}\hat\beta$，那么</p>
<script type="math/tex; mode=display">
\textbf{Y}=\textbf{X}_1\hat\beta_1+\textbf{X}_2\hat\beta_2+\hat{\varepsilon}</script><blockquote>
<p>这一部分有两个结论：$\textbf{P}\textbf{P}_l=\textbf{P}_l,l=1,2$;$\textbf{M}\textbf{M}_l=\textbf{M}$。</p>
<p>因为对任意$\textbf{Y}$，$\textbf{P}\textbf{Y}$的集合含义是$\textbf{Y}$在由$\textbf{X}$张成的空间上的投影。而$\textbf{P}_l$由$\textbf{X}$的分量张成，因此它本身就在由$\textbf{X}$张成的空间上，因此它的投影就是它本身$\textbf{P}\textbf{P}_l=\textbf{P}_l,l=1,2$。</p>
<p>由于$\textbf{P},\textbf{P}_1$均为对称的幂等矩阵，因此</p>
<script type="math/tex; mode=display">
\textbf{P}_l=\textbf{P}_l'=(\textbf{P}\textbf{P}_l)'=\textbf{P}_l'\textbf{P}'=\textbf{P}_l\textbf{P}</script><p>于是：</p>
<script type="math/tex; mode=display">
\begin{eqnarray}
    \textbf{M}\textbf{M}_l
    &=&(\textbf{I}-\textbf{P})(\textbf{I}-\textbf{P}_l)
    =\textbf{I}-\textbf{P}-\textbf{P}_l+\textbf{P}\textbf{P}_l    \notag\\
    &=&\textbf{I}-\textbf{P}-\textbf{P}_l+\textbf{P}_l
    =\textbf{I}-\textbf{P}=\textbf{M}    \notag\\
    \textbf{M}_l\textbf{M}
    &=&(\textbf{I}-\textbf{P}_l)(\textbf{I}-\textbf{P})
    =\textbf{I}-\textbf{P}-\textbf{P}_l+\textbf{P}_l\textbf{P}=\textbf{M}    \notag\\
\end{eqnarray}</script></blockquote>
<p>注意到，$\textbf{M}_2\hat{\varepsilon}=\textbf{M}_2\textbf{M}\varepsilon=\textbf{M}\varepsilon$，以及$\textbf{M}_2\textbf{X}_2=0$，我们有</p>
<script type="math/tex; mode=display">
\textbf{M}_2\textbf{Y}=\textbf{M}_2\textbf{X}_1\hat\beta_1+\textbf{M}_2\textbf{X}_2\hat\beta_2+\textbf{M}_2\hat\varepsilon=\textbf{M}_2\textbf{X}_1\hat\beta_1+\hat\varepsilon</script><p>或者可以写成：</p>
<script type="math/tex; mode=display">
\textbf{Y}_{(2)}^\star = \textbf{X}_1^\star\hat\beta_1+\hat\varepsilon</script><p>这个方程在计量经济学文献中被称为残差回归（residual regression）。注意到</p>
<script type="math/tex; mode=display">
\textbf{X}_1^{\star'}\hat{\varepsilon}
=(\textbf{M}_2\textbf{X}_1)'\textbf{M}\varepsilon
=\textbf{X}_1'\textbf{M}_2\textbf{M}\varepsilon
=(\textbf{M}\textbf{X}_1)'\varepsilon=0</script><p><span style='font-family:hei;font-size:20px'>Frisch-Waugh-Lovell定理(FWL定理)</span></p>
<p>$\beta_1$的OLS估计量和OLS估计残差$\hat\varepsilon$可以按照上面的步骤1-步骤3，将$\textbf{Y}_{(2)}^\star$回归到$\textbf{X}_1^\star$上，等价得到。</p>

<p>基尔特社会主义亦称“行会社会主义”(基尔特，英语“Guild”音译，即“行会”之意)。20世纪初英国工人运动中出现的一种思潮。</p>

<p>基于政治、经济二元论以及职能划分原则，主张国家与基尔特（工会）应各有各的职务与权力。国家代表消费者的利益，作为生产工具的所有者，而劳动者所组成的自治团体的基尔特则代表生产者的利益，负责生产工具的管理。各项工业之外，凡宗教、教育等非经济性活动，也应组织基尔特来自行管理事务。国家虽然是必要的政治组织和管制工具，但国家与其他团体在职能上是立于平等的地位。基尔特社会主义者一方面不满现代大规模的工业生产，另一方面排斥不断扩张的国家控制，因此致力于恢复中古时代的经济组织形态，以重建工人的工作兴趣及养成工人的自尊心，并且企图透过政治与经济的分权分责，同时获致政治的自由与经济的自由。这种理论最早指向少数的知识分子，后来逐渐扩及于结合劳动者。一九一五年在柯尔等人的领导下，成立全国基尔特联盟（NationalGuildLeague），宣言废除工资制度，反对官僚政治，主张经由各种不同基尔特的组织而形成国家，以彻底实现「工业的自治」。基尔特社会主义在英国的影响与发展不大，远比不上费边社会主义。</p>

<p>基尔特社会主义亦称“行会社会主义”(基尔特，英语“Guild”音译，即“行会”之意)。20世纪初英国工人运动中出现的一种思潮。</p>
<p>是<a target="_blank" rel="noopener" href="https://baike.baidu.com/item/费边社会主义">费边社会主义</a>（FabianSocialism）之外，介乎社会主义与工团主义（Syndicalism）之间的一种调和理论，组织基尔特社会主义，管理生产，实行生产自治，产业民主，从而消灭剥削，实现劳动者的解放。</p>
